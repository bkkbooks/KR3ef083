body:
  text: 卷十一五臟風寒積聚病脈證治第十一論二首脈證十七條方三首肺中風者口燥而喘身運而重冒而腫脹衍義肺者手太陰燥金與足太陰同為濕化內主音聲外合皮毛屬上焦陰部行營衛在五行生剋畏火剋木今為風中之夫風者內應肝木之氣得火反侮所不勝之金然木之子火也火必隨木而至風能勝濕熱能燥液故為口燥風火皆陽二者合則搖動不寧動於肺則燥其所液之濕鼓其音聲有出難入而作喘鳴動於榮衛鼓其脈絡肌肉則身運作腫脹雖然此特風中於肺失其運用之一證耳若內經所論肺風者多汗惡寒色白時咳晝瘥暮劇是又敘其邪在肺作病狀如是各立一義以為例耳然後人自此而推皆可得之其在臟在舍在經絡凡所見之病不患其不備也餘臟皆然肺中寒吐濁涕衍義肺者陰也居陽部故曰陰中之陽謂之嬌臟惡熱復惡寒過熱則傷所稟之陰過寒則傷所部之陽為相傳之官布氣化液行諸內外陽傷則氣耗陰傷則液衰今寒中之則氣液蓄於胸而成濁飲唾出於口蓄於經脈乃成濁涕流出於鼻以鼻是肺臟呼吸之門也肺死臟浮之虛按之弱如蔥葉下無根者死衍義肺金主秋當下四十五日後陰氣微上陽氣微下之時內經論其平脈曰氣來輕虛以浮來急去散又曰微毛而有胃氣又曰厭厭聶聶如落榆葉狀其陰陽微上下之象如此又曰死脈則為真肺脈至大而虛如毛羽中人膚又曰來如物之浮如風吹毛又曰但毛無胃則是陽氣不下陰氣不上盛陽當變陰而不變既不收斂又不和緩惟浮欲死可知已因火剋金而陰亡內經謂其不過三日死正與此同蓋陰者陽之根浮者有之沉者亦有之根壯而後枝葉茂敘平脈惟貴輕虛以浮非全無沉者但浮沉皆止三菽之重耳不欲其如石之沉也今浮之虛按之又弱如蔥葉於三菽其有幾哉越人曰肝與肺有生熟浮沉之異生浮則熟沉生沉則熟浮蓋陽極生陰陰極生陽更始體用之氣在二臟故二臟之形亦如之緣肺居陽部故體輕浮主氣以象陽陽極變陰故用收斂以象陰肝居陰部故體重沉藏血以象陰陰極變陽故用升發以象陽浮沉正此耳五臟陰陽各具一體用不可不察肝中風者頭目瞤兩脅痛行常傴令人嗜甘衍義五氣在天為風在地為木在臟為肝與筋合肝之筋與經脈皆出足大趾之端過股內上循兩脅出胸中至於巔今中於風則動搖上者為頭目瞤風甚則亢亢則害承乃制兼金之體於是血液皆衰經絡盡從收斂而急束故兩脅痛不能俯仰傴而行經曰肝苦急急食甘以緩之故令嗜甘也若內經肝風之狀多汗惡風善悲色蒼嗌乾善怒時憎女子此又並其臟之體用而言也肝中寒者兩臂不舉舌本燥喜太息胸中痛不得轉側食則吐而汗出也千金云時盜汗出咳食已吐其汁衍義肝者陰之陽其氣溫和啟陳舒榮而魂居之並神出入所畏者金也金性涼其氣收斂肅殺故克之令更中寒金乃水之母母必從子而至以害其木凝泣氣血生化失職不榮於上之筋脈則兩臂不舉矣肝死臟浮之弱按之如索不來或曲如蛇行者死補註曷言死臟已無生氣也肝屬木應濡是弱猶為本脈然但浮之弱既非長竿末梢之循矣及按之曰如索則弦緊俱見曰不來則脈有來去乃陰陽往復之理今但去是直上下而無胃氣也否則真氣將散出入勉強有委而不前屈且難伸之狀故曲如蛇行也嗚呼木之生也有鼓動條達發榮柔婉之妙其死也非強直而不復即矯曲而不遂木曰曲直所以始之終之也肝著其人當蹈其胸上先未苦時但欲飲熱旋覆花湯主之旋覆花湯方旋覆花三兩蔥十四莖新絳少許上三味以水三升煮取一升頓服補註肝主疏泄言其用也倘鬱抑不舒勢必下乘中土土必弱而時滿氣必結而不開故喜人之按之揉之也肝氣之弱言著之心胸之間也先欲飲熱者木汲在水喜其生已熱則能行樂其散結以此消息病情斯得矣故以旋覆為君主結氣脅下滿消胸上痰而以蔥通陽氣也使徒治肝氣而不及血似與所著不宣故取有色無質者能入藏血之地而不著耳心中風者翕翕發熱不能起心中飢食即嘔吐補註心為君主胞絡衛焉邪豈得以干之乎然則心中風者殆胞絡受邪也風為陽邪善行數變而所傷在君火之地兩熱相合勢必外蒸傷寒言翕翕為溫熱而不至於大熱也夫君火之官受困則四肢自不能起而蘊熱於內懸懸如飢狀乃痰飲蓄聚上脘初非胃虛也食又何能下乎是不至嘔吐不止也心中寒者其人苦病心如啖蒜狀劇者心痛徹背背痛徹心譬如蠱注其脈浮者自吐乃愈補註心主散寒入而火鬱矣鬱則氣既不舒而津液聚為濁飲故其苦病如啖蒜者正形容心中懊憹不得舒坦若為辛濁所傷也至甚者正以陰凝之邪襲於陽部阻其升降前後不通亦猶胸痹之痛徹背徹心比如蟲之蠱注其狀更有甚於啖蒜者矣其脈浮者邪在上也因高越之使所結之飲上湧則所受之邪亦外出矣蓋吐中自有發散之義也心傷者其人勞倦即頭面赤而下重心中痛而自煩發熱當臍跳其脈弦此為心臟傷所致也衍義內經曰心者君主之官神明出焉主明則下安否則十二官危矣形乃大傷主不明則十二官危況所安之宅乎仲景謂心傷者心之神因七情所傷也蓋神乃氣之主帥氣乃神之從卒懵亂則神遷遷則臟真之氣應之而亂久則衰衰則心傷矣心既傷而復加之勞役臟之真陰不能持守其火而火亂動動則上炎其頭目即發赤臟真從火炎不從下行而陰獨在下故重心虛則腎水乘之內作心痛而煩外作經絡之陰不得入與臟通故發熱心脈絡於小腸火氣不行伏鼓而動作故當臍跳仲景以弦脈為陰為虛今見於心之陰臟皆因心傷所以得是脈也心死臟浮之實如丸豆按之益躁疾者死衍義內經心脈如鉤但鉤無胃曰死心脈來前曲後居如操帶鉤又云脈至堅而搏如循薏苡子累累然乃死心死脈不可一氣言心臟氣來象雖不一陰陽之道未之或異何也心脈主夏陽氣盛極於陰始生之時極而不能生陰者死陰極而反勝其陽者死以陰靜往來候之而已來者候其陽去者候其陰來盛而去衰如鉤終乏雍容和緩氣象其能久而不死乎和平之鉤者則前曲後居之反也所以如操帶鉤無胃氣故也陰陽生化從守其臟若薏苡子短數而動又能無死乎動如麻豆殆與薏苡子象同蓋躁疾者氣脫亡陰也故主死邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人則畏合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者為癲陽氣衰者為狂衍義神之所任物而不亂者由氣血維持而養之以靜也若氣血衰少則神失所養而不寧並神出入者謂之魂守神之舍者謂之魄神不寧則悲悲則魂魄不安矣心與目內外相關目開則神存於中而應事目合則神散於外而妄行故畏合目經云陽盛則夢飛陰盛則夢墜今以虛不以盛故夢遠而不飛墜耳所言癲狂非陰陽上下相併之病乃獨持心臟分氣血陰陽相傾也蓋陰在內為陽之守陽在外為陰之衛若陰氣衰陽氣並於內神亦入於陰故癲癲病者神與聲皆閉藏而不發若陽氣衰陰氣並於外神亦出於陽故狂狂病者神與聲皆散亂而妄動也脾中風者翕翕發熱形如醉人腹中煩重皮目瞤瞤而短氣衍義風陽邪也內應肝在心臟者尚有翕翕發熱況屬脾土是賊邪乎故外掣其皮目瞤瞤內亂其意如醉人而腹中煩也脾受賊邪氣力散解故重而短氣且內經脾風者身體怠惰四肢不欲動當不止腹中煩重而已脾死臟浮之大堅按之如覆杯潔潔狀如搖者死衍義內經死脾脈至脈來堅銳如雀之啄如鳥之距狀其獨陰獨陽而不柔和也如屋之漏狀其動止之不常也如水之流狀其去之無節也如弱而乍數乍疏狀其進退無度也今浮之大堅非類鳥啄乎按之如覆杯非類鳥距乎潔潔如搖者非類屋漏與乍數乍疏乎趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約麻子仁丸主之麻子仁丸方麻仁二升芍藥半斤枳實半斤大黃一斤厚朴一尺杏仁一升去皮尖上末之煉蜜丸如梧子大飲服十丸日三以知為度補註趺陽脈土也浮為陽澀為陰故浮之見陽沉之見陰也夫陽有餘則胃氣強陰不足則太陰不固故小便數然則脾正為胃行津液者也臟澀而不能約束水津則留於胃者甚少而胃自失所潤然則胃之不潤脾為之也故曰為約於是以大黃枳實去實先以麻仁潤燥芍藥養陰且用厚朴佐杏仁以利肺氣兼補益陰氣之用斯得之矣腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣里冷濕久久得之腰以下冷痛腹重如帶五千錢甘姜苓朮湯主之甘姜苓朮湯方白朮二兩甘草二兩乾薑四兩茯苓四兩上四味以水五升煮三升去滓分溫三服腰即溫補註腎為水臟而真陽伏焉腎著之病腎氣本衰故水火俱虛而後濕氣得以著之何也水與水為類故易召也其人身重濕也腰如坐冷水有水狀濕氣勝也不渴者陽明未嘗熱也小便利膀胱未嘗病也飲食如故中焦亦不病也故曰病在下焦而又申明所致病之由言身勞則陽氣張而汗出濕入則陰氣久而不散以致冷痛腹重有如彼也然論病固下焦症也而立方皆中焦藥豈無故哉人之陽氣原於下而盛於中今因中州無恙之時再一厚培脾土使土旺可以制濕陽壯足以發越故取乾薑之辛熱茯苓之淡滲加於補中味內三服可令腰溫全不及下焦藥者恐補腎則反助水益火無由去濕也仲景明言下焦藥反出中焦者不令人想見微旨耶腎死臟浮之堅按之亂如轉丸益下入尺中者死衍義內經死腎脈來發如奪索辟辟如彈石又謂搏而絕如指彈石辟辟然是皆無胃氣而天真之陽已亡惟真臟之殘陰隨呼吸而動單見本臟之象耳浮以候外外陽也堅者猶彈石奪索乃真陰出於陽也按以候里里陰也動則為陽亂動如轉丸乃真陽將脫動無倫序不能去來惟系息於其中若益入尺是陰陽離決死兆彰彰矣問曰三焦竭者上焦竭善噫何也師曰上焦受中焦氣未和不能消穀故能噫耳下焦竭即遺溺失便其氣不和不能自禁制不須治久則愈衍義竭者涸也上焦屬心肺一陰一陽之部肺主氣心主血以行榮衛為氣為血有一衰弱則榮衛不能相持而行上焦之化政竭矣雖中焦受穀氣亦不消散而聚於胸中必待噫而出之下焦屬肝腎亦是一陰一陽之部腎主閉藏肝主疏泄其氣不和則榮不能內守衛亦不能外固下焦如瀆氣化之政竭矣故小便不禁而遺溺也久而榮衛和則自愈嘗考傷寒論脈法中雲寸口脈微而澀微者衛氣不行澀者榮氣不逮榮衛不能相將三焦無所仰不歸其部上焦不歸者噫而吞酸中焦不歸者不能消穀引食下焦不歸者則遺溺正此之謂出於上焦而中焦亦噫也內經以督脈所生病為遺溺靈樞以肝所生病為遺溺則遺溺亦不惟此已師曰熱在上焦者因咳為肺痿熱在中焦者則為堅熱在下焦者則尿血亦令淋閉不通大腸有寒者多鶩溏有熱者便腸垢小腸有寒者其人下重便血有熱者必痔衍義熱在上焦為肺痿義同肺痿條然中焦為堅滿亦與脾約同義熱在下焦尿血及淋閉者三焦下輸入絡膀胱即與內經胞移熱於膀胱為癃溺意同蓋膀胱為州都之官氣化而溺出焉熱在血則血滲入膀胱尿而出之熱在氣氣鬱成燥水液因凝故小便赤而淋閉不通雖淋閉屬氣鬱亦有屬血者氣病溺色白血病溺色赤為熱在下焦下焦固不獨膀胱若腎若肝若小腸皆居下焦各能積熱如胞之移熱膀胱者入則必自其竅出之亦有不因下焦而溺血者如內經悲哀太過陽氣內動發則心下崩數溲血之類病名有標本急治標緩治本凡遇是證未可獨以下焦熱一語而更不求其所來鶩溏者大腸寒則陽衰不能堅實糟粕故屎薄少結而中如鶩屎也腸垢者大腸屬金主液有熱則就燥鬱滯其液澀而不行積為腸垢若膿若血頻並窘迫故重下而不徹亦有垢不因大腸移熱而生者小腸後重下血正與內經所謂結陰下血相類小腸屬火為心之腑心主血小腸寒則陽不得越因郁為下重血亦不入於脈隨其所鬱而便下然亦有便血因火熱而溢者不惟小腸而已小腸有熱痔者小腸從臍下入大腸肛門由肛門總為大小腸出入之門戶也然大腸筋脈橫解者亦為痔督脈生病者亦作痔仲景舉小腸寒熱病中因心及之耳問曰病有積有聚有䅽氣何謂也師曰積者臟病也終不移聚者腑病也發作有時輾轉痛移為可治䅽氣者脅下痛按之則愈復發為䅽氣諸積大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關上積在心下微下關積在少腹尺中積在氣衝脈出左積在左脈出右積在右脈兩出積在中央各以其部處之衍義仲景立積聚之名蓋以臟者陰也腑者陽也陽動而陰靜臟主血臟病則血凝凝故不移而名曰積腑主氣腑病則氣停停則終必動而名曰聚䅽氣者即首章䅽飥之邪從口入宿食之氣也脅下脾之幕章門穴是其處凡飲食入胃輸精於脾脾若不勝其氣之所宜者則不布於三陰而積之於幕故按之則所積之氣開而痛暫愈後集則又痛是名䅽氣蓋飲食之氣味各有所喜入之臟寧無從其所入之處而病者乎故脅下痛亦非獨䅽氣也懸飲亦痛寒邪泣血在肝亦痛但按之散與不散為異耳雖然寒氣之客於小絡者按之暖其痛亦愈及考內經靈樞有積瘕而無聚仲景去瘕而名聚內經不分積瘕動靜仲景分屬之靈樞有著筋經之動靜仲景不言及巢氏又增之為四曰積曰聚曰癥瘕積聚臟腑虛弱受風邪搏氣之所致也癥瘕由飲食不消聚結漸長所致盤牢不移者癥也可以推移者瘕也陳無擇遂以積聚氣結者屬肺癥瘕血結者屬肝更有五臟相傳之積此與仲景所名又不同矣內經靈樞以風寒飲食七情俱為積瘕之邪巢氏陳氏分之如此仲景獨以動靜立名又不關內經靈樞巢氏或因仲景不言其邪遂有四者之名陳氏又從而立肺肝之名名愈分而理愈不明名以人立固從時遷可也邪可遷乎哉內經靈樞未常以風寒不病血飲食不病氣而乃紛紛若是古之然耶今之然耶
