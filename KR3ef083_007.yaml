body:
  text: 卷七肺痿肺癰咳嗽上氣病脈證治第七論三首脈證四條方十五首補注嘉言云金匱於肺痿肺癰二證則徹土綢繆治之於早然先從脈辨其數虛數實欲從口辨其吐沫乾燥然更出一捷要之法謂咳嗽之初即見上氣喘急者乃外受風寒所致其脈必浮宜從越婢加半夏之法及小青龍加石膏之法亟為表散不爾即是肺癰肺痿之始基故以咳嗽上氣病證同敘於肺癰肺痿之下而另立痰飲咳嗽本門原有深意見咳而至於上氣即是肺中壅塞逼迫難安尚何等待不急散邪下氣以清其肺乎然亦分表裡虛實為治不當誤施轉增其困矣再論肺癰肺痿之病皆燥病也肺稟清肅之令乃金寒水冷之臟火熱熏灼久久失其清肅而變為燥肺中生癰其津液全裹其癰不溢於口故口中辟辟然乾燥肺熱成痿則津液之上供者悉從燥熱化為涎沫濁唾證多不渴較胃中津液盡傷母病纍子之痿又大不同只是津液之上輸者變為唾沫肺不沾其惠澤爾若夫痿病津液不能滅火反從火化纍年積歲肺葉之間釀成一大火聚以清涼投之捍格不入矣然雖捍格固無害也設以燥熱投之以火濟火其人有不坐斃者乎半夏燥藥也投入肺中轉增其患自不待言但清涼既不能入惟燥與燥相得乃能入之故用半夏之燥入清涼生津藥中則不但不燥轉足開燥其濁沫隨逆氣下趨久久津液之上輸者不結為涎沫而肺得沾其漬潤痿斯起矣人但知半夏能燥津液孰知善用之即能驅所燥之津液乎此精蘊也總按肺為嬌臟肺氣素為形寒飲冷而受傷久久出汗過多而不瘥氣餒不振即為肺痿其風傷皮毛無傷血脈風熱相搏氣血稽留遂為肺癰肺痿多涎沫乃至便下濁沫肺癰膿血乃至便下膿積凡胃強能食而下傳者皆不死也夫血熱則肉敗營衛不行必將為膿是以金匱以通行營衛為第一義欲治其子先健其母胃中津液尤貴足以上供而無絶乏後世諸方錯出不一不明大意今閲金匱十五方固已用之不盡矣問曰熱在上焦者因咳為肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之曰寸口脈數其人咳口中反有濁唾涎沫者何師曰為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰補注按嘉言云人身之氣稟命於肺肺氣清肅則周身之氣莫不服從而順行肺氣壅濁則周身之氣易致橫逆而犯上故肺癰者肺氣壅而不通也肺痿者肺氣痿而不振也才見久咳先須防此兩證肺癰由五臟蘊崇之火與胃中停蓄之熱上乘乎肺肺受火熱熏灼血為之凝痰為之裹遂成小癰所結之形漸長則肺日脹而脅骨日昂乃至咳聲頻並痰濁如膠發熱畏寒日晡尤甚面紅鼻燥胸生甲錯始先即能辨其脈證屬表屬裡極力開提攻下無不愈者逮至血化為膿肺葉朽壞傾囊吐出始識其證十死不救嗟無及矣間有癰小氣壯胃強善食其膿不從口出或順趨肛門或旁穿脅肋仍可得生然不過十中二三耳仲景治法最精用力開提於未成膿之先今人施於既成膿之後其有濟乎肺痿者其積漸已非一日其寒熱不止一端總由胃中津液不輸於肺失其所養轉枯轉燥然後成之蓋肺金之生水精華四布者全藉胃土津液之富上供罔缺但胃中津液暗傷之竇最多粗工不知愛護或腠理素疏無故而大發其汗或中氣素餒頻吐以傾倒其囊或痹或消中飲水而渴不解泉竭自中或腸枯便祕強利以求其快漏卮難繼只此上供之津液坐耗歧途於是肺火日熾肺熱日深肺中小管日窒咳聲以漸不揚胸中脂膜日乾咳痰艱於上出行動數武氣即喘鳴衝擊連聲痰始一應金匱治法貴得其精意大要緩而圖之生胃津潤肺燥下逆氣開積痰止濁唾補真氣以通肺之小管散火熱以復肺之清肅如半身痿廢及手足痿軟治之得法亦能復起而肺近在胸中呼吸所關可不置力乎肺癰屬在有形之血血結宜驟攻肺痿屬在無形之氣氣傷宜徐理故癰為實誤以肺痿治之是為實實痿為虛誤以肺癰治之是為虛虛此辨證用藥之大略也然兩手寸口之脈原為手太陰肺脈此云寸口脈數云滑數云數實數虛皆指左右三部統言非如氣口獨主右關之上也其人咳口中反有濁唾涎沫頃之遍地者為肺痿言咳而口中不幹燥也若咳而口中辟辟燥則是肺已結癰火熱之毒出現於口咳聲上下觸動其癰胸中即隱隱而痛其脈必見滑數有力正邪氣方盛之徵也數虛數實之脈以之分別肺痿肺癰是則肺痿當補肺癰當瀉明矣問曰病咳逆脈之何以知此為肺癰當有膿血吐之則死其脈何類師曰寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴多唾濁沫時時振寒熱之所過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成則死補注按嘉言云肺癰之脈既云滑數此復云微數者非脈之有不同也滑數者已成之脈微數者初起之因也初起左右三部脈微知其衛中於風而自汗左右三部脈數知為榮吸其熱而畏寒然風初入衛尚隨呼氣而出不能深入所傷者不過在於皮毛皮毛者肺之合也風由所合以漸舍於肺俞而咳唾振寒茲時從外入者從外出之易易者若夫熱過於榮即隨吸氣所入不出而傷其血脈矣衛中之風得榮中之熱留戀固結於肺葉之間乃致血為凝滯以漸結為癰膿是則有形之敗濁必從瀉法而下驅之使其邪毒隨驅下移入胃入腹入腸再一驅即盡去不留矣安在始萌不救聽其膿成而腐敗耶上氣面浮腫肩息其脈浮大不治又加利尤甚補注肺為氣之總司主呼吸者也今云上氣至於面浮腫至為肩息是其肺氣壅逆而肩為動搖矣何也肺之所畏者火也設中焦邪實阻其升降而炎上之性有加無已則所呼之氣邪有以助之而所吸之氣不復下達遂使出入息肩矣加以脈浮大火勢方張本體既衰而邪削更甚又何法可令其內還而下趨乎故不治也然猶有可圖者庶幾中土尚培生氣未絶耳若加利為尤甚也上氣喘而燥者屬肺脹欲作風水發汗則愈補注同一上氣也此則作喘而不息肩者正以皮毛乃肺之合為邪所蔽遂令肺氣不得外達故寒傷營者亦作喘也彼燥陰也上氣何以復燥肺氣既塞遂令下流不化水既不化又令木氣不疏此皆以母病而兼及於子也一發其汗則塞者得以外通矣逆者得以下達矣故曰愈也肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾甘草乾薑湯以溫之若服湯已渴者屬消渴甘草乾薑湯方甘草四兩炙乾薑二兩炮上二味以水三升煮取一升五合去滓分溫再服補注嘉言云肺熱則膀胱之氣化亦熱小便必赤澀而不能多若肺痿之候但吐涎沫而不咳復不渴反遺尿而小便數者何其與本病相反也必其人上虛不能制下以故小便無所收攝爾此為肺中冷陰氣上巔侮其陽氣故必眩陰寒之氣凝滯津液故多涎唾若始先不渴服溫藥即轉渴者明是消渴飲一溲二之證更當消息之矣愚按肺寒上虛也便數下虛也聖人只溫其中豈非以補其母則子自安總司之地溫而膀胱亦溫下泉無洌彼之患矣咳而上氣喉中水雞聲射干麻黃湯主之射干麻黃湯方射干三兩麻黃四兩生薑四兩細辛三兩紫菀三兩款冬花三兩五味子半升大棗七枚半夏半升洗上九味以水一斗二升先煮麻黃二沸去上沫內諸藥煮取三升分溫三服補注嘉言云上氣聲如水雞明系痰阻其氣爾阻之務在去之而仲景不專於去痰者以肺受風寒主氣之司已為邪困而不能自持莫若主於發表而佐以潤燥下氣開痰四法聚於一方內以分解其邪不使之合此因證定藥之大法也咳逆上氣時時唾濁但坐不得眠皂莢丸主之皂莢丸方皂莢八兩刮去皮用酥炙上一味末之蜜丸如梧子大以棗膏和湯服三丸日三夜一服補注經謂上氣者陰氣在下陽氣在上諸陽氣浮無所依從也今咳逆上氣是濁氣上干清虛之位反為濁陰所據故雖時時唾而濁不為唾減也皂莢性能驅濁其刺又能攻堅且得直達患處用意神巧誠不可思議者嘉言云大熱之毒聚結於肺表之溫之曾不少應堅而不可攻者用此丸豆大三粒朝三服暮一服吞適病所如棘針遍刺四面還攻如是多日庶幾無堅不入聿成蕩滌之功不可以藥之微賤而少之也胸中手不可入即謂為代針丸可矣咳而脈浮者厚朴麻黃湯主之厚朴麻黃湯方厚朴五兩麻黃四兩石膏如雞子大杏仁半升半夏半升乾薑二兩細辛二兩小麥一升五味子半升上九味以水一斗二升先煮小麥熟去滓內諸藥煮取三升溫服一升日三服補注嘉言云若但咳而脈浮則外邪居多全以散邪為主用法即於小青龍湯中去桂枝芍藥甘草加厚朴石膏小麥仍從肺病起見所以桂枝之熱芍藥之收甘草之緩概示不用而加厚朴以下其氣石膏以清熱小麥引入胃中助其升發之氣一舉而表解脈和於以置力於本病然後破竹之勢可成爾一經裁酌直使小青龍載肺病騰空而去神哉咳而脈沉者澤漆湯主之澤漆湯方半夏半升紫參五兩一作紫菀澤漆三升以東流水五斗煮取一斗五升生薑五兩白前五兩甘草三兩黃芩三兩人參三兩桂枝三兩上九味㕮咀內澤漆汁中煮取五升溫服五合至夜盡補注浮為在表沉為在裡表裡二字與傷寒之表裡大殊表者邪在衛即肺之表也里者邪在榮即肺之裡也熱過於榮吸而不出其血必結血結則痰氣必為外裹故用澤漆之破血為君加入開痰下氣清熱和榮諸藥俾堅壘一空元氣不損制方之妙若此火逆上氣咽喉不利止逆下氣者麥門冬湯主之麥門冬湯方麥冬七升半夏一升人參二兩甘草二兩粳米三合大棗十二枚上六味以水一斗八升煮取六升溫服一升日三夜一服補注嘉言云胃中津液枯燥虛火上炎之證治本之良法也夫用降火之藥而火反升用寒涼之藥而熱轉熾者徒知與火熱相爭未思及必不可得之數不惟無益而反害之凡肺病有胃氣則生無胃氣即死胃氣者肺之母氣也本草有知母之名者謂肺藉其清涼知清涼為肺之母也有貝母之名者謂肺藉其豁痰實豁痰為肺之母也然屢施於火逆上氣咽喉不利之證而屢不應名不稱矣孰知仲景有此妙法於麥冬人參甘草粳米大補中氣大生津液隊中增入半夏之辛溫一味其利咽下氣非半夏之功實善用半夏之功擅古今未有之奇矣肺癰喘不得臥葶藶大棗瀉肺湯主之葶藶大棗瀉肺湯方葶藶熬令色黃搗丸如彈子大大棗十二枚上先以水三升煮棗取二升去棗內葶藶煮取一升頓服補注此治肺癰吃緊之方也肺中生癰不瀉何待恐日久癰膿已成瀉之無益日久肺氣已索瀉之轉傷惟血結而膿未成當急以瀉肺之法奪之況喘不得臥不云甚乎咳而胸滿振寒脈數咽乾不渴時濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之桔梗湯方桔梗一兩甘草一兩上二味以水三升煮取一升分溫再服又方此方系宋人所增並録之以備用桔梗貝母當歸栝蔞仁枳殼薏苡仁桑白皮百合各一錢五分五味子葶藶地骨皮甘草節知母防己黃耆杏仁各五分用清水煎服補注肺癰由熱結而成其濁唾腥臭因熱瘀而致故咳而胸滿是肺不利也振寒陰鬱於裡也咽乾不渴阻滯津液也彼邪熱搏聚固結難散之勢用桔梗開之以散其毒甘草解之以消其毒庶幾可圖無使滋蔓即至久久吐膿之時亦仍可用此湯者一以桔梗可開之使下行亦可托之俾吐出一以甘草可以長血肉更可以益金母也咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之越婢加半夏湯方麻黃六兩石膏半斤生薑三兩大棗十五枚甘草二兩半夏半升上六味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服補注咳而上氣則其氣之有沖而不下可知矣其咳之相連而不已可知矣此皆屬肺之脹使之也邪入於肺則氣壅肺壅則欲不喘不可得惟喘極故目如脫所以狀脹與喘之至也脈浮邪也兼大則邪實而所以遺害於肺正未有已故必以辛熱發之亦兼以甘寒佐之使久合之邪渙然冰釋豈不快乎然久蓄之飲何由得泄故特加半夏于越婢湯中一定之法也肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍加石膏湯主之小青龍湯加石膏湯方麻黃三兩細辛三兩芍藥三兩乾薑三兩甘草三兩桂枝三兩五味子半升半夏半升石膏二兩上九味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓強人服一升羸者減之日三服小兒服四合補注此條證與上條無異所異者加躁脈但浮爾然前條躁者欲作風水此條躁者心下有水可見躁為陰躁而水為陰之至也君主之地水氣上凌豈細故耶故前方於麻黃以杏仁易石膏加薑棗發散之力微且緩此於麻桂藥中加石膏其力轉猛然監以芍藥五味乾薑其勢下趨水道不至過汗也然後知小青龍亦能翻江倒海引水潛藏不若大青龍之騰雲致雨也夫越婢湯有石膏半夏小青龍方有半夏無石膏觀二方所加之意全重此二物協力建功石膏清熱藉辛溫亦能豁痰半夏豁痰藉辛涼亦能清熱不然石膏可無慮半夏不在所禁乎仲景加減一味已見因心化裁矣肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞葶藶大棗瀉肺湯主之補注經云是動則病肺脹滿膨膨然而喘咳胃氣不升大腸之氣亦不降則鼻塞不聞香臭遂使周身腫浮有種種之證也然此表證尚多豈可專瀉不知肺癰始因邪由外入及其成癰則證復自內顯出故論其常當升散開提者且未可下奪論其亟當下奪者倘牽制於外反昧膿成則死之大戒安得不審所輕重哉
