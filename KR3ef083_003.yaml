body:
  text: 卷三百合狐惑陰陽毒病證治第三論一首證三條方十二首論曰百合病者百脈一宗悉致其病也意欲食復不能食常默默然欲臥不能臥欲行不能行飲食或有美時或有不用聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每溺時頭痛者六十日乃愈若溺時頭不痛淅然者四十日愈若溺快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日或一月微見者各隨證治之百合病發汗後者百合知母湯主之百合知母湯方百合七枚擘知母三錢切上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎知母取一升去滓後合和煎取一升五合分溫再服百合病下之後者滑石代赭湯主之滑石代赭湯方百合七枚擘滑石三兩碎綿裹代赭石如彈丸大一枚碎綿裹上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎滑石代赭取一升去滓後合和重煎取一升五合分溫服百合病吐之後者百合雞子湯主之百合雞子湯方百合七枚擘雞子黃一枚上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓內雞子黃攪勻煎五分溫服百合病不經吐下發汗病形如初者百合地黃湯主之百合地黃湯方百合七枚擘生地黃一升上以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓內地黃汁煎取一升五合分溫再服中病勿更服大便常如漆百合病一月不解變成渴者百合洗方主之百合洗方上以百合一升以水一斗漬之一宿以洗身洗已食煮餅勿以鹽豉也百合病渴不瘥者栝蔞牡蠣散主之栝蔞牡蠣散方栝蔞根牡蠣熬等分上為細末飲服方寸匕日三服百合病變發熱者一作發寒熱百合滑石散主之百合滑石散方百合一兩炙滑石三兩上為散飲服方寸匕日三服當微利者止服熱則除衍義所謂百脈一宗悉致其病者然則經脈十二絡脈十五此云百脈果何脈歟蓋脈者血之府即是血行於脈灌溉表裡聯絡俞會遍布形體言其百者舉夫數之衆多也猶言百骸爾且又脈之循行與天地合度應水漏百刻是故脈之流行者各有定位因之而為百脈亦宜矣又何其一宗而悉致病耶蓋盡歸於手心主也手心主者主血主脈而心又為火之主心君也君不用事而手心主代之由是手心主得專行一身陰血之生化因號之為母氣百脈皆宗之若火淫則熱熱蓄不散則積積則毒生而傷其血熱毒之血流於脈本因母氣之淫邪是故百脈一宗悉致其病也考之內經有解㑊證與此百合證無少異解㑊既屬之熱中無血百合豈非亦是熱中無血者乎請試逐病論之血屬陰陰者腎水之所主內經曰腎虛則飢不欲食故欲食復不能食也陰虛者惡煩所以常默默也衛氣者夜行陰則寐今衛氣因陰虛不得降故欲臥而不得臥也足得血則能步血既病於是欲行不能行也飲食者由血氣運化而後安脾屬血而喜香血時和則食美時不和則聞食臭也氣陽而血陰若氣盛則熱氣衰則寒今病在血不幹於氣所以雖如寒而無寒雖如熱而無熱也血氣和合則流通不和則塞塞則熱上熱為口苦下熱為便赤也藥雖治病然必藉胃氣以行之若毒血在脾胃經絡而閉塞之藥雖入亦莫行也胃弱不安於藥者得藥則反劇吐利有如鬼神之為祟也病不在皮肉筋骨則身如和惟熱在於血而血虛故脈微數也脈之微數陰之虛也陰虛則腎虛腎與膀胱為表裡腎虛則膀胱不得引精於腎而亦虛膀胱之使下入會陰上至巔為諸陽主氣今溺而膀胱之脈為氣下泄輕則不能舉之於上而上虛上虛則淅然頭眩重虛氣逆上於巔而為頭痛以此之輕重則可知愈日之遠近也夫病有定所則可言定期今以百脈之痛流轉無定處故其證之發現亦無定期或未病而見或數日一月而見用是以察其病之表裡淺深出見形狀如下文之陰陽見者隨證而救之故以所列方觀之日華子謂百合安心定膽益志五臟為能補陰也治産後血眩暈為能去血中熱也除痞滿利大小便為能導滌血之瘀塞也而是證用之為主蓋可見瘀積者矣若汗之而失者是涸其上焦津液而上焦陽也陽宜體輕之藥故用知母佐以救之知母瀉火生津液潤心肺若下之而失者則損其陰瘀血下積而下焦陰也陰宜鎮重之劑故用滑石代赭佐以救之滑石開結利竅代赭除脈中風痹瘀血若吐而失者則損上中二焦之血用雞子黃補血佐以救之若不經吐下發汗未有所治之失病形得如初者但佐之生地黃汁補血涼血涼則熱毒消補則新血生蘊積者行而自大便出如黑漆矣其一月不解百脈壅塞津液不化而成渴者故用百合洗則一身之脈皆得通暢而津液行其渴自止勿食鹽豉以味鹹而凝血且走之也若渴不瘥是中無津液則以栝蔞牡蠣主之若變發熱者乃因脈塞鬱而成熱以硝石通利佐之滑石性涼又可治熱血之積塞者自微利而出故熱除矣夫百合病自見金匱要略後諸方書皆不收獨朱奉議收之謂傷寒變成斯疾此乃病由之一端爾竊嘗思之是病多從心主或因情欲不遂或因離絶菀結或憂惶煎迫致二火鬱之所成百脈既病故百體皆不安所以見不一之病狀自今觀之諸方書不收百合病乃有勞瘵之名殆將以百合病與勞瘵同形狀或瘀血積於脈亦同因而不收但並其方而棄之深為可惜於脈病救之二法遂不明於世矣百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆衍義傷寒治法有謂陽盛陰虛汗之則死下之則愈陰盛陽虛汗之則愈下之則死今百合病所云見於陰者以陽法救之見於陽者以陰法救之與傷寒之語意大同而小異何則在彼直言其盛所以行汗下之法此但言其見以救之則是無汗下之宜施何以知其然所敘百合病皆持兩端欲臥不臥欲食不食如寒無寒如熱無熱為其脈行表裡之病但當救之非如傷寒陽氣之變見於內外必行汗下者也設用傷寒法見病在表輒汗入里輒下雖表裡不逆然亦傷之是以前條用方救之是也其後所結汗下之逆者為反表裡汗下之逆者也狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍黑乍赤乍白蝕於上部則聲喝一作嗄甘草瀉心湯主之甘草瀉心湯方甘草四兩黃芩人參乾薑各三兩黃連一兩大棗十二枚半夏半升上七味水一斗煮取六升去滓再煎溫服一升日三服衍義狐惑病謂蟲蝕上下也世謂風中有蟲凡蟲自風生固矣然風陽也獨陽不生必有所憑而後化蓋因濕熱久停蒸腐氣血而成瘀濁於是風化所腐為蟲矣設風不由濕熱而從寒涼者肅殺之氣縱然腐物蟲亦不化也由是知此病也蟲生於濕熱敗氣瘀血之中其來漸矣遇極乃發非若傷寒一日而暴病者也病發默默欲眠目不得閉臥起缺安者皆五臟久受濕熱傷其陰精衛不內入神不內寧故也更不欲食惡聞食臭者倉廩之府傷也其面乍赤乍黑乍白者由五臟不足更為衰旺迭見其色也其蟲者從濕熱之極所發之處而蝕之蝕上部者內損心肺外傷咽喉肺者氣之主咽喉聲音之戶由是其聲嗄矣故用甘草瀉心湯主之治其濕熱分利其陰陽而黃連非惟治心脾熱也而亦治蟲後世方論謂是證或初得狀似傷寒或因傷寒所變也然皆蟲證也又謂傷寒病腹內熱飲食少腸胃空虛而蟲不安故隨所食上下部而病名孤惑也以此二或字觀之則非獨傷寒變是證凡熱病皆得生蟲也蝕於下部則咽乾苦參湯洗之衍義蟲蝕下部則咽乾者下部腎之所在任脈附焉腎水也濕熱甚於下則蟲蝕於上而腎水受傷經脈乏水以資之挾濕熱逆而燥其咽嗌故用苦參湯洗苦參能除熱毒療下部䘌因以洗之雖然此治之外者爾若究其源病則自內而外出豈獨治其標而已哉試用上部服瀉心湯者觀之則下部亦必有可服之藥自下部用洗法者觀之則上部咽喉亦必有可治之理此仲景特互發之爾不然何後世方論有服下部藥者與內食五臟者乎蝕於肛者雄黃散熏之雄黃一味為末筒瓦二枚合之燒向肛熏之脈經云病人或從呼吸上蝕其咽或從下焦蝕其肛陰蝕上為惑蝕下為狐狐惑病者豬苓散主之衍義蝕於肛濕熱在下二陰雖皆主於腎然肝脈循於肛肛又為大腸之門戶大腸金也濕熱傷之則木來侮是以蟲蝕於此焉雄黃本主䘌瘡殺蟲又有治風之義故用熏之注引脈經豬苓散主之者亦分別濕熱爾病者脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥一本此有黃字黑若能食者膿已成也赤小豆當歸散主之赤小豆當歸散方赤小豆三升浸令芽出曝乾當歸十兩上二味杵為散漿水服方寸匕日三服衍義凡脈數則發熱而煩此熱在血不在榮衛故不發熱但微煩爾汗出者以血病不與衛和血病則惡煩故欲默衛不和則陽陷故欲臥腠理因開而津液泄也三四日目赤如鳩眼者熱血循脈炎上注見於目也七八日四眥黑者其血凝蓄則色變成黑也若能食膿已成者濕熱之邪散漫則毒血流傷其中和之氣不清故不能食若能食可知其毒血已結成膿胃氣無擾故能食也用赤豆當歸治者其赤小豆能消熱毒散惡血除煩排膿補血脈用之為君當歸補血生新去陳為佐漿水味酸解熱療煩入血為輔使也陽毒之為病面赤斑斑如錦紋咽喉痛吐膿血五日可治七日不可治升麻鱉甲湯主之陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之升麻鱉甲湯方升麻二兩當歸一兩蜀椒炒去汗一兩甘草二兩鱉甲手指大一片炙雄黃半兩研上六味以水四升煮取一升頓服之老小再服取汗肘後千金方陽毒用升麻湯無鱉甲有桂陰毒用甘草湯無雄黃衍義按古方書謂陽毒者陽氣獨盛陰氣暴衰內外皆陽故成陽毒謂陰毒者陰氣獨盛陽氣暴衰內外皆陰故成陰毒二者或傷寒初得便為是證或服藥後變而成之陽毒盡治以寒涼陰毒盡治以溫熱藥劑如冰炭之異何乃仲景用一方治之乎雖曰陰毒去雄黃蜀椒則是反去其溫熱者矣且注曰肘後千金方陽毒用升麻湯無鱉甲有桂陰毒用甘草湯無雄黃豈非皆是熱毒之傷於陰陽二經絡耶在陽經絡則面赤斑斑如錦紋吐膿血在陰經絡則面青身如被杖此皆陰陽水火動靜之本象如此豈是寒熱之邪乎嘗以升麻鱉甲之藥考之本草謂升麻能解時氣毒厲諸毒攻咽喉痛與熱毒成膿開壅閉療發斑當歸能破惡血養新血補五臟肌膚甘草和中利血脈緩急止痛調藥奏功鱉甲去惡血雄黃破骨節積聚避鬼邪惡氣骨蒸熱極蜀椒通血脈調關節逐肌骨皮膚死肌去留結破血治天行時氣諸藥所能者如此即此觀之仲景於陰陽二毒之證總用一方蓋可見矣病形雖由陰陽發證論邪則一屬熱毒與血病也所以不分表裡俱以升麻解熱毒為君當歸和血為臣余者佐之而已但雄黃蜀椒理陽氣藥也故病在陰者去之如肘後千金陽毒去鱉甲有桂枝者鱉水族乃陰中之陽不如桂枝能調陽絡之血陰毒不去蜀椒者蜀椒亦陰中之陽非若雄黃陽中之陽故留之以治陰也方旨如此而已所謂五日可治七日不可治者五日乃土之生數熱未極也尚可以治七日為火之成數熱之極陰陽消滅不可治矣其邪比之傷寒加之以毒故傷寒至七日猶得再經而此至七日不惟滅其陰且火極亦自滅矣
