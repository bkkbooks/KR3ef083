body:
  text: 卷十八瘡癰腸癰浸淫病脈證並治第十八論一首脈證三條方五首諸浮數脈應發熱而反灑淅惡寒若有痛處當發其癰補注病之將發脈必兆之夫浮數陽也熱也浮數兼見為陽中之陽是其熱必盡顯於外矣而反灑淅惡寒證實不應何哉必其血有凝滯氣不得越如經所謂榮氣不從逆於肉理乃生癰腫陽氣有餘榮氣不行乃發為癰是也況其身已有痛處乎夫脈之見者陽也其將發而痛者亦屬陽故曰當癰師曰諸癰腫欲知有膿無膿以手掩腫上熱者為有膿不熱者為無膿補注邪客經絡則血必至於泣泣則衛氣歸之不得反復於是寒鬱則化熱熱勝則肉腐而為膿欲知成膿與否以手掩其上熱則透出否則未也師之所以教知者蓋已成欲其潰未成托之起也腸癰之病其身錯甲腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰膿薏苡附子敗醬散主之薏苡附子敗醬散方薏苡仁十分附子二分敗醬五分上三味杵為末取方寸匕以水二升頓服小便當下補注血積於內然後錯甲於外經所言也腸癰何故亦然耶癰成於內血泣而不流也惟不流氣亦滯遂使腹皮如腫按之仍濡雖其患在腸胃間究非腹有積聚也外無熱而見數脈者其為癰膿在裡可知矣然大腸與肺相表裡腑病而或上移於臟正可虞也故以保肺而下走者使不上乘附子辛散以逐結敗醬苦寒以祛毒而排膿務令膿化為水仍從水道而出將血病解而氣亦開抑何神乎腸癰者少腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也大黃牡丹湯主之大黃牡丹湯方大黃四兩牡丹皮一兩桃仁五十個瓜子半升芒硝三合上五味以水六升煮取一升去滓內芒硝再煎沸頓服有膿當下如無膿當下血補注腸癰而少腹不可按陽邪下結部位牽引也按之如淋形容痛狀情所必至夫血病而氣不病故小便自調然陽邪已盛衛氣斯虛遂發熱汗出而畏寒也癰證如是治之者須以膿成未成為異欲知之法舍脈無由脈遲緊知未熟為血瘀於內勿使成膿下之須早非桃仁承氣湯乎脈若洪數者則已成矣豈復有瘀可下此大黃丹皮以滌熱排膿勢所必用也然內經曰腸癰為病不可驚驚則腸斷而死故患此者坐臥轉側理宜徐緩少飲稀粥毋失調養斯善問曰寸口脈微而澀法當亡血若汗出設不汗者云何答曰若身有瘡被刀斧所傷亡血故也補注微則陽虛澀為血虛定理也故澀則亡血陽微當汗出若不汗者云何知汗為血液故汗多尚亡陽況去血乎然則驟為刀斧傷者陰去而陽亦隨衰陽雖衰而不能復汗者亡血故也病金瘡王不留行散主之王不留行散方王不留行十分八月八日採取蒴藋細葉十分七月七日採桑東南根白皮十分三月三日採川椒三分除目及閉口者去汗甘草十八分黃芩二分乾薑二分厚朴二分芍藥二分上九味桑根皮以上三味燒灰存性勿令灰過各別杵篩合治之為散服方寸匕小瘡即粉之大瘡但服之産後亦可服如風寒桑東根勿取之前三物皆陰乾百日浸淫瘡從口流向四肢者可治從四肢流來入口者不可治衍義從口向四肢由上及下由內及外散也火熱散則易消反聚則難治因久久愈熱也經云夏脈太過令人膚痛為浸淫蓋夏脈洪大心主火脈主心也故曰三部洪數心家熱舌上生瘡唇破裂然必非其時有其氣則然若立夏得洪大脈又非所論可知矣浸淫瘡黃連粉主之方未見衍義黃連瀉手少陰之火火去而氣血自復矣
