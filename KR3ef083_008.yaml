body:
  text: 卷八奔豚氣病脈證治第八論二首方三首師曰病有奔豚有吐膿有驚怖有火邪此四部病皆從驚發得之補注此仲景言奔豚之始本於驚故並及他病之亦因於驚者夫奔豚水獸也奔豚證腎病也經曰東方肝木病發驚駭夫肝為火之母故肝病則不足以生君火而所勝者侮之也肝為水之子故肝病則必至於擾腎水而所生者顧之也厥陰臟為藏血之地驚則氣凝氣凝則血滯故厥陰篇有嘔家癰膿膿儘自愈也陽明土本畏木者也木得邪助下克斯土故傳而為驚怖所以經謂見肝之病當先實脾也至肝病已不得水之滋養必熱甚生風故火熾而未得熄焉要之皆因於驚而隨人之所虛以致病焉耳師曰奔豚病從少腹起上衝咽喉發作欲死復還止皆從驚恐得之補注夫驚者實有可畏觸於我也因其可畏而惴惴焉恐惕惕焉懼則曰恐故驚則傷心恐則傷腎腎為作強之官受傷則邪氣斯盛心為神明之出受傷則正氣以衰水本剋火者也於是腎邪欲上凌心斯從少腹而上衝咽喉也何也夫少陰脈循喉嚨因其所繫之經而上衝殊便縱使土可制水乃由驚病肝則木氣足以勝土且因驚病心則火氣又不足以生土然則水氣之止亦其勢衰而復還耳豈誠陽明太陰足以堤防之耶奔豚氣上衝胸腹痛往來寒熱奔豚湯主之奔豚湯方甘草芎藭當歸各二兩半夏四兩黃芩二兩生葛五兩芍藥二兩生薑四兩甘李根白皮一升上九味以水二斗煮取五升溫服一升日三夜一服補注氣上衝胸較沖咽喉稍緩然腹痛明系木來乘土若往來寒熱少陽本病以厥陰與少陽相表裡也故以作甘者益土為制水半夏生薑消散積滯以辛溫去寒以苦寒解熱當歸益營芍藥止痛凡發於驚者皆以本湯主治即以病名湯發汗後燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上至心灸其核上各一壯與桂枝加桂湯主之桂枝加桂湯方桂枝五兩去皮芍藥三兩生薑三兩甘草二兩炙大棗十二枚上五味以水七升微火煮取三升去滓溫服一升補注奔豚北方腎邪也燒針令汗縱不合法與少陰何與而作奔豚蓋太陽相與表裡也針處被寒核起而赤吾知前此之邪未散而後此之邪復入矣惟桂能伐腎邪所以用桂加入桂枝湯中一以外解風邪一以內泄陰氣也各灸核上者因寒而腫惟灸消之也發汗後臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之茯苓桂枝甘草大棗湯方茯苓半斤甘草二兩炙大棗十五枚桂枝四兩上四味以甘瀾水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服補注汗本心之液發汗而臍下痛悸者心氣虛而腎氣動也腎邪欲上凌心故臍下先悸取用茯苓直趨腎界以泄其水氣故真武湯以此為君尚能攝外散之水坐收北方況於少陰藏中欲作未作者耶甘瀾水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之
