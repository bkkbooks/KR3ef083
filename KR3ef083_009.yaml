body:
  text: 卷九胸痹心痛短氣病脈證治第九論一首脈證六條方九首師曰夫脈當取太過不及陽微陰弦即胸痹而痛所以然者責其極虛也今陽虛知在上焦所以胸痹心痛者以其陰弦故也補註痹者痞閟而不通也經云通則不痛故惟痛為痹而所以為痹者邪入之其所以為邪入者正先虛也故曰脈取太過不及不及為陽微太過即陰弦陽虛故邪痹於胸陰盛故心痛仲景已自申說甚明乃知此證總因陽虛故陰得以乘之設或不弦則陽雖虛而陰不上干可知也然胸痹有微甚之不同則為治因亦異微者但通上焦不足之陽甚者且驅其下焦厥逆之陰通陽者以薤白白酒半夏桂枝人參杏仁之屬不但苦寒不入即清涼盡屏蓋以陽通陽陰分之藥不得預也甚者用附子烏頭蜀椒大辛熱以驅下焦之陰惟陰退而陽可以漸復耳可不留意乎平人無寒熱短氣不足以息者實也補註陽不足則陰上入而為寒陰不足則陽下陷而為熱陰陽未嘗偏勝故無寒熱如平人然短氣不足以息者是邪痹於中而滯其升降之氣不可信其中虛而輒補之以蹈實實之戒也胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數栝蔞薤白白酒湯主之栝蔞薤白白酒湯方栝蔞實一枚搗薤白半升白酒七升上三味同煮取二升分溫再服補註寒濁之邪滯於上焦則阻其上下往來之氣塞其前後陰陽之位遂令為喘息為咳唾為痛為短氣也陰寒凝泣陽氣不復自舒故沉遲見於寸口理自然也乃小緊數復顯於關上者何耶邪之所聚自見小緊而陰寒所積正足以遏抑陽氣故反形數然陽遏則從而通之栝蔞實最足開結豁痰得薤白白酒佐之既辛散而復下達則所痹之陽自通矣胸痹不得臥心痛徹背者栝蔞薤白半夏湯主之栝蔞薤白半夏湯方栝蔞實一枚搗薤白三兩半夏半升白酒一斗上四味同煮取四升溫服一升日一服補註胸痹痹在氣氣在上焦故即不言脈而與上條無異即證亦不甚相異也所異者止不得臥耳經云晝行於陽則寤夜行於陰則寐然則不得臥以氣之行於陽而不行於陰故也經以小半夏湯覆杯即臥非半夏為得寐藥也特以草生於夏夏半為一陰初生由陽入陰使氣歸於肝而血亦入焉故於本湯增此一味而能事畢矣可不謂神乎胸痹心中痞氣氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之枳實薤白桂枝湯方枳實四枚厚朴四兩薤白半升桂枝一兩栝蔞一枚搗上五味以水五升先煮枳實厚朴取二升去滓內諸藥煮數沸分溫三服人參湯方人參白朮甘草乾薑各三兩上四味以水八升煮取三升溫服一升日三服補註同一病也一用通痞去滿之藥一用辛散補中之味全不相謀謂治一證豈仲景自為矛盾耶不知證有久暫病有虛實也假如氣果有滯上焦痞滿下氣亦上逆不得不於通痹藥中加降氣消滿調和榮衛之藥也若夫病久而中氣大虛宗氣不利時時滿或從脅下搶心不用甘溫必不足以益中州之氣不用辛散且不足以破凝滯之陰氣足而清者自升濁者自降將結去而搶消矣又何痹之有焉胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之茯苓杏仁甘草湯方茯苓三兩杏仁五十粒甘草一兩上三味以水一斗煮取五升溫服一升日三服不瘥再服橘枳薑湯方橘皮一斤枳實三兩生薑半斤上三味以水五升煮取二升分溫再服補註胸痹既有虛實又有輕重故痹之重者必徹背徹心者也輕者不然然而何以亦言痹以其氣塞而不舒短而弗暢也然一屬手太陰肺肺有飲則氣每壅而不利故以茯苓逐水杏仁散結用之當矣又何取於甘草蓋以短氣則中土不足也土為金之母也一屬足陽明胃胃中實故君橘皮以理氣枳實以消滿且使積滯去而機竅通更加生薑之辛無處不宣靡有遏抑庶邪去而正自快此同一實證中而又有臟腑之別也胸痹緩急者薏苡附子散主之薏苡仁十五兩大附子十枚炮上二味杵為散服方寸匕日三服補註胸痹緩急者痹之急證也寒飲上聚心膈使陽氣不達危急為何如乎故取薏苡逐水為君附子之辛熱為佐驅除寒結席捲而下又烏能不勝任而愉快耶心中痞諸逆心懸痛桂枝生薑枳實湯主之桂枝生薑枳實湯方桂枝三兩生薑三兩枳實五枚上三味以水六升煮取三升分溫三服補註枳實生薑原以治氣塞況於痞乎故較前條稍減輕分兩使痞者下其氣以開之懸痛屬飲者得生薑以散之既足建功矣乃去橘皮而用桂枝者以所逆非一或腎氣上衝正未可知桂伐腎邪正其能事不但調和榮衛為去痞臣也心痛徹背背痛徹心烏頭赤石脂丸主之烏頭赤石脂丸方烏頭一分炮赤石脂一兩蜀椒一兩附子半兩炮乾薑一兩上五味末之蜜丸如梧子大先食服一丸日三服不知稍加服補註心痛徹背背痛徹心乃陰寒之氣厥逆而上乾者橫格於胸背經脈之間牽連痛楚亂其氣血紊其疆界此而用氣分諸藥則轉益其痛勢必危殆仲景用蜀椒烏頭一派辛辣以溫散其陰邪然恐胸背既亂之氣難安而即於溫藥隊中取用乾薑之泥赤石脂之澀以填塞厥氣所橫衝之新隊俾胸之氣自行於胸背之氣自行於背各不相犯其患乃除此煉石補天之精義也今人知有溫氣補氣行氣散氣諸法矣亦知有堵塞邪氣攻衝之竇令胸背陰陽二氣並行不悖者哉九痛丸治九種心痛非仲景方附子二兩炮生狼牙一兩炙香巴豆一兩去皮心熬研如脂人參乾薑吳茱萸各一兩上六味末之煉蜜丸如梧子大酒下強人初服三丸日三服弱者二丸補註丸以九名能治九種心痛吾不知其治何者為九也且兼治卒中惡腹脹痛口不能言又治連年積冷流注心胸痛並冷衝上氣落馬墮車血疾等皆主之由此言之則知熱以去冷辛以開鬱降以治逆香以散結甘以補正毒以攻毒萃群力於一方合諸毒而不顧用力少而成功多者正以君主之地無使竊發故無禮於側鷹鸇逐之況於胞絡受害不啻震驚輦轂者乎此寧速無寧緩者也然則火痛亦可治歟曰可何也此從治之法也觀落馬墮車以及血疾則皆因傷而滯或素有瘀所痛即不關於心者無不可治也明矣
