body:
  text: 卷十七嘔吐噦下利病脈證第十七論一首脈證二十七條方二十三首夫嘔家有癰膿不可治嘔膿儘自愈衍義上卷肺癰證必先咳而久久吐膿如米粥桔梗湯白散皆主之而此不言癰之所在知其非肺癰可知經曰熱聚於胃口而不行胃脘為壅胃脘屬陽明經陽明氣逆則嘔故膿不自咳出從嘔而出膿亦不似肺癰之如米粥者也出胃脘從濕化而聚結若如結痰蛤肉者謂不可治不必治其嘔嘔自膿之瘀熏蒸穀氣故嘔若膿出則嘔自愈夫癰之在胃脘上口者則然若過半中在肺之下者膿則不從嘔出而從大便出矣先嘔卻渴者此為欲解先渴卻嘔者為水停心下此屬飲家嘔家本渴今反不渴者以心下有支飲故也此屬支飲衍義傷寒言嘔多有因因熱因寒因水因飲皆屬胃家病此獨以水飲者分三節言之初一段先嘔卻渴者為飲而嘔嘔則飲去飲去則陽氣回津液猶未布故渴耳雖渴終以邪去正回而必解也第二段先渴卻嘔者即前痰飲條中小半夏茯苓湯主之第三段本渴今反不渴亦痰飲條中小半夏茯苓湯主之問曰病人脈數數為熱當消穀引食而反吐者何也師曰以發其汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下今脈反弦故名曰虛衍義凡脈以候病陽盛則數陰盛則遲今言陽微而脈數數而復胃中冷其理安在蓋脈病不可以概論也此數由藥之遺熱所客胃中冷由陽不足而致何也中焦者陰陽之界汗劑必用辛溫發散不當汗而汗損其中脘陽分致令陽微膈氣虛藥之遺熱從陰分而變遂成數脈古云客熱非陽盛也雖有客熱胃中之陽氣不足故曰胃中虛冷也醫反以寒劑瀉之復損陰分之陽故脈變弦上下之陽俱不足雖當日暮行陰之時陽亦不能入於下則糟粕不能輸大小腸不能輸將亦不能安於中必吐而復出也故曰胃氣無餘朝入而暮吐也寸口脈微而數微則無氣無氣則榮虛榮虛則血不足血不足則胸中冷衍義此條敘脈不敘證何也上條以脈數為客熱此獨言氣血虛又何也亦承上條而言也上條以汗下之過而致病脈之若是此條以上焦榮衛之不逮亦致反胃之證故不復敘惟言脈之本象陽脈動而健陰脈靜而翕兩者和合不剛不柔不疾不遲今微而數微乃失陽之象數乃失陰之體奚止客熱而已胸中榮衛之海榮衛虛而不充於中故胸中冷矣夫榮衛之氣出入臟腑健運周身本生於穀復消其谷榮衛非谷不實谷非榮衛不化所以胸中冷者亦必致胃不納穀也王冰釋內經曰食入反出是無火也雖然謂之冷當以正氣不足論之正氣者陰陽之精非寒非熱沖和純粹不宜以之為冷與寒邪同治若以熱治寒不惟反助客熱且復耗其氣損其陽矣所謂客熱者不獨以上條藥之所遺若五臟厥陽之火乘克於中土者皆足以客之況多得於七情郁發之所致歟夫膏粱之變皆足成客熱安可復投之以熱乎籲世人治是病非丁附則薑桂孰知正氣果何如則復也哉趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不能磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治衍義趺陽者胃脈之所過故候胃脈必於是焉脾與胃以膜相連皆屬於土土有陰陽胃為陽土脾為陰土陽主氣主動陰主血主靜今謂脾傷不能磨何哉此陰陽互為體用之義也蓋陽參於陰則陰能動而不為凝結陰參於陽則陽能固而不為飛揚斯脾動則脈不澀胃固則脈不浮若浮則胃家虛而谷不能腐熟澀則脾血傷而谷不得消磨所以在朝當陽時食入者至暮行陰時反出在暮當陰時食入者至陽時亦出以其兩虛不能參合莫得轉輸於大小腸也河間云趺陽脈緊為難治胃之上脘血亡則並膈間皆澀不利食不下入脾統血血亡並大小腸皆枯而糟粕不化食雖入必反出也病人慾吐者不可下之衍義欲吐以其邪在陽也若下不惟逆其治陽又反傷其無過之陰豈獨反胃而已其為害可勝言哉噦而腹滿視其前後知何部不利利之則愈補註噦者無物有聲之謂也腹滿為實實則氣上逆而作噦故必審其證視其前後何部以利之則滿去而噦自止矣嘔而胸滿者茱萸湯主之茱萸湯方吳茱萸一升洗人參三兩生薑六兩大棗十二枚上四味以水五升煮取三升溫服一升日三服衍義傷寒以是方治食谷欲嘔陽明證以中焦反寒也吳茱萸能治內寒降逆人參補益陽氣大棗緩脾生薑發越胃氣且散逆止嘔逆氣降胃之陽行則腹痛消矣此脾臟陰盛逆胃與夫腎肝下焦之寒上逆於中焦而致者即用是方治之若不於中焦其臟久寒者則以本臟藥化之如厥陰手足厥冷脈細欲絕內有久寒者於當歸四逆加吳茱萸生薑是也乾嘔吐涎沫頭痛者茱萸湯主之衍義此證傷寒厥陰證中成注乾嘔吐涎沫者裡寒是也頭痛者寒氣上攻也用是溫里散寒與上條嘔而腹滿者病異藥同蓋同是厥陰乘於土故也嘔而腸鳴心下痞者半夏瀉心湯主之半夏瀉心湯方半夏半升黃連一兩人參三兩乾薑甘草各三兩黃芩三兩大棗十二枚上七味以水六升煮取三升溫服一升日三服衍義傷寒論嘔而心下痞者有屬半表半裡亦有屬裡半表半裡者瀉心湯治屬裡者則以十棗湯大柴胡湯如心下痞腹中鳴有水氣不利則以生薑瀉心湯治有下利完穀不化則以甘草瀉心湯治治痞惡寒汗出者用附子關上脈浮者用大黃心下痞又不獨瀉心湯治或用解表或用和里或吐或下或調虛氣隨所宜而施治自今觀之是證由陰陽不分塞而不通留結心下為痞於是胃中空虛客氣上逆為嘔下走則為腸鳴故用是湯分陰陽水升火降而留者去虛者實成注是方連芩之苦寒入心以降陽而升陰也半夏乾薑之辛熱以走氣而分陰行陽也甘草參棗之甘溫補中而交陰陽通上下也乾嘔而利者黃芩加半夏生薑湯主之黃芩加半夏生薑湯方黃芩三兩甘草芍藥各二兩半夏半升生薑三兩大棗十二枚上六味水六升煮取三升溫服一升日三服衍義傷寒論太陽與少陽合病自下利若嘔有黃芩加半夏生薑湯主之成注太陽陽明合病自下利為在表與葛根湯發汗陽明少陽合病自下利為在裡可與承氣湯下之太陽少陽合病為半表半裡則以是湯和解之論方藥主治則曰黃芩之苦芍藥之酸以斂腸胃之氣甘草大棗之甘以補腸胃之弱半夏生薑散逆也諸嘔吐谷不得下者小半夏湯主之衍義嘔吐谷不得下者有寒有熱不可概論也屬熱者王冰所謂谷不得入是有火也此則非寒非熱由中焦停飲氣結而逆故用小半夏湯嘔吐而病在膈上後思水者解急與之思水者豬苓散主之豬苓散方豬苓茯苓白朮各等分上三味杵為散飲服方寸匕日三服衍義傷寒論太陽病發汗後胃中干欲得水者少少與之令胃中和則愈若小便不利微熱消渴者不可與以汗多胃中燥豬苓湯複利其小便故也蓋嘔吐猶汗之走津液膈上猶表也何用藥不同蓋二方以邪內連下焦故不用澤瀉滑石阿膠豬苓之味淡從膈上肺部滲其積飲又防水入停腹白朮和中益津使水精四布去故就新奚必味多但用之得其當爾嘔而脈弱小便複利身有微熱見厥者難治四逆湯主之四逆湯方附子一枚生用乾薑一兩半甘草二兩炙上三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩衍義谷入於胃長養於陽脈道乃行今胃不安於谷以致嘔故其氣不充於脈則脈弱下焦虛則小便自利迫陽於表則微熱經脈虛則寒厥夫陽者一身之主內外三焦虛寒如此誠難治矣苟有可回之意必以四逆回陽卻陰也嘔而發熱者小柴胡湯主之衍義傷寒論出太陽證又出厥陰證小柴胡湯本少陽半表半裡藥也何為太陽厥陰亦治之蓋太陽傳裡而未盡入厥陰受傳而未盡受二者俱在半表半裡之間故嘔而發熱病同方亦同也自此而言病之半表半裡豈獨傷寒有哉故更集要略胃反嘔吐者大半夏湯主之大半夏湯方半夏二升洗人參三兩白蜜一升右三味以水一斗二升和蜜揚之二百四十遍煮取二升半分溫再服衍義陽明燥金也與太陰濕土為合腑臟不和則濕自內聚為痰為飲燥自外款為胃脘癰玄府幹涸而胃之上脘尤燥故食難入雖食亦反出也半夏解濕飲之聚結分陰陽散氣逆人參補正蜜潤燥以揚水之者內經云清上補下治之以緩水性走下故揚以緩之佐蜜以潤上脘之燥也食已即吐者大黃甘草湯主之大黃甘草湯方大黃四兩甘草一兩上二味以水三升煮取一升分溫再服論曰胃氣生熱其陽則絕蓋胃強則與脾陰相絕絕則無轉運之機故食入即吐也用大黃瀉大熱甘草和中耳王宇泰先生曰病人慾吐者不可下之又用大黃甘草治食已即吐何也曰欲吐者其病在上因而越之可也而逆之使下則必抑塞憤亂而益以甚故禁之若既已吐矣吐而不已有升無降則當逆而折之引令下行無速於大黃故取之也胃反吐而渴欲飲水者茯苓澤瀉湯主之茯苓澤瀉湯方茯苓半斤澤瀉四兩白朮三兩甘草二兩桂枝二兩生薑四兩上六味以水一斗煮取三升內澤瀉再煮去滓二升半溫服八合日三服衍義胃反吐津液竭而渴矣斯欲飲水以潤之更無小便不利而用此湯何哉蓋陽絕者水雖入而不散於脈何以滋潤表寒解其燥郁乎惟茯苓之淡行其上澤瀉之咸行其下白朮甘草之甘和其中桂枝生薑之辛通其氣用布水精於諸經開陽存陰而洽榮衛也吐後渴欲得水而貪飲者文蛤湯主之兼主微風脈緊頭痛文蛤湯方文蛤五兩麻黃甘草生薑各三兩石膏五兩杏仁五十枚大棗十二枚上七味以水六升煮取二升溫服一升汗出即愈衍義是湯即大青龍去桂枝加文蛤也大青龍主發散風寒兩受此證初無外邪而用之何哉夫天地之氣人之飲食之氣分之雖殊合之總屬風寒濕熱之氣化耳足太陽膀胱本寒水之經也先因胃熱而吐用竭其津遂渴欲飲水飲多則水氣內凝其寒外應而腠理閉矣故將文蛤散水寒麻黃杏仁開腠理利肺氣甘草薑棗發榮衛石膏解肌表內外之鬱熱也而又謂主微風脈緊頭痛者何蓋風熱循膀胱上入巔覆其清陽則為頭痛而腎邪亦從而泛溢故同一主治也乾嘔吐逆吐涎沫半夏乾薑散主之半夏乾薑散方半夏乾薑等分上二味杵為散取方寸匕漿水一升半煮取七合頓服之衍義乾嘔吐涎沫者由客邪逆於肺肺主收引津液不布遂聚為涎沫也用半夏乾薑之辛熱溫中燥濕漿水之寒收而行之以下其逆則其病自愈矣病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者生薑半夏湯主之生薑半夏湯方生薑汁一升半夏半升上二味以水三升煮半夏取二升內生薑煮取一升半小冷分四服日三夜一嘔止停後服衍義夫陽受氣於胸中布氣息為呼吸胸中心肺之分清氣之道也陰邪閉之則阻其呼吸往來令氣或促或搏或逆有似喘嘔與噦也且心舍神者也聚飲停痰則神不寧故徹心憒憒然無奈也用半夏之辛溫燥其濕飲生薑之辛熱散寒折逆則陽得以布氣得以調斯病可愈耳按此方與小半夏湯相同而取意少別小半夏湯宣陽明之氣上達故用半夏為君生薑為佐半夏湯通陽明之經故用薑汁為君半夏為佐取其行於經絡故用汁也乾嘔噦若手足厥者橘皮湯主之橘皮湯方橘皮四兩生薑半斤上二味以水七升煮取三升溫服一升下咽即愈噦逆者橘皮竹茹湯主之橘皮竹茹湯方橘皮二升竹茹二升大棗三十枚生薑半斤甘草五兩人參一兩上六味以水一斗煮取三升溫服一升日三服衍義中焦者脾胃也土虛則在下之木得以乘之而穀氣因之不宣變為噦逆用橘皮理中氣而升降之人參甘草補土之不足生薑大棗宣發穀氣更散其逆竹茹性涼得金之正用之以降膽木之風熱耳夫六腑氣絕於外者手足寒上氣腳縮五臟氣絕於內者利不禁下甚者手足不仁衍義六腑主表為陽五臟主裡為陰陽為衛陰為榮六腑絕衛先不行於外故手足寒陽主升在息為呼外絕則氣上出出而不返則下絕下絕則筋急故腳蜷縮也五臟絕榮先不行於內則陰氣去大便屬陰故下利不禁甚則血離於外故手足不仁下利脈沉弦者下重脈大者為未止脈微弱數者為欲自止雖發熱不死衍義仲景傷寒論厥陰證中注云沉為在裡弦為拘急裡氣不足主下重脈大則病進為利未止脈弱數者邪氣微而陽氣復為欲自止雖發熱正由陽勝非邪逆也成注如此然弱陰不敵所回之陽發熱甚者亦必治之但不死而已恐亦不宜大熱內經曰下利發熱者死雖然不惟厥陰少陰下利亦然傷寒論謂脈緊下利脈暴微手足溫利自愈又謂下利手足不逆冷反發熱者不死是皆少陰下利者說也非滯下之利滯下則多熱若更發熱必難治下利手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負趺陽者為順也衍義手足諸陽之本十二經脈之所由起也論曰脈者血之府氣主煦之血主濡之是氣司脈之動息血充脈之形體也血不自至必氣以運之氣即陽也火也若陰寒之氣盛則陽火之氣衰不能布散通於經脈津液亦不行聚而下利所以脈無而手足冷矣若殘陽尚根於中未竭於臟者則以艾灸接引孤宿之火布散經脈手足溫則生其陽已絕於臟止息呼吸之息用艾灸之無根之陽反從艾火上炎奔迫為喘而脫矣故死夫趺陽胃脈土也少陰腎脈水也負者克也若少陰受負於趺陽是後天之陽尚存陰寒猶可回也仲景謂下利脈不出者屬少陰灸少陰穴此雖不言所灸之處系厥陰證中則必當灸厥陰之穴也下利有微熱而渴脈弱者令自愈衍義此條亦在厥陰證中以上條發熱下利觀之若同而異以脈弱數為陽復而陽勝惟言不死耳此脈獨弱乃陰退陽復在表作微熱在裡作渴終不與熱甚更勝者同故曰自愈雖然病在乎審察毫釐不惟熱有微甚渴亦不可一途論也如少陰傷寒五六日自利而渴小便白者則為腎虛引水自救病之變端豈一言可盡乎下利脈數有微熱汗出令自愈設脈緊為未解衍義厥陰證中注謂下利陰證也脈數陽病也陰病見陽脈者生微熱汗出陰氣得通也雖然本經亦自有陰陽退復之義何也內經曰厥陰之下中見少陰厥陰者兩陰交盡而陽乃復陰是其本陽是其標從本則寒從標則熱所以厥陰不治標本從乎中治此下利者是其本之陰寒過也微熱是其標之陽火復也復則內之陰邪從而之表發熱汗出而散散則標本和不治自愈設脈緊為寒勝故未解下利脈數而渴者令自愈設不瘥必圊膿血以有熱故也衍義仲景少陰證中下利便膿血者悉屬虛寒以桃花湯主治留聚者刺之此厥陰圊膿血者何蓋為脈數而有熱也少陰桃花主者脈必不數也此數非先有熱初因陰盛而後陽復勝之故數脈數而渴令自愈以陽復而可退其陰寒也更不瘥則是復之過更勝其陰逐陽熱而圊膿血也非若上條微熱而渴脈弱者脈弱則熱不甚不甚則不能更勝惟與陰和而已脈數下利又不止故成協熱也下利脈反弦發熱身汗者自愈衍義此脈初不弦後乃弦故曰脈反弦弦者必輕虛春脈也見少陽之氣升發矣陽氣久為陰寒所覆下陷聚液成利一旦得升發之攻其陰邪從而之表發汗而散故利自愈與上條脈數微熱汗出不同其自表而解之義則同也下利氣者當利其小便衍義下利氣者氣與邪俱下也由氣不化以致水穀不分並於下焦而成利然陰前通則陽氣行氣行則水穀分而利止矣下利寸脈反浮數尺中自澀者必圊膿血衍義此證傷寒厥陰篇中雲寸以候陽尺以候陰陽為氣陰為血下利本屬陰寒之病當脈沉今反寸脈浮數則是陽盛於上而下不與陰和陰血也血不得與氣和則不榮經不藏於肝則散入腸胃故尺脈澀血積為膿也須用利而出之下利清穀不可攻其表汗出必脹滿衍義成注下利者屬胃虛也胃為津液之府發汗亡液故胃愈虛必脹滿固也何仲景不敘陽明太陽病中而敘於厥陰證蓋有說焉清穀非飧泄歟內經曰清氣在下則生飧泄清陽之氣即蒼天之氣自肝木而生少陽主生氣者也其氣當升發於上若反入於下則穀氣升轉不得舉矣故食入則完出清陽下陷即少陽伏於厥陰之中今不從厥陰起其少陽乃反攻無辜之表強發胃中谷氣之津液故虛其胃而作脹滿也補辯厥陰下利與竟下利有別何以名厥陰以邪傳是經耳經何以下利以厥陰經雖非藏由里行故厥陰必下利也厥陰下利有本經現證何謂不敘於太陽陽明病中如二陽經亦有下利此為協熱乃先救里之說在何先生亦昧此下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也衍義成注下利清穀脈沉而遲里有寒也面少赤身有微熱表未解也病人以下虛漸厥表邪欲解臨汗之時以裡氣先虛必鬱冒然後汗出而解以余觀之仲景敘六經形證未嘗不由表而入里豈可便以身微熱為表邪未解乎寧知不因邪入厥陰也厥陰氣化為裡寒格陽於外而然也裡寒則下利清穀必微厥陽格於外則身微熱格於上則面赤故曰面戴陽而下虛下虛者為下無陽也然陽欲復必深入與陰爭陰雖不得拒格然猶散走發其陽而陽不得宣通怫熱神昏故為鬱冒鬱冒然後陽勝而陰出為汗矣下利後脈絕手足厥冷晬時脈還手足溫者生脈不還者死衍義亦在厥陰證中脈者氣血之候下利脈絕不惟無陽亦且無陰氣血養神者也氣血亡其脈亦絕晬時復還手足溫此可見氣血暫息耳故生脈不還則亡矣故死所謂生者非不治自生救其氣血止其利也如前條無脈而厥灸之者亦是治之而生又少陰下利清穀手足厥逆脈微欲絕者以通脈四逆治利止脈不出加人參補正以救其亡血病有二經之異然厥而無脈則一此證利止手足溫脈還始可治下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯衍義出厥陰證中蓋內有虛寒故下利腹脹滿表邪未解故身體疼痛以下利為重先治其里後治其表者若傷寒論太陽證以醫下之續得下利清穀身疼痛者當先以四逆治其里清便自調然後以桂枝救其表即此意下利三部脈皆平按之心下堅者急下之宜大承氣湯衍義傷寒論堅作硬注曰下利脈當微今反和者此為內實也下利三部脈平此非和平之平氣下泄矣或有宿食寒熱結於中焦故硬則邪甚也宜大承氣下之下利脈遲而滑者實也利未欲止急下之宜大承氣湯行義成注脈遲者食乾物得之滑者穀氣實脾胃不消水穀以致下利者與大承氣去宿食利自止矣下利脈反滑者當有所去下乃愈宜大承氣湯衍義下利虛證也脈滑實證也以下利而反見滑脈者當有所去也上章以內實而阻經氣故兼遲此乃滑動而欲去故惟見滑然皆有形之實證故並用大承氣下利已瘥至其年月日時復發者以病不盡故也當下之宜大承氣湯衍義因四時之氣所感而為積者必有所合之臟蓄之病下利已去不盡非其時則所感之臟氣不旺故積伏而不動再遇其時則乘旺而動動則下利自作腸胃病積聚不盡故當下之下利譫語者有燥屎也小承氣湯主之衍義傷寒論凡譫語燥屎悉在陽明此獨出厥陰病成注譫語燥屎為胃實下利為腸虛不言厥陰之由何也嘗考陽明證無下利論惟與少陽合病者有之少陽木剋土而下利也若自利則為陽陷下必死然則傷寒以陽明無下利者陽明乃兩陽合明屬熱其手經更屬之燥金經主合於是燥熱易於閉結津液易於耗竭更遇邪熱入腑熱甚為譫語燥甚為屎結故陽明無下利病也今下利多出厥陰者乃兩陰交盡之極而復升如邪熱傳入於陰屈而未得伸者遂從其陰降而為下利矣故下利證多少陰厥陰也蓋陽明燥金屈其木不得升遂為厥陰下利之證厥陰盡而變升者又是蒼天之氣清淨清氣貴乎發越內經清氣在下則飧泄也在傷寒邪熱所傳言之陽明無下利證若經氣可屬者言之則陽明病下利亦多矣陽明與太陰為表裡盡屬於濕經曰濕勝則濡泄陽明又屬燥金一臟一腑亦常更勝太陰勝則內外俱濕故身重而瀉陽明勝則燥熱鬱甚亦宜有燥屎焉不必外之傳熱而後有也故宜下豈獨傷寒已哉下利便膿血者桃花湯主之桃花湯方赤石脂一斤半篩半銼乾薑一兩粳米一升上三味以水七升煮米熟去渣內方寸匕日三服一服愈止後服衍義此少陰證少陰腎水也腎寒則水盛與血相搏滲入腸間積久化腐遂成便膿成注下焦不約而裡寒用赤石脂寸匕日三服一服愈即止澀以固腸胃虛脫乾薑散寒粳米補胃然赤石脂在血理血在水理水在脫則固在澀則行所以知其行泣也本草用治難產胎衣不下乾薑非惟散寒且能益寒止血欲諸藥入腸胃必粳米引之也雖然有不可固者如雲便膿血者可利利非行氣血乎然氣血欲行者不可溫溫者不可行二者實相反仲景兩出之後人不可不審也若成注陽明下利便膿血者協熱也豈陰經病盡屬臟寒而不有其邪熱蓄之者乎病邪相乘不可一言窮矣仲景不過互相舉例以俟後人之消息處治耳熱利下重者白頭翁湯主之白頭翁湯方白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取三升去滓溫服一升不愈再服衍義此亦厥陰證中成注熱傷氣氣虛不利則後重下焦虛以絕苦之味堅之雖然後重不可概論前條有下利沉弦者下重為氣虛寒不能升舉也然亦有熱傷為氣滯閉塞者有血虛者有血泣者大孔痛亦然不獨氣虛不能升也大率皆固燥氣外郁束斂所致劉河間謂下利由燥郁腸胃之外濕聚腸胃之內又謂血行則糞自止氣行則後重除解燥郁必分寒熱之微甚熱微用辛溫以行氣熱甚用苦寒以治熱張子和歌曰休治風休治燥治得火時風燥了血虛補之泣者行之血調則氣和氣和則鬱解用苦寒以治燥寧獨堅其下焦之虛乎要略於下利一證獨引傷寒少陰厥陰二論為多然其論中又先指何經今則去其經與各部所病之原將謂傷寒有傳變之故雜病則不問其傳否隨所病處而云故耳產後下利虛極亦用白頭翁湯者可概見矣下利後更煩按之心下濡者為虛煩也梔子豉湯主之梔子豉湯方梔子十四枚炒香豉四合綿裹上二味以水四升先煮梔子湯二升半內豉煮取一升半去滓分二服進一服得吐則止衍義傷寒論太陽病用藥下後而虛煩者仍敘太陽證中此必自下利虛煩不由他故注故敘厥陰證中雖有二經之異然熱乘虛入客病煩則一皆用梔豉湯之苦吐其客熱也下利清穀裡寒外熱汗出而厥者通脈四逆湯主之通脈四逆湯方甘草二兩乾薑三兩附子一枚生用蔥白四莖上四味以水三升煮取一升二合去滓分溫再服衍義裡寒外熱格陽於外也陽不得內和故下利清穀陰不得外和故發身熱凡汗出於陰陽氣和則熱解此出於相格故熱不去而陽氣反虛不能布於手足而厥不止者死發熱汗不止者亦死此二證兼之猶可治者為其厥未至陽絕汗未至陰脫也方見解明理論矣然尚有可言者附子之熱走而不止通行經脈自里達表以至手足汗止治厥也乾薑之熱止而不走內守腑臟消穀養正溫補中氣以和陰陽解其拒格更調二藥之走止合適其用也下利肺痛紫參湯主之紫參湯方紫參半斤甘草三兩上二味以水五升先煮紫參取二升內甘草煮取一升半分溫三服衍義下利腸胃病也乃云肺病何哉此大腸與肺合故也大抵腸中積聚則肺氣不行肺有所積大腸亦不固二害互為病大腸病而氣塞於肺者痛肺有積者亦痛痛必通用紫參本草謂主心腹積聚療腸胃中熱積九竅可通大小腸可利逐其陳開其道佐以甘草和其中外氣通則愈積去則利止注云非仲景方以紫參非仲景常用也氣利訶黎勒散主之訶黎勒方訶黎勒十枚煨上一味為散粥飲和頓服衍義治病有輕重前言氣利惟通小便此乃通大便蓋氣結處陰陽不同舉此二者為例六經皆得結而為利各有陰陽也訶黎勒有通有澀通以下涎消宿食破結氣澀以固腸脫佐以粥飲引腸胃更補虛也
