body:
  text: 卷十腹滿寒疝宿食病脈證治第十論一首脈證十六條方十二首趺陽脈微弦法當腹滿不滿者必便難兩胠疼痛此虛寒從下上也當以溫藥服之補注嘉言云趺陽脾胃之脈而見微弦為厥陰肝木所侵侮其陰氣橫聚於腹法當脹滿有加設其不滿陰邪必轉攻而上決無輕散之理蓋陰邪既聚不溫必不散陰邪不散其陰竅必不通故知其便必難勢必逆攻兩胠而致疼痛較腹滿更進一步也虛寒之氣從下而上由腹而胠才見一斑亟以溫藥服之俾陰氣仍從陰竅走散而不至上攻則善矣衍義仲景所謂此虛寒自下上也當以溫藥服之包舉陰病證治了無剩義蓋寒從下上正地氣加天之始用溫則上者下聚者散直捷通快一言而終故卒病論雖亡其可意會者未嘗不宛在也愚按趺陽為足陽明胃在跗上五寸間夫府陽也土本大今微弦陰脈也脈微者本虛必有乘之者矣故兼木脈克賊隨之中州之氣衰安能清升而濁降乎腹滿必至理自然也設不滿則真陽既不足以生土是命門大虛而膀胱之氣亦不化何者胃固司腎之開闔者也便既難則兩胠不但拘急而疼痛矣總之腎氣一衰不傳於胃必傳膀胱故曰虛寒自下上也然則舍溫法何以為治乎吾知腹滿者必附子理中便難者八味丸甚者四逆湯仲景即不出湯而意已躍然言外病者腹滿按之不痛為虛痛者為實可下之舌黃未下者下之黃自去補注夫腹滿亦有屬實實則非虛寒也明矣豈概以溫藥治之乎故有試之之法痛與不痛虛實較然矣蓋胃實必熱熱蒸必舌黃黃土色也下其實熱黃不自已乎有此一辨並虛者愈審已病者萎黃躁而不渴胸中寒實而利不止者死補注嘉言云萎黃乃中州土敗之象躁而不渴乃陰盛陽微之象胸中寒實乃堅冰凝沍之象加以下利不止此時即極力溫之無能濟矣蓋堅在胸而瘕在腹堅處拒藥不納勢必轉趨其瘕而奔迫無度徒促其臟氣之絶耳孰謂虛寒下利可不乘其胸中陽氣未漓陰寒未實早為溫之也乎衍義此論寒證亦有實者實者何邪實也蓋惟正虛而邪實也虛屬真陽虛本腎實屬胃家實因寒夫惟無火不能消腐故多滯多泄也言其形則萎黃證則躁而不渴何也躁為陰躁不渴則正陰凝之象也嗟乎陽不生則寒不去寒不去則利又何能止耶腹滿時減復如故此為寒當與溫藥補注曰時減非竟不滿也若不滿則病已愈矣不復如故矣今則不然時或稍可乃復如故則非實滿可知也實則未有或減者也故斷斷為寒寒無不溫虛無不補此正法也寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒也補注前既言寒疝矣此則言其脈與證也夫弦陰脈也上見寸口已非若發榮滋長之木合旺於春者比矣故拘急而痛應在脅下脅下者肝之幕也為寒所持冷冽之氣自不舒容寒常在則惡亦不已也試觀其人知內氣之餒矣夫中寒家喜缺其人清涕出發熱色和者善嚏補注惡寒數缺衛氣虛也衛既不固則寒易乘而中氣自餒故喜缺然則肺主皮毛外受邪而肺氣有不傷者乎清涕之出勢所必至也若夫陽氣稍復則寒邪自衰而陰凝之色亦自此而消解邪之出亦從肺開故經曰已而嚏中寒其人下利以裡虛也欲嚏不能此人肚中寒補注寒之所中不外陰陽兩經然寒即中陰亦曰經耳何以即利以陰經循乎里也然寒又何以即中陰經以陽氣大衰邪即中里故云裡虛也裡虛下利陽氣不能上升故欲嚏而未能乃知陰寒內凝陽氣未復不若前條之所傷者在皮毛間也夫瘦人繞臍痛必有風冷穀氣不行而反下之其氣必沖不沖者心下則痞也補注臍位乎陰繞之而痛必有所閟而不通者況瘦人則榮氣素薄者乎或風或冷其有襲之者矣風冷既入則必陽不盛陽既不盛孰為消腐水穀治之者必以辛溫之味鼓散其邪庶幾可已乃反以寒藥下之則其邪必不服猶之太陽反下其氣上衝也經謂氣上衝胸邪在大腸若不上衝則其邪尚在於胃經又謂客氣上逆而心下痞也病腹滿發熱十日脈浮而數飲食如故厚朴七物湯主之厚朴七物湯方厚朴半斤甘草三兩大黃三兩枳實五枚桂枝二兩生薑五兩大棗十枚上七味以水一斗煮取四升溫服八合日三服嘔者加半夏五合下利去大黃寒多者加生薑至半斤補注此有里復有表之證也腹滿而能飲食亦熱邪殺穀之義發熱脈浮數此表邪正熾之時故以小承氣治其里桂枝去芍藥以解其表內外兩解渙然冰釋即大柴胡湯之意也以表見太陽故用桂枝耳腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子梗米湯主之附子粳米湯方附子一枚炮粳米半升半夏半升甘草一兩大棗十枚上五味以水八升煮米熟湯成去滓溫服一升日三服補注嘉言云腹中陰寒奔迫上攻胸脅以及於胃而增嘔逆頃之胃氣空虛邪無所隔徹入陽位則殆矣是其除患之機所重全在胃氣乘其邪初犯胃尚自能食而用附子粳米之法溫飽其胃胃氣溫飽則土厚而邪難上越胸脅逆滿之濁陰得溫無敢留戀必還從下竅而出曠然無餘此持危扶顛之手眼也愚按人之生陽氣為之耳陽氣生於下焦盛於中而會於上豈得復有寒乘之於是陰陽通清濁分而上下因以位由是清氣上升遂不致於下陷濁氣下降亦不至於上僭也若使腹中有寒則入者已不化承者已不生又何能生克不瘥腑臟相安乎於是為雷鳴為切痛為胸脅間逆滿勢必至於嘔吐不已者無他地氣之寒為之也試觀氣寒者於天時則為嚴寒於王事則為兵刑去生不幾遠乎故聖人以附子回陽湯陽回而寒氣去矣以半夏散滿滿散而嘔吐止矣若論養胃何如粳米安脾何如甘味此言痛之因於寒寒則未有不本於虛者也痛而閉者厚朴三物湯主之厚朴三物湯方厚朴八兩大黃四兩枳實五枚上三味以水一斗二升先煮二味取五升內大黃煮取三升溫服一升以利為度補注此又言痛之實證也閉者氣已滯也塞也經曰通因塞用此之謂也於是以小承氣通之乃易其名為三物湯者蓋小承君大黃以一倍三物湯君厚朴以一倍者知承氣之行行在中下也三物之行因其閉在中上也繹此可啓悟於無窮矣按之心下滿痛者此為實也當下之宜大柴胡湯大柴胡湯方柴胡半斤半夏半斤洗黃芩芍藥各三兩生薑五兩枳實四枚炙大棗十二枚大黃二兩上八味以水一斗二升煮取六升去滓再煎溫服一升日三服補注心下者胸也滿且痛不屬有形乎故曰實實則當去然何取於大柴胡湯柴胡表藥也非有外邪無取兩解乃必出於此者正以實則必滿按則必痛以至內發熱津液耗而元氣下陷勢所必至也故仲景以柴胡升清陽為主治而散滿者去熱者收陰者下結者各有分治且兼薑棗以益脾液取意豈淺鮮哉腹滿不減減不足言當須下之宜大承氣湯大承氣湯方大黃四兩酒洗厚朴半斤去皮炙枳實五枚炙芒硝三合上四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微煮一二沸分溫再服得下余勿服補注大承氣大下藥也在傷寒入腑每每慎戒何宿食而遽可用乎觀上腹滿不減減不足言二句吾知必用下如大柴胡等而不為稍減須大下之不可觀望以坐耗胃家津液耳心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛不可觸近大建中湯主之大建中湯方蜀椒二合乾薑四兩人參二兩上三味以水四升煮取二升去滓內膠飴一升微火煎取一升半分溫再服如一炊頃可飲粥二升後更服當一日食糜溫服之補注上中二焦所以受寒邪者皆由於中氣素虛也虛則陽氣不布而所積者為寒飲所沖者為寒氣所濕者有影無形為寒痛故取辛熱之品以散其邪甘溫之味以培其土則中州已圮而復立矣故名曰大建中脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜大黃附子湯大黃附子湯方大黃三兩附子三枚炮細辛二兩上三味以水五升煮取二升分溫三服若強人煮取二升半分溫三服服後如人行四五里進一服補注此寒邪之在中下二焦也脅下屬厥陰之部分於此偏痛必有所積積而至於發熱其為實可知也乃視其脈不滑數而緊弦洵為陰脈果是陰邪結於陰位矣且緊屬痛固因寒而痛弦為實亦因寒而實故非下則實不去非溫則寒不開然肝腎同一治也厥陰之實系少陰之寒而實苟不大用附子之熱可獨用大黃之寒乎入細辛者通少陰之經氣也以寒實於內而逼陽於外也或里有寒表有熱俱未可定也仲景於附子瀉心湯中既用三黃復用附子以畏寒汗出陽氣之虛在於外也此大黃附子湯陰氣之結深於內也然則痞證用三黃固正治之法偏痛用大黃豈非從治之法乎合觀之知有至理存焉矣寒氣厥逆赤丸主之赤丸方烏頭二兩炮茯苓四兩細辛一兩千金作人參半夏四兩洗上四味末之內真硃砂為色煉蜜為丸如麻子大先食飲酒下三丸日再夜一服不知稍增以知為度補注寒氣厥逆下傳於上明系君火既衰而腎家之真陽亦不足故上逆者兼有水泛以凌君火之意為害不淺況陰霾僭乘濁流為患於是以大熱大猛之力始有補天浴日之量兼用攝水氣通陽氣散陰氣而不敢後也然猶恐寒逆特甚復以硃砂之赤色者可以鎮君火性重者可以墜濁陰名曰赤丸殆畏水寒之侮火也腹痛脈弦而緊弦則衛氣不行即惡熱緊則不欲食邪正相搏即為寒疝寒疝繞臍痛若發則自汗出手足厥冷其脈沉緊者大烏頭煎主之大烏頭煎方烏頭大者五枚熬去皮不㕮咀上以水三升煮取一升去滓內蜜二升煎令水氣盡取二升強人服七合弱人服五合不瘥明日更服不可一日再服補注寒入既深則陽氣閟而為痛陰氣內凝無沖和之度使衛外者不固而不耐寒中臟者既虛而不欲食於是邪正兩不服搏結於臍之偏旁而為疝也所積既久有所觸動即復發作然必自汗者何也傷寒中衛則不能有汗謂邪自外入蔽其氣也若寒之在腹者則自不令陽固乎外矣又必手足厥冷者何也寒邪中陰則必至於厥逆謂陰氣內深遏其陽也況痛並繞臍則脾屬四肢而真陽大衰矣非用大熱大力何以建驅除之功於是思天下之熱且雄猛者莫過烏頭更非多用不可也佐以蜜者熱則必燥益之以潤也寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯主之當歸生薑羊肉湯方當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮二兩白朮一兩加生薑者亦加水五升煮取三升二合服之補注疝主寒氣入里腹與脅不言定左右也故但言衝脈者為非何者沖為肝之幕但言沖豈疝必偏於左而不屬於右耶故不分指之即是統言之乃以當歸走血生薑散邪羊肉補中有發屢試屢驗亦已神矣寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當烏頭桂枝湯主之抵當烏頭桂枝湯方用烏頭一味以蜜二斤煎減半去滓以桂枝湯五合解之得一升後初服二合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病補注寒氣非烏頭不治此則全以蜜熬熬成即膏矣乃復以桂枝湯解之者正以桂枝主手足也況味甘正以扶脾蜜與桂合又得建中之意歟以逆冷不仁身痛及諸治不效者似皆中州之憊為之也其脈數而緊乃弦狀如弓弦按之不移脈數弦者當下其寒脈緊大而遲者必心下堅脈大而緊者陽中有陰也可下之補注夫曰疝氣則寒者特氣凝而不化非誠有積滯於其間也雖然氣既凝則血必滯熱則流通寒必結聚理之常也假如因寒而有聚者於法不得不去又於何知之故聖人反復以言脈也脈者血氣之會也有虛有實殆必見焉故數緊乃弦狀至按而不移其為寒也不得謂之虛矣夫數者陽也弦者陰也緊且遲陰也大則陽也大既陽也緊又陰也疝為陰脈合矣而又兼見陽是必有滯故曰可下然所下者何曰下其寒曰陽中有陰已出手眼矣其即以溫藥下之之義乎問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食大承氣湯主之補注寸口即氣口也宿食停滯關與寸浮大有力是不待言若按之反澀知中有所傷阻抑中氣不得宣越遂令尺中亦微澀所滯之物原已深重設不大下所傷不亦多乎然余觀傷寒下例用大承氣非試不敢漫投甚以不可輕攻為戒何至宿食更無顧忌耶蓋既無外感則不致有結胸痞痛之變證可知也且有惡食不大便或實滿之裡證可知也又何憚而不為此脈數而滑者實也此有宿食下之愈宜大承氣湯補注數為在腑食積於胃而為熱故顯數遂使各部顯有餘之象乃兼滑苟不急下其為熱耗津液何限乎下利不欲食者有宿食也當下之宜大承氣湯補注不欲食言傷食惡食也脾土受傷不能健運豈能去故而新是謀乎蓋言受病未幾而利數旁流雖下利而積聚未消也苟久利之後中州敗壞致不能食者即欲溫補尚恐難救豈可反用承氣讀者當於下利不欲食句著眼始知下利為宿食不欲食亦止因宿食也宿食在上脘當吐之宜瓜蒂散瓜蒂散方瓜蒂一分熬黃赤小豆一分煮上二味各別搗篩為散已合治之取一錢匕以香豉一合用熟湯七合煮作稀糜去滓取汁和溫服頓服之不吐者少少加得快吐乃止諸亡血虛家不可與之補注食既云宿決非上脘既非上脘何以用吐今言上脘又言宿食則必有痰載物不使得下則為喘為滿不能具見故一吐而痰與食俱出矣脈緊如轉索無常者有宿食也補注緊至於轉索無常此胃氣垂絶之象亦已危矣又或停滯冷物遂令胃氣不復發越耳脈緊頭痛風寒腹中有宿食不化也補注傷食者不頭痛今頭痛故知或風或寒乃浮緊又寒脈也若但緊不浮則知腹有所滯雖兼外邪因不見浮治之者須知內傷外感用藥自有分寸而不急於下也明矣
