body:
  text: 卷十三消渴小便不利淋病脈證治第十三脈證九條方六首厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食即吐蝤下之不肯止衍義是症傷寒傳厥陰症中但曰吐蝤下之利不止此曰食即吐下不止豈食入便至於利下不止乎成注曰邪傳厥陰則熱已深也邪自太陽傳至太陰止咽乾未成渴傳少陰止口燥舌乾而渴未成消傳至厥陰熱甚多飲水乃成消渴也飲水多而小便少謂之消渴火生於木厥陰客熱氣上衝心心中疼熱傷寒至厥陰受病時為傳經盡當入腑胃虛熱客飢不飲食蝤在胃中無食則動聞食臭即出得食吐蝤此熱在厥陰經若便下之虛其胃氣厥陰木邪相乘必吐下不止傷寒雜症病起之由雖異至成六氣之熱邪則一五臟傳來之熱與色欲勞役飲食之熱客於厥陰其熱皆無異也寸口脈浮而遲浮即為虛遲即為勞虛則胃氣不足勞則榮氣竭趺陽脈浮而數浮即為氣數即消穀而大堅一作緊氣盛則溲數溲數則堅堅數相搏即為消渴衍義內經云有所勞倦形氣衰少穀氣不盛上焦不行胃氣熱熱氣熏胸中故內熱寸口為上焦趺陽候中焦寸口遲為勞者即勞役致傷也勞即陽氣退下穀氣不得升舉以充上焦上焦主行榮衛穀氣不充則衛虛而脈浮榮竭而脈遲蓋穀氣不輸於上下壅而盛於中數則消穀者壅盛之氣鬱而為熱即消穀數即熱也大堅者水穀雖入不化津液中焦遂燥堅即燥也內經所謂味過於苦脾氣不濡胃氣乃厚中焦熱甚火性疾速水穀不得留停下入膀胱而溲水去其內即燥而又熱即為消渴近世謂消中也男子消渴小便反多以飲一斗小便一斗腎氣丸主之方見婦人雜病中衍義醫禴云女子陰物也晦淫則生內熱惑蠱之疾仲景獨稱男子倘亦此意腎者主水主志藏精以施化若惑女色以喪志則泄精無度火扇不已所主之水所藏之精無幾矣水無幾何以敵相火精無幾何以承君火二火烏得不熾而為內熱惑蠱之病耶二火熾則肺金傷肺金傷則氣燥液竭內外腠理因之乾澀而思飲也且腎乃胃之關通調水道肺病則水不復上歸下輸腎病則不復關鍵不能調布五經豈不飲一斗而出一斗乎用八味補腎之精散其本也不避桂附之熱為非辛不能開腠理致五臟精輸之於腎與其施化四布以潤燥也每恨古今論消渴者多集其症而不舉其所自者有之舉其端而不明其源者有之仲景因當時失第六卷論六氣之詳故只就金氣而言病不及乎火惟張子和論君相二火可補仲景之未備相火遊行五臟間火主動動之和者則助本臟氣生化之用動之不和者即為害之大也妄動之火勢盛必挾本臟氣同起當時臟氣有虛有實有陰有陽主氣主血升降浮沉各一體用是故治火之中必當先審臟氣虛則補之實則瀉之在陽則調其氣在陰則理其血當升而反降者必舉之當降而反升者必抑之須兼五行金木水火土之性從而治之使無捍格之患則火有所歸宿而安矣腎氣丸內有桂附治消渴恐有水未生而火反盛之患不思內經王注火自腎起為龍火當以火逐火則火了滅以水治之則火愈熾如是則桂附亦可從治者矣脈浮小便不利微熱消渴宜利小便發汗五苓散主之衍義傷寒論太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散主之注曰若脈浮者表未解也飲水多而小便少者謂之消渴裡熱甚實也微熱消渴者熱未成實上焦燥也與是藥生津液和表裡渴欲飲水水入則吐者名曰水逆五苓散主之方見上衍義傷寒論中風發熱六七日不解而煩有表裡症渴欲飲水水入吐名曰水逆注曰六七日發熱不解煩者邪在表也渴欲飲水邪傳裡也裡熱甚則能消水水入則不吐裡熱少則不能消水停積不散飲而吐也與此藥和表裡散停水渴欲飲水不止者文蛤散主之文蛤散方文蛤五兩上一味杵為散以沸湯五合和服方寸匕衍義文蛤散治傷寒冷水噀若灌其熱不去肉上粟起意欲飲反不渴者此治表之水寒今不言表而曰飲不止屬裡者亦用之何也嘗考本草文蛤海蛤治浮腫利膀胱下小便則知內外之水皆可用之其味鹹冷鹹冷本於水則可益水其性潤下潤下則可行水合鹹冷潤下則可退火治熱證之渴飲不止由腎水衰少不能制盛火之炎燥而渴今益水治火一味兩得之內經曰心移熱於肺傳為膈消者尤宜以鹹味切於入心也淋之為病小便如粟狀小腹弦急痛引臍中衍義淋如粟狀者因脾胃不足流濁下入胞中而膀胱屬水濕濁下流土克之也土克則水氣不行郁化為熱煎熬胞中濁結如粟之水則胞之下系與溺竅皆滯澀不利且厥陰之脈循陰器主疏泄胞澀不利則厥陰之氣亦不利故攻克於膀胱之分作急痛引臍中臍中者兩腎間膀胱上口也巢氏病源云膀胱有熱者水澀淋澀小腹弦急痛引臍中蓋本此耳趺陽脈數胃中有熱即消穀引食大便必堅小便則數衍義消萬物者莫甚於火胃有熱即消穀消穀則飢飢則引食食雖入以火燥其玄府水津不布下入膀胱腸胃津液不生故大便堅膀胱內熱則損腎陰陰虛則水不得固藏故數數出之巢氏病源云腎虛則小便數也淋家不可發汗發汗必便血衍義淋者膀胱與腎病熱也腎屬於陰陰血已不足若更發汗則動其榮榮動則血泄矣小便不利者有水氣其人苦渴栝蔞瞿麥丸主之栝蔞瞿麥丸方栝蔞根二兩茯苓三兩薯蕷三兩附子一枚炮瞿麥一兩上五味末之煉蜜丸梧子大飲服三丸日三服不知增至七八丸以小便利腹中溫為知衍義內經云肺者通調水道下輸膀胱又謂膀胱藏津液氣化出之益肺氣通於膀胱上通則下行下塞則上閉若塞若閉或有其一即氣不化氣不化則水不行而積矣水積則津液不生而胃中燥故苦渴用栝蔞根生津液薯蕷以強肺陰佐以茯苓治水自上滲下瞿麥逐膀胱癃結之水然欲散水積之寒通開陰道使上下相化又必附子善走者為使服之小便利腹中溫為度若水積冷而方用之否則不必用也小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之蒲灰散方蒲灰七分滑石三分上二味杵為散飲服方寸匕日三服滑石白魚散方滑石二分亂髮二分燒白魚二分上三味杵為散飲服半錢匕日三服茯苓戎鹽湯方茯苓半斤白朮二兩戎鹽彈丸大一枚上三味以水四升煮減半去滓溫服七合日三服衍義小便不利為膀胱氣不化也氣不化由陰陽不和陰陽有上下下焦之陰陽肝為陽腎為陰腎亦有陰陽左為陽右為陰膀胱亦有陰陽氣為陽血為陰一有不和氣即不化自三分觀之悉為膀胱血病澀滯致氣不化而小便不利也蒲灰滑石者本草謂其利小便消瘀血蒲灰治瘀血為君滑石利竅為佐亂髮滑石白魚者發乃血之餘能消瘀血通關便本草治婦人小便不利又治婦人無故溺血白魚去水氣理血脈可見皆血劑也茯苓戎鹽者即北海鹽膀胱乃水之海以氣相從故鹹味潤下佐茯苓利小便然鹽亦能走血白朮亦利腰臍間血故亦治血也三方亦有輕重亂髮為重蒲灰次之戎鹽又次之渴欲飲水口乾舌燥者白虎加人參湯主之方見中暍中衍義傷寒論陽明脈浮而緊咽燥口苦發熱汗出不惡寒反惡熱身重云云若渴欲飲水口乾舌燥者白虎加人參湯主之成注以苦下之熱客中焦是謂乾燥煩渴凡病屬陰陽熱甚在表裡之間者即可用之陽明為水穀之海氣血俱盛熱易歸之傷寒雜病飲食之熱與夫五邪之相傳俱客之耳脈浮發熱渴欲飲水小便不利者豬苓湯主之豬苓湯方豬苓去皮茯苓阿膠滑石澤瀉各一兩上五味以水四升先煮四味取二升去滓內膠煬消溫服七合日三服衍義前條有脈浮小便不利微熱消渴用五苓散利小便取汗利小便與此證無異何藥之不同也前條太陽證發汗復大汗出胃中干欲得飲水少少與之令胃中和即愈脈若浮小便不利微熱消渴者與五苓散此乃陽明證咽喉燥發熱汗出身重下後若脈浮發熱渴欲飲水小便不利者豬苓湯脈浮同也而有太陽陽明之異熱同也而有微甚之異邪客入里同也而有上焦下焦之異邪本太陽入客上焦所以宜取汗利小便邪本陽明雖脈浮發熱然已經下之其熱入客下焦津液不得下通而小便不利矣惟用茯苓豬苓澤瀉滲泄其過飲所停之水滑石利竅阿膠者成注謂其功同滑石不思此證既不可發汗下之又耗其氣血必用參耆手太陰足少陰藥補其不足助其氣化而出小便也須參之
