body:
  text: 卷四瘧病脈證並治第四證二條方六首師曰瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之瘥弦遲者可溫之弦緊者可發汗針灸也浮大者可吐之弦數者風發也以飲食消息止之衍義今觀此篇雖未盡內經諸篇論瘧之詳然亦取其一二立方以明其治此條敘脈固亦未盡瘧脈之變然舉其自弦則自之一字已該其脈之要何則弦者少陽甲木之象也瘧邪客於榮氣之間與衛氣合而病作寒熱者正隸少陽半表半裡之分所以少陽為瘧之舍故弦乃瘧疾之本脈也於是少陽引邪退而就陰陰則寒寒則遲進而就陽陽則熱熱則數寒用溫而熱用涼可知矣此明表裡進退乘其虛實而調之者也復言小緊與弦緊汗下之者此又明表裡之有實邪而攻之者也浮大者以明病不在表裡而在上者也非若內經之謂瘧脈大虛者斯因其浮而用吐也弦數風發者非前多熱之所云乃更論其熱之變而木從火則風生風得火則旺旺則剋土火發木淫必先實脾實脾莫如資以飲食消息寒涼之味以止之此乃明其病在中者也仲景凡一言一字皆立準繩學者詳之嘉言云即梨汁蔗漿生津止渴之屬病瘧以月一日發當以十五日愈設不瘥當月盡解如其不瘥當云何師曰此結為癥瘕名曰瘧母急治之宜鱉甲煎丸鱉甲煎丸方鱉甲十一分炙烏扇三分燒黃芩三分柴胡六分鼠婦三分熬乾薑三分大黃三分芍藥五分桂枝三分葶藶一分熬石韋三分去毛厚朴三分牡丹皮五分瞿麥二分紫葳三分半夏一分人參一分蟅蟲五分熬阿膠三分炙蜂窠四分炙赤硝十二分蜣蜋六分熬桃仁二分上二十三味為末取煅灶下灰一斗清酒一斛五斗浸灰候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁內諸藥煎為丸如梧子大空心服七丸日三服千金方用鱉甲十二片又有海藻三分大戟一分蟅蟲五分無鼠婦赤硝二味以鱉甲煎和諸藥為丸衍義內經云天度者所以制日月之行也氣數者所以紀化生之用也五日為一候三候為一氣然人之三陰三陽上奉之而為之應焉是瘧有發於月一日者至十五日則一氣終人氣亦更故瘧氣隨變而散設有未愈則至月盡又歷第二氣終其天之月以應人之血月再生魄血亦更新邪當從其更新而解矣若又不愈則是榮氣內著不得流行與日月度數相應而肝藏血血並其邪歸之於肝是以瘧母多結左脅下由是用柴胡行氣鱉甲破血為君餘二十一味佐之行血補血散結導滯而已雖然天人氣候之相應者大法如是然人之稟質有強弱邪中有重輕質弱邪重雖不內結瘧母亦至連月者有之質強邪輕不待一候即瘥者亦有之然仲景此論補內經未言耳二錢五分為一分師曰陰氣孤絶陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰疸瘧若但熱不寒者邪氣內藏於心外舍分肉之間令人消爍肌肉衍義內經云但熱而不寒者陰氣先絶陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰疸瘧又云肺素有熱氣盛於身因又用力風寒舍於分肉之間而發發則陽氣盛盛而不衰其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍肌肉故命曰疸瘧此二者一為先傷於風一為肺素有熱所感之邪雖不一然病是陽盛又內經之陽盛逢風兩陽相得而陰氣虛少少水不能制盛火而陽獨治此熱如火當爍肉也由是觀之瘧之寒熱更作因陰陽之氣互為爭並若陰衰少則離絶真陽先自退處不與之並而陽亦不並於陰故陽獨發但熱而已此總論二者之疸瘧其少氣煩冤肺主氣肺受火抑故也手足熱者陽主四肢陽盛則四肢熱也欲嘔者火邪上衝胃氣逆也內藏於心者心乃五臟陽火之主故陽盛則直隸而藏之外舍分肉之間也消爍肌肉者消萬物者莫甚於火火甚則肌肉爍矣然此條固無治法自後條除溫瘧者觀之亦可治此疸瘧也何則白虎湯退熱藥也分肉四肢肉屬脾胃非切於其所舍者乎又瀉肺火非救其少氣煩冤者乎設其別有兼證豈不可推加桂之例以加別藥乎仲景於此雖不言方治蓋可知矣凡立一法則足以比類用之雖然自其陰氣孤絶一語觀之又足有可論者夫陰陽之在身者血與氣也水與火也內屬乎心與腎也而寒本於陰熱本於陽以寒治熱固可退陽而回陰也然治病有輕重豈一法而盡哉小熱之氣涼以取之大熱之氣瀉之於內或反佐以取之取之不衰求其屬以衰之謂壯水之主以消陽光也溫瘧者其脈如平身無寒但熱骨節疼痛時嘔白虎加桂枝湯主之白虎加桂枝湯方知母六兩甘草二兩炙石膏半斤粳米二合桂枝去皮三兩上銼末每五錢水一盞半煎至八分去滓溫服汗出愈衍義內經名溫瘧亦有二一者謂先傷風後傷寒風陽也故先熱後寒一者為冬感風寒藏於骨髓之中至春夏邪與汗出故病藏於腎先從內出之外寒則氣復反入是亦先熱後寒二者之溫瘧則皆有陰陽往來寒熱之證而此之無寒但熱亦謂之溫瘧似與內經不侔然繹其義一皆以邪瘧為重而名之夫陰不與陽爭故無寒骨節皆痹不與陽通則疼痛火氣上逆則時嘔用白虎治其陽盛也加桂療骨節痹痛通血脈散瘧邪和陰陽以取汗也瘧多寒者名曰牡瘧蜀漆散主之蜀漆散方蜀漆洗去腥雲母燒二日夜龍骨等分上三味杵為散未發前以漿水服半錢匕溫瘧加蜀漆半分臨發時服一錢匕一方雲母作雲實衍義心者牡臟也邪在心而成瘧故曰牡瘧何以言之心肺居上陽也而心乃陽中之陽今邪氣結伏心下則心虛內經曰心虛者熱收於內則陽氣不行於外故外寒積聚津液以成痰是以牡瘧反多寒也用蜀漆和漿水以吐所結痰邪龍骨以療氣伏心下者雲母安臟補虛以除內收之熱若夫溫瘧亦用是少加蜀漆治者亦為邪氣結伏在心下致傷氣而不入於陰反獨盛在外以成熱而不寒故亦以此去其所結也牡蠣湯治牡瘧方牡蠣四兩熬麻黃去節四兩甘草二兩蜀漆三兩上四味以水八升先煮蜀漆麻黃去上沫得六升內諸藥煮取二升溫服一升若吐則勿更服衍義此與前牡瘧名同故治亦同略以有初感寒邪為異牡蠣者能軟堅消結除滯血今更佐之蜀漆以理心下所結之邪而甘草佐麻黃非獨散寒且可發越陽氣而通於外陽通結去其病即瘥柴胡去半夏加栝蔞湯治瘧病發渴者亦治勞瘧柴胡八兩人參黃芩甘草各三兩栝蔞根四兩生薑二兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服嘉言云渴雖陽明津竭而所以致陽明津竭者全是少陽之邪故即小柴胡去半夏加栝蔞也衍義內經謂渴者刺足少陽此證胃土被木火之傷則津液涸而燥渴故用柴胡黃芩治木火人參甘草補胃栝蔞生津益燥薑棗發越榮衛若勞瘧由木火盛榮衛衰津液竭者亦治以此柴胡桂薑湯治瘧寒多微有熱或但寒不熱服一劑如神柴胡半斤桂枝三兩去皮乾薑二兩栝蔞根四兩黃芩三兩牡蠣二兩熬甘草二兩炙上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈衍義是瘧也以寒多言之若與牡瘧相類以藥論之則非也牡瘧邪客心下此風寒濕痹於肌表肌表行陽以溫分肉痹則陽氣不得通於外遂鬱伏於榮血之間半表半裡之分也陽化氣熱血滯成瘀著於其處遇衛氣行陽二十五度及之則病作其邪之入榮者既無外出之勢而榮之素痹者亦不出而與陽爭故少熱或無熱也是用柴胡為君發其鬱伏之陽佐以桂枝乾薑散其肌表之痹栝蔞根牡蠣為臣除留熱消瘀血佐以黃芩助柴胡治半表裡甘草以和諸藥調陰陽也得汗則痹邪散血熱行而病瘥耳瘧疾總論揚俊謂人之瘧證由外邪之入每伏於半表半里入而與陰爭則寒出而與陽爭則熱故寒熱往來主少陽謂兼他經證則有之謂全不涉少陽則無是理也仲景曰脈自弦正以或數或遲或小緊或浮大皆未可定要必兼弦弦為少陽脈也夫邪犯少陽與衛氣並居衛實晝行於陽夜行於陰故邪得陽而外出得陰而內搏內外相搏是以日作若氣之舍深內搏於陰陽氣獨發陰氣內著陰與陽爭不得出是以間日而作也然則偏陰多寒偏陽多熱其純熱無寒而為疸為溫純寒無熱而為牡莫不自少陽而造其極偏補偏救弊必從少陽之界使邪去而陰陽適歸於和而後愈也蓋補救之道非藥不可乃仲景復云弦數者風發以飲食消息之抑又何耶數為熱熱極則風生勢必肝木侮土而傳以不勝遂坐耗胃家之津陽愈偏而不復是未可徒求之藥也須以飲食消息而止其熱即梨汁蔗漿生津止渴之屬正內經謂風淫於內治以甘寒之旨耳不然其熱之移於胃者必上熏心肺少氣煩冤而心肺病手心熱欲嘔而胃亦自病人豈能堪之耶故知消息以止入胃之邪真聖法也然仲景之法亦不越內經經謂瘧脈緩大虛便宜用藥又謂虛者不宜用針以甘藥調之即此意也夫溫瘧其脈平無寒但熱骨節疼煩時嘔白虎加桂枝如內經言溫瘧有二俱先熱後寒非但熱不寒有似疸瘧而實不同也疸瘧兩陽合邪上熏心肺肺主氣者少氣煩冤則心主脈者陽盛脈促津虧脈代從可推矣溫瘧脈如平人則邪未合而津未傷其所以但熱而不寒者以其人素有疸氣榮衛不調故瘧之發於陽不入於陰即入而陰不受所以骨節煩疼時嘔邪氣捍格之狀有如此者惟用桂枝加於白虎中既有以去陽邪復有以通榮衛斯陰陽和血脈通得汗而愈矣然桂枝陽藥也何以用於只熱不寒之證不知用白虎以大清氣分之熱即少加桂枝以通榮衛未為不可也至若內經所稱先熱後寒之溫瘧一者先傷於風後傷於寒發時先陽後陰故先熱後寒也其一為冬感風寒深藏骨髓內舍於腎至春夏時令大熱而始發邪從腎出之於外俟熱勢少衰復返於腎而陰精與之相持乃始為寒設不知壯水之主以急救其陰十數發而陰盡矣若多寒者曰牡瘧非純寒無熱也多寒者如十分之中七八分也夫邪伏於心下適在膻中心包之位心為陽陽邪從之則心經虛曰心虛者熱收於內既收其邪不易外出此寒多之一因也邪入心包君主之官震恐周身津液悉力內助遂使所受之邪為外圍而不得出又多寒之一因也心為牡臟故以名瘧治用蜀漆散和漿水吐其心下結伏之邪則內陷之邪與之俱出一舉而蕩逐無餘矣夫蜀漆常山苗也常山善吐何故不即用之而必取意於其苗者何居苗性輕揚入重陽之界引拔其邪合之龍骨鎮心寧神蠲除伏氣雲母安臟補虛媚茲君主仲景煉石補天之功也乃溫瘧亦用此方更加蜀漆以取快吐者正以一吐則結伏之邪盡開而周身之疸者通榮衛並可藉以無忤是又以吐法為和法者也豈牡與溫證有相反而必以方為異處耶即如仲景治瘧病發渴謂亦治勞瘧乃出柴胡去半夏加栝蔞方明系小柴胡湯渴者加栝蔞根去半夏為一定之法蓋以弦為少陽之脈寒熱不外半表半裡故渴雖陽明津竭而所以致陽明津竭者全是少陽之邪且內經刺法篇云渴者取之少陽非以其木火之勢劫奪胃津而然耶夫瘧邪進退於少陽亦即以此方進退以施其巧誠如趙先生所注藥性故曰亦可以治勞瘧也假如寒多微有熱者又或但寒少頃而不熱者又主柴胡桂薑湯且云服之如神觀其證或有似於牡瘧而微甚則大不同故仲景不立論且云如神知其邪之輕且淺矣誠以衛即表也榮即里也胸中之陽散行於分肉之間今因邪氣痹之則外衛之陽反鬱伏於內守之陰而血之痹者愈結而不散遇衛氣之行陽而病發則其邪之入榮既無外出之勢而榮之素痹者亦不出而與陽爭所以多寒少熱或但寒無熱有如此也小柴胡湯本隨邪之進退以為進退者加桂枝乾薑則進而從陽痹著之邪可以開已況加牡蠣以攻其堅以破其結陰陽不可豁然而汗解乎故曰服一劑如神也然則加芩連之寒以退而從陰不又可於茲悟耶餘本仲景之義並集嘉言之議合而為論以為善治瘧者一助云爾
