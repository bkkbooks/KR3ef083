body:
  text: 卷五中風歷節病脈證治第五論一首脈證三條方十二首夫風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然衍義此證半身不遂者偏風所中也但臂不遂者風邪上受也風之所客凝澀榮衛經脈不行分肉筋骨俱不利故曰此為痹衛者水穀之悍氣陽也溫分肉肥腠理循行脈外佐其動也滑利充溢榮者水穀之精氣陰也循脈中應刻而動沉動翕徐今因風著為痹榮遂改微衛遂變數故脈微數也此即內經風論謂風各入其門戶所中者之一證耳其餘散於各篇不言風而病偏枯者則不可勝數或得之汗出偏沮或得之陽盛陰不足或胃脈內外大小不一或心脈小堅急或腎水虛者靈樞亦敘於熱病篇中皆能致偏枯喑痱之病觀夫經旨不言其邪惟從陰陽臟氣有餘不足之故豈無深旨是六淫七情飲食起居房勞凡能傷其陰陽臟氣之虛致榮衛經脈痹而不能周流於身者皆其邪也不可一言而盡指之故耳劉河間因不以此證列於風類而乃入火類曰中風癱瘓者非謂肝木之風實甚亦非外中於風良由將息失宜而心火暴甚腎水虛衰不能制之而熱氣拂鬱心神昏冒筋骨不用卒倒無知也或即不死發過而偏枯者由經絡左右雙行而熱鬱結氣血不能宣通若一例得通則否者痹而癱瘓也此論發前人所未發觀是書者尤宜兼通焉寸口脈浮而緊緊則為寒浮則為虛寒虛相搏邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎沫衍義內經有謂十二經絡脈者皮之部也百病之生必先於皮毛邪中之腠理開開則邪入客於經絡留而不去傳入於經留而不去傳入於腑稟於腸胃仲景今言是病即此之謂也絡脈蓋經脈行氣皆在皮部絡脈浮近於皮膚故善惡之色見於外經脈伏行於隧道故善惡之脈朝於寸口而後見絡脈不自動隨經脈而動此由絡脈之血空虛所以脈見得也寒邪之氣緊束故浮緊之脈並見於寸口絡脈從經脈左右雙行當邪入之時不治至於其邪隨絡脈流行邪所在之側則血虛虛則經氣緩邪所不在之側則血和和則經氣行如度而急緩急牽引故口緩喎僻不遂邪在於絡其衛氣循於皮膚之中分肉之間者與之相遇則不榮於肌膚故肌膚不仁邪在於經則榮氣之行澀內不養於骨則骨重外不滋於肉則身重而不勝仲景所謂入腑入臟者腑六臟五果何屬也意即內經之所謂稟於胃者也夫胃者土也水穀之海十二經皆受氣於胃胃者六腑之總司多氣多血者也心者神明之宅五臟之主由是諸腑經絡受邪變氣則歸於胃胃得之則熱甚津液壅溢為痰涎閉塞隧道榮衛不行胃之支別脈上絡於心者並塞其神氣出入之竅故不識人也諸臟受邪極而變者亦必歸於心於是心得邪則神散而樞機息舌者心之竅機息則舌縱廉泉開舌縱則難以言廉泉開則口流涎此是俗所宗之說也侯氏黑散治大風四肢煩重心中惡寒不足者外臺治風癲菊花四十分白朮十分細辛三分茯苓三分牡蠣三分桔梗八分防風十分人參三分礬石三分黃芩五分當歸三分乾薑三分芎藭三分桂枝三分上十四味杵為散酒服方寸匕日一服初服二十日溫酒調服禁一切魚肉大蒜常宜冷食六十日止即藥積在腹中不下也熱食即下矣冷食能助藥力衍義心主血陽臟也榮衛不布內無所養則心中惡寒不足生焉是以菊花為君治風兼治濕治風以防風佐治濕以白朮佐桔梗亦能治風痹通膈氣舟楫諸藥細辛桂枝助防風礬石茯苓助白朮黃芩乾薑牡蠣開利內外寒熱痹氣參歸更與乾薑牡蠣治心中惡寒不足者初治欲開其痹著則用溫酒以行藥勢禁諸熱物宜冷食者為礬石能固澀諸藥助其久效而礬石性得冷即止得熱即下故也寸口脈遲而緩遲則為寒緩則為虛榮緩則為亡血衛緩則為中風邪氣中經則身癢而癮疹心氣不足邪氣入中則胸滿而短氣衍義天道乾健而坤靜順人道亦應之氣健而血順也血氣和平然後脈不緩不急不遲不數日行百刻以周於身而朝寸口是以候寸口以求其虛實遲則知陽氣之不能健運緩則知榮氣之應刻不逮榮氣不逮則亡血衛氣不運因而中風經虛邪入榮衛不布於皮膚血凝津滯發為身癢癮疹然疹有赤白不獨屬風也原屬津凝血滯治與濕同且榮衛不健與邪混鬱於胸中則害其宗氣之布息故胸滿而短氣也風引湯除熱癱癇大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石脂紫石英石膏各六兩上十二味杵粗篩以韋囊盛之取三指提井花水三升煮三沸溫服一升治大人風引少小驚癇瘛瘲日發數十次難療等證熱邪以除巢氏云腳氣宜風引衍義風者外司厥陰內屬肝木上隸手經下隸足經中見少陽相火所以風自內發者由火熱而生也風生必害中土土主四肢土病則四末不用聚液成痰癱瘓者以風邪挾痰於四肢故也癇者以風熱急其筋脈內應於心主故也由是二者儘可用此湯治之首用大黃之寒走而不止者瀉之俾火退風息凝痰掃去矣復用乾薑之熱止而不走者何哉前哲有云大黃之推陳致新如將軍之戡定禍亂然使將無監軍兵無嚮導能獨成其功乎夫一陰一陽之為道故寒與熱相濟行與止相須然後寒者不慘熱者不酷行者不疾止者不停所以大黃逐熱行滯以通榮衛而利關節則必以乾薑安之桂枝導之佐大黃之達四肢臟腑而不肆其峻快不然將從諸藥石而下走矣桂枝又散風木乾薑又能治血祛風濕痹去風毒痹二者因得以相製為使猶慮乾薑之熱中更以石膏滑石制之稟清肅之金性以制木救土瀉陽明肺熱解肌肉風痹也陰水不足火因妄動而生風滿招損自役其心精神不守非鎮重之劑則不能安其神益其水故以寒水石補陰水紫石英白石脂赤石脂牡蠣龍骨斂精神定魂魄固根本也防己地黃湯治病如狂狀妄行獨語不休無寒熱其脈浮防己一分桂枝三分防風三分甘草一分上四味以酒一杯漬之一宿絞取汁生地黃二斤㕮咀蒸之如斗米飯久以銅器盛其汁更絞地黃汁和分再服衍義狂走譫語有熱脈長者則陽明若此無寒熱其脈浮者非其證也然脈浮者血虛從邪並於陽而然也內經曰邪入於陽則狂此狂者謂五臟陰血虛乏魂魄不清昏動而然也桂枝防風防己甘草酒浸其汁用是輕清歸之於陽以散其邪用生地黃之涼血補陰熟蒸以歸五臟益精養神也蓋藥生則散表熟則補衰此煎煮法也又降陰法也陰之不降者須少升以提其陽然後降之方可下不然則氣之相併不得分解矣頭風摩散方大附子一枚炮鹽等分上二味為散沐了以方寸匕摩上令藥力行衍義頭者諸陽之所會太陽為之長若風寒濕客之諸陽不得流通與邪壅塞於巔而作痛故用附子性之走者於疾處散其邪以鹽味之潤下從太陽膀胱水性者佐之用以引諸藥下降則壅通而病愈矣寸口脈沉而弱沉即主骨弱即主筋沉即為腎弱即為肝汗出入水中如水傷心歷節黃汗出故曰歷節衍義腎主水骨與之合水性下故脈沉者病在骨也肝藏血筋與之合血性濡血虛則脈弱故脈弱者病在筋也心主汗汗出入水其汗為水所主心氣不得越因而傷之水汗相搏聚以成濕濕成則內應於脾脾土也土克腎水是以濕傷其骨關節者骨之所湊筋之所束故濕獨善流關節以克其所勝侮其不勝然水汗所郁之濕久變為熱濕熱相蒸濕屬土土色黃是以歷節發出黃汗也趺陽脈浮而滑滑則穀氣實浮則汗自出衍義趺陽胃脈屬土土濕所化也脈經謂浮滑為有宿食此雖非宿食之谷然滑乃陽盛也內經曰食入於胃長氣於陽是乃飲食肥美所長之陽成其濕熱之氣宜乎亦得稱以谷也脈浮汗自出者內經曰汗者谷之精氣今谷之盛陽出之於表浮為衛虛不能固腠理因自汗出也少陰脈浮而弱弱則血不足浮則為風風血相搏即疼痛如掣盛人脈澀小短氣自汗出歷節疼不可屈伸此皆飲酒汗出當風所致衍義少陰脈者太衝腎脈也腎脈本沉因飲食當風使之浮浮則腎傷腎屬陰主血傷必不足而脈弱也肥人本多氣多血其脈充盛今反澀由其血不足也小者氣衰也由飲酒所致蓋因酒濕熱有毒飲之過則傷衛傷榮迫津為汗汗出當風乘虛入客與衛相干則短氣自汗出入傷筋骨則歷節疼痛不可屈伸諸肢節疼痛身體尪羸腳腫如脫頭眩短氣溫溫欲吐桂枝芍藥知母湯主之桂枝芍藥知母湯方桂枝四兩芍藥三兩甘草二兩麻黃二兩生薑五兩白朮五兩知母四兩防風四兩附子二兩炮上九味以水七升煮取二升溫服七合日三服衍義此風寒濕痹其榮衛三焦之病頭眩短氣上焦痹也諸肢節疼痛身體尪羸筋骨痹韻書以尪為火以羸為筋結也然濕多則腫寒多則痛風多則動故用桂枝治風麻黃治寒白朮治濕防風佐桂附子佐麻黃白朮其芍藥生薑甘草亦和發其榮衛如桂枝湯例也知母治腳腫引諸藥祛邪益氣力附子行藥勢為開痹大劑然分兩多而水少恐分其服而非一劑也三因方云每服四錢味酸則傷筋筋傷則緩名曰泄咸則傷骨骨傷則痿名曰枯枯泄相搏名曰斷泄榮氣不通衛不獨行榮衛俱微三焦無所御四屬斷絕身體羸瘦獨足腫大黃汗出脛冷假令發熱便為歷節也衍義內經云味過於酸肝氣以津味過於咸大骨氣勞短肌以津蓋謂津液不仁而內溢短肌謂走血而肌縮大骨氣勞謂鹹入骨走血髓無養也由是知此之謂泄即溢也津液不溢蓄而成濕筋得濕則弛長而緩故名為泄髓無血也咸多傷骨因致痿而為枯血走絕而不流謂之斷濕勝謂之泄血不流則榮不通榮與衛相將榮不通則衛不獨行也三焦形體皆藉血以養血亡則三焦無所依四屬者皮肉脂髓也無血以滋則身體羸瘦獨有所蓄之濕下流傷腎腎主下焦故腳腫大濕勝則多汗脾色黃濕本於脾故黃汗出腎虛而陽不下降則脛冷假令陰虛濕鬱變熱則濕不泄而流於筋骨關節也夫仲景誠善於立言者矣即歷節一證各分其因以水以酒以天氣此又以飲食之味然獨出治天氣一方人或怪其不具噫方可具哉病有不常體有強弱時有寒暑已出之方猶自為準繩而已又焉可執而不變也若能求經氣辨邪正明藥性亦何患其有證而無方歟病歷節不可屈伸疼痛烏頭湯主之烏頭湯方治腳氣疼痛不可屈伸麻黃芍藥黃耆各三兩甘草炙川烏五枚㕮咀以蜜二升煎取一升即出烏頭上五味㕮咀四味以水三升煮取一升去滓內蜜煎中更煎之服七合不知盡服之衍義此湯概治歷節不可屈伸疼痛於方下又復言治腳氣疼痛必仲景書歷節條下有方而無藥石見腳氣中方名同而有藥集書者遂兩出之且二病皆因風寒傷於筋麻黃開玄府通腠理散寒邪解氣痹芍藥以理血痹甘草通經脈而和藥黃耆益衛氣氣壯則邪退烏頭善走入肝筋逐風寒蜜煎以緩其性使之留連筋骨以利其屈伸且蜜之潤又可益血養筋並制烏頭燥熱之毒也礬石湯治腳氣衝心礬石二兩上一味以漿水一斗五升煎三五沸浸腳良衍義腳心病者古人謂感水濕之邪即內經痿痹厥逆證也東垣有飲乳酪之說予思足六經起於足五趾間若天之六淫飲食寒熱勞逸之氣凡留滯於下者皆足以致其腫痹不仁屈伸不利氣逆上衝也豈獨水濕之邪白礬味酸澀性燥可去濕消腫收斂逆氣然腳氣衝心水剋火也豈細故哉附方古今錄驗續命湯治中風痱身體不能自收口不能言冒昧不知痛處或拘急不得轉側麻黃桂枝當歸人參石膏乾薑甘草各三兩芎藭一兩五錢杏仁四十枚上九味以水一斗煮取四升溫服一升當小汗薄覆脊憑几坐汗出則愈不汗更服勿當風並治咳逆上氣不得臥面目浮腫衍義痱病者榮衛氣血不養於內外故身體不用機關不利精神不治然是證有虛有實虛者自飲食房勞七情得之內經謂內奪而厥則為喑痱是也實者是風寒暑濕感之虛以實治則氣血愈散此方乃治實邪也故麻黃為君佐乾薑開寒痹石膏解風痹當歸和血人參益氣芎藭行血散風也其並治咳逆上氣面浮者亦為風寒所致也千金三黃湯治中風手足拘急百節疼痛煩熱心亂惡寒經日不欲飲食麻黃五分獨活四分細辛二分黃耆二分黃芩三分上五味以水六升煮取二升分溫三服一服小汗二服大汗心熱加大黃二分腹滿加枳實一枚氣逆加人參三分悸加牡蠣三分渴加栝蔞根三分先有寒加附子一枚近效方術附湯治風虛頭重眩苦極不知食味暖肌補中益精氣白朮二兩附子一枚半炮去皮甘草一兩炙上三味銼每五錢匕姜五片棗一枚水盞半煎七分去滓溫服崔氏八味丸治腳氣上入少腹不仁乾地黃八兩山茱萸薯蕷各四兩澤瀉茯苓牡丹皮各三兩肉桂附子炮各一兩上八味末之煉蜜和丸梧子大酒下十五丸日再服千金方越婢加朮湯治肉極熱則身體津脫腠理開汗大泄屬風氣下焦腳弱麻黃六兩石膏半斤生薑二兩甘草二兩白朮四兩大棗十五枚上六味以水六升先煮麻黃去上沫內諸藥煮服三升分溫三服惡風加附子一枚炮
