body:
  text: 卷六血痹虛勞病脈證治第六論一首脈證九條方九首問曰血痹病從何得之師曰夫尊榮人骨弱肌膚盛重困疲勞汗出臥不時動搖加被微風遂得之但以脈自微澀在寸口關上小緊宜針引陽氣今脈和緊去則愈補注陽所以統夫陰者也統陰則血必隨氣行矣乃經言血痹而不言氣何哉不知血之痹由於氣之傷也經曰入於脈則血凝而不流夫所以不流者氣為邪阻也然邪之足以傷者必因於作勞則衛氣不能固外而後邪得以入之故仲景發其不流之故以明得病之由言天下惟尊榮人為形樂志苦形樂故肌膚盛志苦故骨弱骨弱則不耐勞肌盛則氣不固稍有勞困汗易出也夫汗者血之液也衛不固斯汗出汗出斯陽氣虛雖微風且得以襲之則血為之痹故一見脈微則知其陽之不足一見脈澀則知其陰之多阻此血痹之本脈也而其邪入之處則自形其小緊小為正氣拘抑之象緊為寒邪入中之徵然仲景明言微風何以反得寒脈耶蓋邪隨血脈上下阻滯汁沫未有不痛者故痛為脈緊也針以泄之引陽外出則邪去而正自伸也否則終於痹也然則固外之陽所重惜也富貴者能知陽氣素不自強則不敢作勞即不獲已而勞或亦有以知節而不至於汗出汗出矣不致臥後動搖又何致虛風痹血耶仲景言虛勞乃以血痹發其先良有以也血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀黃耆桂枝五物湯主之黃耆桂枝五物湯方黃耆三兩桂枝三兩去皮芍藥三兩生薑三兩大棗十二枚上五味以水六升煮取二升去滓溫服七合日三服補注此條是由上條既痹之後未能針引以愈遂令寸口微者今則陰陽俱微且寸關俱微矣且尺中小緊矣夫小緊既見於尺則邪之入也愈深而愈不得出何也正虛之處便是容邪之處也脈經內外謂之陰陽上下亦謂之陰陽今尺既小緊則微屬內外也明矣若言證以不仁概之蓋身為我身則體為我體而或為疼痛或為麻木每與我相阻其為不仁甚矣故以風痹象之非真風痹也經曰風寒濕三者合而成痹然何以單言風痹也邪有兼中人之受者必有所偏如多於風者則其痛流行不常淫於四末蓋血以養筋血不通行則筋節為之阻塞且血藏於肝肝為腎子腎既受邪則血無不壅滯於是以黃耆固衛芍藥養榮桂枝調和榮衛托實表裡驅邪外出佐以生薑宣胃大棗益脾豈非至當不易者乎夫男子平人脈大為勞極虛亦為勞補注虛勞為不足之病則必為不足之脈也經云煩勞則張精絶正以勞則陽氣外張舉之有餘也然其餘也既非內蘊之充又豈外邪之助以是大為勞也至問脈之重虛對以上虛尺虛言上下皆虛也又云脈虛者不象陰也不似手太陰之充盛也故極虛者亦云勞然則大者固為勞力飢飽而極虛者則不免於房勞矣男子面色薄者主渴及亡血卒喘悸脈浮者裡虛也補注此仲景出望之法以教人也經曰心者生之本神之變其華在面而其充在血脈故手少陰為君主之官神明出焉然使憂愁思慮則足以傷之夫神傷則體弱體弱則所生者不足自未能榮於色矣蓋心所以生血而色者神之旗也陰血既少則津液自枯故主渴也渴必引水以自救而渴不復為水止則飲多而停於心下阻其呼吸之隧而為喘失其君火之司而為悸所不免也若此者脈必浮豈非所生之血不足鼓其脈於外乎心所以合脈者也於是知其心氣之虛於裡焉也男子脈虛沉弦無寒熱短氣裡急小便不利面色白時目瞑兼衄少腹滿此為勞使之然補注人之身以陽氣為主惟作勞則動傷元氣故於此先言脈並言證以見男子之陽虛也夫虛者勞之本脈也舉按不實之中而復見少厥二陰之象則其為內傷陽氣何如而陽虛者必惡寒內傷者多發熱故脈經云假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也假令尺脈弱名曰陰不足陽氣下陷入陰中則發熱也今三部同等已非上入下陷之候則其無寒熱可知然膻中者氣之海也谷之精氣濁者化衛而一為宗氣行胸中以司呼吸於是呼出者心肺主之吸入者腎肝主之心肺陽也腎肝陰也夫以舉按豁然之脈而只見其有陰無陽是中之宗氣不能為之資斯呼者無以壯其出而吸者不能深其入遂令升降無力而短氣不足以息也中州之氣既虛使水穀未能消腐而清氣不能上升則腎陽未旺肝氣下乘故頻圊而裡急膀胱為州都之官氣不化而水道不出至如經謂十二經脈三百六十五絡皆上於面然肺為氣之總司若氣虛則肺亦虛故面雖諸陽之會而色獨如金也且陰氣盛則目瞑今陽衰有不為之目瞑者乎兼衄者陽絡傷則血外溢而為衄也少腹滿者因小便不利也此為勞傷元氣所以至此然則仲景即不言治法自當調以甘藥培中土以益元陽不待言矣若舍黃耆建中又何以為法耶勞之為病其脈浮大手足煩春夏劇秋冬瘥陰寒精自出酸削不能行補注夫脈之大有二一曰大為實一曰大則為芤芤則為虛今屬之於勞則所傷在元氣而無血以和之也然傷者在氣而何損於血也經曰陽生則陰長故無陽則陰無以生無陰則陽無以化舉按之間但覺其大而非有力於去來也然何以他脈不兼見夫惟不兼見故盛於外者非由於素養之得宜只因營衛之氣滿於中焦致火不生土而太陰病故手足煩者脾屬四肢也經曰煩勞則張精絶闢積於夏使人煎厥故逢收藏之時而稍瘥不似春夏之散見也經曰強力舉重則傷腎又曰腎者精之處也其充在骨夫既真陽不能守而陰精有不外遺者乎酸削不能行亦所必至也夫失精家少腹弦急陰頭寒目眩發落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之桂枝龍骨牡蠣湯方桂枝一兩芍藥一兩甘草二兩炙生薑一兩大棗十二枚龍骨三兩牡蠣三兩上七味以水七升煮取三升分溫三服補注經曰腎主水受五臟六腑之精而藏之又曰厥氣接於陰器則夢接內蓋陰器宗筋之所繫也而脾胃肝膽之筋亦皆聚焉故厥陰主筋則諸筋統於肝也腎為陰主藏精肝為陽主疏泄故腎之陰虛則精不藏肝之陽強則氣不固若遇陰邪客之與所強之陽相感則或夢或不夢而精脫矣是腎虛則無有不虛者也膀胱與腎為表裡故少腹弦急為陰結而氣不化者可知水不生木則血不養筋致宗筋憊而陰頭寒以致虛風生則目眩血不會則發脫種種虛狀悉本諸此而其脈則為虛為芤為遲可想而知也夫陽虛則水穀不化陰虛則亡血失精故芤為陰虛復陰陽相搏而為動微則陽微又微緊相搏而為邪皆脈經所云至虛者也然則男子失精女子夢交何能已哉此病之原皆起於腎之不固遂令三焦皆底於極虛矣斯於法必以固精為主治也於是以桂枝和榮衛芍藥收陰生薑散寒甘草膠棗益脾補氣更用龍骨以澀其陽牡蠣以澀其陰庶腎肝既固榮衛調和而諸證自愈爾男子脈浮弱而澀為無子精氣清冷此條一本在夫失精家之前補注浮為陽脈也舉之有按之無也乃於舉之時未見其力則浮兼弱矣浮弱陽氣之虛也若澀陰脈也為陰血不足脈經曰榮為根衛為葉榮衛俱微則枝葉枯槁是生氣微矣又何能必其有子乎正以精氣之清冷也其在詩曰洌彼下泉浸彼苞稂謂傷其生也男子平人脈虛弱細微者善盜汗也補注虛弱細微絶不見陽陽虛甚矣經云陰氣有餘身寒多汗然所謂有餘者非誠余也即陽之不足言之也故肺主氣又合皮毛司腠理惟陽氣衰則衛不固而自汗出邪在於內則元府不閉而汗從腑臟出邪在於外則腠理不致而汗從經絡出臟腑之陰捍格衛氣浮散於外無所依從則汗出衛虛水穀氣散脫者汗自出此皆不因動作而自出之汗也至盜汗則陽衰因衛虛而所虛之衛行於陰當目瞑之時無氣以庇之故腠開而汗若一覺則行陽之氣復散於表而汗止矣故曰盜汗也夫至盜汗而其虛可勝道哉人年五六十其病脈大者痹挾背行苦腸鳴馬刀俠癭者皆為勞得之補注人生五十始衰六十天癸竭則已精少腎衰矣使復有動作遂令陽虛而邪得以客之痹太陽經道蓋太陽行於背者也經謂陽氣者精以養神柔以養筋開闔不得寒氣從之乃生大僂故病痹挾背行也又云中氣不足腸為之苦鳴至陷脈為瘻留連肉腠為馬刀俠癭癭者即瘰癧也以其形長如蛤為馬刀或在耳前後連及頤頷頭下或下連缺盆以及胸脅皆謂之馬刀此手足少陽經主之也總以動作忿怒憂忿氣鬱過甚而為風邪內腠故其脈則大而舉按不實其因則勞而元氣不足仲景言之恐後人復疑為有餘而誤攻其邪耳脈沉小遲名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化也補注人之所以運動無苦四體溫和食入自化者皆吾身之真陽為之也故陽固則流行於脈中者各安其部而無陽衰陰見之象今沉少陰脈也以其所處之位至下也若寸關皆見則各腑臟之陽何在乎況其兼者曰小曰遲脈經云小者氣血俱少又云遲為榮中寒彼此俱陰絶不見陽則其氣已大泄矣故名脫也夫尺虛之人行走恇然象其步履之不正也而況於氣脫者乎故行稍疾上喘喝雖曰呼出心肺吸入腎肝自非宗氣行其呼吸則升降出入且無以安於自然矣況勉強以動其氣乎是故人之陽盛於中焦者也脾之陽不固則四肢上逆而冷矣且脾之陽又原於下焦者也腎之真陽大虛則不足以消腐水穀為腹滿為溏泄正未有已也脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血失精補注傷寒論中有此條方中行先生注寒言陽氣減損而不足芤言陰血衰竭而空虛革言革易常度也婦人陰血充足而能化則得坤順之常半産漏下則不足以言坤之資生矣男子陽精充盛而能化則得乾健之常亡血失精則不足以言乾之資始矣故天地之大德曰生男不足以言資始女不足以言資生則人道大壞故曰革也一說革讀亟變而促迫也亦通愚按禮曰夫子之病革矣不可以變即音亟也虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥小建中湯主之小建中湯方芍藥六兩桂枝三兩去皮甘草三兩炙生薑三兩大棗十二枚膠飴一升上六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也補注經云形氣不足病氣不足此陰陽俱不足也不可刺之刺之為重虛蓋氣不足者如中氣不健頻欲更衣心下悸或陽明內熱而血外溢或腹中痛或夢接內而遺種種悉氣之不足為之也形不足者即如四肢不但不強健而痠疼甚至手足煩熱津液少而乾燥種種皆形之不足為之也經謂不可刺以重虛者宜補之以甘藥此其意惟仲景遵之培中央以灌輸腑臟百脈主以小建中正稼穡作甘之意也然觀此證則腎虛為多水虧當壯水之主以鎮陽光火衰則益火之源以消陰翳獨仲景不屑於此而惟以樹立中氣為第一義者何居聖人曰精穀氣也可見腎為藏精之處伎巧出焉苟非有五穀之養五味之調則亦從何而生然經又曰精不足者補之以味假使胃不能納脾不能運又如之何故聖人以建中主治使中州之土已壞復起將飲食入胃者遊溢精氣上輸於脾脾氣散精上歸於肺如經所云者則五臟百脈自裕矣豈但已病乎哉虛勞裡急諸不足黃耆建中湯主之黃耆建中湯方黃耆三兩桂枝三兩芍藥六兩甘草三兩生薑三兩膠飴一升大棗十一枚上七味用水七升煮取三升去滓溫服一升日三服補注不足之證不一未有不因於氣虛者夫陽生陰長氣苟不充則日就於損矣故曰衛氣者所以溫分肉充皮膚肥腠理司開闔者也開闔損其常度則裡急見焉於是為證之不足者且不可以概述矣主以黃耆建中正於補益中土者兼足以托實肌表矣虛勞腰痛少腹拘急小便不利者八味腎氣丸主之八味腎氣丸方乾地黃八兩薯蕷四兩山茱萸四兩澤瀉三兩茯苓三兩丹皮三兩桂枝一兩附子一兩炮上八味為末煉蜜和丸梧子大火酒下十五丸加至二十五丸日再服補注腰者腎之府腰痛為腎氣之虛寒可知矣惟虛寒故少腹拘急而膀胱之氣亦不化也苟非益火以助真陽以消陰翳恐無以生土而水得泛溢不至上凌君火不止矣主以八味固補益先天之至要者也虛勞諸不足風氣百疾薯蕷丸主之薯蕷丸方二錢五分為一分薯蕷二十分當歸桂枝乾地黃曲豆黃卷各十分甘草二十八分芎藭麥門冬芍藥白朮杏仁各六分人參十分柴胡桔梗茯苓各五分阿膠七分乾薑三分白蘞二分防風六分大棗百枚為膏二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百丸為劑補注虛勞不足之證最易生風倘不為調攝必致火氣日見不足則所以善行數變者不益流連而不息耶故於手足太陰少陰上下分補不仍以中土為主務令三焦並益榮衛和諧而諸風自息矣如桂枝柴胡防風藉以固表升陽為力頗多非謂以此驅風轉燥津液也虛勞虛煩不得眠酸棗仁湯主之酸棗仁湯方酸棗仁二升甘草一兩知母二兩茯苓二兩芎藭二兩上五味以水八升煮酸棗仁得六升內諸藥煮取三升分溫三服補注按嘉言論此方云素問謂陽氣者煩勞則張精絶闢積於夏使人煎厥可見虛勞虛煩為心腎不交之病腎水不上交於心火心火無制故煩而不得眠不獨夏月為然矣方用棗仁為君而兼知母之滋腎為佐茯苓甘草調和其間芎藭入血分而解心火之燥煩也五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡榮衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃䗪蟲丸主之大黃䗪蟲丸方大黃十分蒸黃芩二兩甘草三兩桃仁一升杏仁一升芍藥四兩乾地黃十兩乾漆一兩虻蟲一升水蛭百枚蠐螬一升䗪蟲一升上十二味蜜丸小豆大酒飲服五丸日三服補注嘉言云七傷金匱明謂食傷憂傷飲傷房室傷飢傷勞傷經絡營衛氣傷及房勞傷但居其一後人不知何見謂七者陰寒陰痿裡急精速精少陰下濕精滑小便苦數臨事不舉似乎專主腎傷為言豈有五勞分主五臟而七傷獨主一臟之理雖人身恣逞傷腎者恆多要不可為一定之名也故虛勞證凡本之內傷者有此七者之分而虛勞發熱未有不由瘀血者若無內傷則營衛運行不失其次瘀從何起是必飲食起居過時失節營衛凝泣先成內傷然後隨其氣所阻塞之處血為瘀積積之久牢不可拔新生之血不得周灌與日俱積其人尚有生理乎仲景施活人手眼以潤劑潤其血之干以蠕動啖血之物行死血名之曰緩中補血豈非以行血去瘀為安中補虛上著乎然此特世稱乾血勞之良法也血結在內手足脈相失者宜之兼入瓊玉膏潤補之藥同用尤妙試為細參其證肌膚甲錯面目黯黑及羸瘦不能飲食全是營血瘀積胃中而發見於肌膚面目所以五臟失中土之灌溉而虛極也此與五臟之本病不同故可用其方而導其胃中之血以內谷而通流營衛耳許州陳大夫傳仲景百勞丸方云治一切勞瘵積滯不經藥壞證者宜服大夫其長於謀國者歟方用當歸乳香沒藥各一錢虻蟲十四個人參二錢水蛭十四個桃仁十四個浸去皮尖為細末煉蜜丸如桐子大都作一服可百丸五更用百勞水下取惡物為度服白粥十日百勞水即甘瀾水以杓揚百遍者也
