body:
  text: 卷二痙濕暍病脈證第二論一首脈證十二條方十一首太陽病發熱無汗反惡寒者名曰剛痙補註此論痙病也非傷寒也非寒而何得以太陽目之以其頭痛腰脊痛與太陽傷營不異故以太陽定之然既曰太陽又何以名痙其角弓反張正內經之所謂痙也痙亦為寒因故寒鬱而熱氣閉皮毛汗無由出全是傷營本證所異者止是不惡熱而反惡寒爾其所以反惡寒者何也因其人先傷於濕後復感寒兩陰相合則寒雖發熱終為濕氣挾持經絡筋節之間閉而不宣一身之陽鬱抑而不外越故身即熱而情則惡寒也又濕在筋節則寒為所持遂流連而不得去正氣阻滯邪氣獨留又安望其屈伸如故轉運無礙乎角弓反張有由來也名曰剛者寒氣堅勁性使然也後諸名家惟王海藏得之以擴仲景之意謂三陽太陰皆病痙項背反張屬太陽若低頭視小手足牽引肘膝相構陽明痙也若一目或左右斜視並一手一足搐搦者少陽痙也若發熱腹痛脈沉細者太陰也此論固善矣惜其不及少陰厥陰以全三陰之痙豈二臟之經不為內外之強有類於太陰者乎且靈樞曰足少陰之筋循脊內挾脊上至項與足太陽筋合其病在此為主癇瘛及痙在外陽病者不能俯在內陰病者不能仰此非少陰之病痙者乎況厥陰肝臟主筋又豈有風寒過甚猶不自傷其筋以致其筋緛短者耶是可觸而悟矣太陽病發熱汗出而不惡寒名曰柔痙衍義是症亦出傷寒論中注謂太陽病發熱汗出為表虛則當惡寒其不惡寒者為陽明病今發熱汗出而不惡寒者非陽明症則是太陽中風重感於濕為柔痙也表虛感濕故曰柔痙即上條所引內經為表裡兼濕內攻大筋緛短小筋弛長之痙也所謂柔痙者非不強也但剛痙強而有力柔痙強而無力為異爾太陽病發熱脈沉而細者名曰痙為難治衍義此條嚐出傷寒論痙病篇彼不言難治於是成無己止注其重感於濕意殆以沉而細系寒濕之本脈故不言其難治設不因寒濕之邪而沉細見於太陽發熱之表病則是陽病見陰脈誠為難矣若朱奉議以痙病脈盡沉遲弦細者非也如脈經云脈沉細名曰陽中之陰少氣陰氣不通為痙病發熱者殆與此無少異爾補註太陽陽經也發熱陽證也何以知為痙以有或剛或柔之證見也脈沉與細陰脈也沉為少陰本脈而復不能鼓之使顯乃有如絲者來去其間則是無陽中又屬陰虛矣何也惟無陽令沉無陰因細也陽症陰脈豈易治乎嘉言為難治初非不治比類而觀則仲景少陰例中原有麻黃附子細辛湯之法余以為不可也蓋始得之反發熱脈沉者以脈沉是本而發熱為標是少陰兼太陽之表猶易為力也若夫太陽顯少陰之脈有不難為功者乎況較少陰更多一細乎雖然後條太陽病脈亦沉細何以不云難治以有濕也濕不但細宜即沉並宜矣然則又何以知其病之非濕乎濕必流於關節今關節無疼痛故知之太陽病發汗太多因致痙衍義成無己注傷寒論謂發汗太多則亡陽陽氣者精則養神柔則養筋陽微不能養則筋脈緊急而成痙雖然發汗之陽陽亡寒起致緊急而為痙固也然發汗復為痙者難以緊急概言發汗必用辛熱之劑汗雖出熱不為汗解反得辛熱之劑以助之熱愈甚而拘攣其筋脈亦有之又如傷寒論中有云傷寒頭痛翕翕發熱形象中風常微汗出自嘔者不可發汗發汗則成痙身強難以屈伸注云傷寒當無汗惡寒今頭痛發熱微汗自嘔則傷寒之邪傳而為熱欲行於里若發汗則虛其表熱歸經絡熱甚風生故身強直為痙夫風病下之則痙復發汗必拘急補註筋者肝之合脈者心之合風內應於肝外應於筋熱內應於心外應於脈是故風病而成熱者其邪氣即以應筋脈若更下之則虛其陰復汗之則虛其陽陰虛則榮血微筋無養而成痙陽虛則衛氣衰脈無養而拘急瘡家雖身疼痛不可發汗汗出則痙衍義此條亦見傷寒注謂表虛聚熱則生瘡瘡家身疼如傷寒不可發汗發汗則表愈虛熱愈甚虛熱生風故變痙也雖然瘡已以其熱從腠理開汗出而散之可也病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也若發其汗者寒濕相搏其表益虛即惡寒甚發其汗已其脈如蛇一云其脈滄滄衍義傷寒注曰太陽中風重感寒濕乃變為痙也身熱足寒者寒濕傷下時頭熱面赤目赤風傷於上也頭搖者風主動也獨頭搖者頭為諸陽之會風傷陽也若純傷風者則一身盡動搖手足搐搦此皆內挾寒濕故頭搖也口噤者寒主急也卒口噤者不常噤也有時而緩若風寒相搏則口噤而不時開此皆加之風濕故卒口噤也風寒客於足太陽故筋脈拘急頭項強背反張也此症出傷寒論中其衍文者無發其汗以後二十五字愚按金匱有此則所重者正在此二十五字矣豈可無以注之乎故謂痙病之發其汗者誤也誤則陽氣徒虛而邪不復出且反以動其濕而濕不去兩相搏聚蒂固根深遂使衛氣更虛較之未汗前之惡寒為尤甚矣試言其脈則因誤汗逼令真陽脫入濕中所以形容其如蛇也言脫出之陽本疾急親上輕矯若龍為濕氣所紐則遲滯如蛇之象盡力奔迸究竟不能奮飛矣此脈之至變義之至精者也暴腹脹大者為欲解脈如故反伏弦者痙衍義肝在五行為木在六氣為風所勝之者燥金不勝之者為濕土若金旺則木受制而鬱矣木鬱必發發則從火過其所不勝之中土故脾土得木火而腹為暴脹大如內經所謂厥陰在泉者腹脹與諸腹脹大皆屬於熱者同類也是故以腹之暴脹因知木之鬱於脾者也已出之脾而木氣行矣火與俱而燥金之氣退矣金退木行故曰欲解解則其脈行應脈大今不浮大而如故反伏弦者則是風猶郁在肝而自病其所合之筋脈已成痙矣此條暴脹之先不見敘症遽曰欲解必有所解之病在也夫痙脈按之緊如弦直上下行一作築築而弦衍義痙病由風寒互為之重感於邪寒脈則緊風脈則弦是本脈也脈經謂直上下行者督脈也見之則大人癲小兒癇二者盡為背反張由督脈與太陽合行於脊裡相引而急故顯出督脈之象也今痙強無異於癲癇之背反張者是亦相干於督脈而見其上下行之象矣痙病有灸瘡難治衍義痙病有風熱燥急其筋骨不當復灸以火且助火深入風熱得之愈固而不散所以難治脈經云痙家其脈伏堅直上下衍義內經謂脈沉而堅病在中今所伏非沉者歟堅非如腎之彈石者歟此兩條出脈不出症殆為前條明其表此見其病在內外如內經之柔痙骨強之類也太陽病其症備身體強𠘧𠘧音如然脈反沉遲此為痙栝蔞桂枝湯主之栝蔞桂枝湯方栝蔞根二兩桂枝三兩芍藥三兩甘草三兩生薑三兩大棗十三枚上六味以水九升煮取三升分溫三服取微汗汗不出食頃啜熱粥發之衍義謂太陽病其症備是何症之備也大抵太陽經脈自足上行循背至頭項此是其所過之部而為之狀者皆是其症也考之傷寒論有謂太陽病項背強𠘧𠘧然反汗出惡風者桂枝加葛根湯主之亦是其一也正與此同而少異者彼以汗出惡風其脈必浮此言脈沉遲必汗不出不出則亦不惡風故不加葛根而加栝蔞根俱是益津和血養筋之劑彼之𠘧𠘧然項背強雖未至於痙然經脈已拘急不利於運動故用葛根之甘行陽從表分衛中以生津液和其經脈沉遲汗必不出不出則亦不惡風則是病在表之榮血分榮血陰也其體沉其行遲所以脈應其象外息於寸口內不養於筋經故痙強之病作焉所以栝蔞根味苦入陰用以生榮血益陰分津液養其筋經者為君桂枝之辛以散芍藥之酸以收一陰一陽在裡在表者為臣甘草薑棗合辛甘之味行脾之津液而和榮衛者為使立方之旨其在斯歟太陽病無汗而小便反少氣上衝胸口噤不能語欲作剛痙葛根湯主之葛根湯方葛根四兩麻黃三兩去節桂二兩去皮芍藥二兩甘草二兩炙生薑三兩大棗十二枚上七味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝湯法將息及禁忌衍義按傷寒論中有太陽病項背強𠘧𠘧無汗惡風葛根湯主之注曰輕可去實以中寒表實故加麻黃葛根以祛風桂枝湯以和表也今以小便反少氣上衝胸口噤不能語欲作剛痙者亦用之何也蓋太陽欲入傳陽明然陽明不受邪故氣逆上衝胸而陽明筋脈內結胃口外行胸中過人迎環唇口以其經多氣多血胸中肺部也上焦主分布津液行水道今太陽與陽明熱並胸中故水道不行則小便少津液不布則無汗人迎在結喉兩旁近會厭發聲機關之處由陽明所過筋脈遇所並之熱遂攣急牽引以口噤不能語欲作剛痙胸中近表論其在上則屬太陽論其居前則屬陽明宜乎是方治其兩經之病也何以言之蓋葛根本陽明經藥能生津出汗行小便解肌易老云太陽初病未入陽明不可便服葛根是引賊破家也又云用此以斷太陽之路即是開發陽明經氣以卻太陽傳入之邪也故仲景治太陽陽明合病桂枝湯加麻黃葛根也痙為病一本痙字上有剛字胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯大承氣湯方大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一二沸分溫再服得下止服衍義此傳陽明風熱之深者也無己謂傷寒症以陽明入腑腹滿者下之而胸滿者未深入猶帶表邪所郁陽氣不宣故爾非汗即吐然而未論及此痙病之胸滿也胸滿豈可一概而言帶表乎有表則屬表有里則屬裡若此背不著席齘齒與項肩強口噤之屬表者不同由熱入甚深之所致故此言胸滿亦熱之極也況風熱燥爍津液陰血消亡至於下焦屬陰之筋脈皆攣急矣然其熱入深者非苦寒咸下之不足以除其熱救其陰夫傷寒病瘛瘲者以熱生風而搐尚為難治況此甚於搐者非下之不能療也然亦有不治者若靈樞熱而痙者死腰折瘛瘲齒齘也太陽病關節疼痛而煩脈沉而細者一作緩此名濕痹玉函雲中濕濕痹之候小便不利大便反快但當利其小便衍義此症出傷寒論注云霧傷皮腠濕流關節疼痛而煩者濕氣內流也濕同水也脈沉而細者水性趨下也痹痛也因其關節煩疼而名曰濕痹非腳氣之痹也內經曰濕勝則濡泄小便不利大便反快者濕氣內郁勝也但當利其小便以宣泄腹中濕氣故云治濕不利小便非其治也雖然大抵此為小便通陽氣行水道今為濕氣內勝陽氣被郁故小便不利利之則陽氣行雖在關節之濕亦得宣泄矣設小便利已而關節之痹不去必又自表治之濕家之為病一身盡疼一云疼煩發熱身色如熏黃也衍義此症見傷寒注曰色黃如橘子色者陽明瘀熱也此身色似熏黃即非陽明瘀熱者梔子柏皮主之為表裡有熱則身不疼痛此一身盡痛非傷寒客熱也知濕邪在經而使之脾惡濕濕傷則脾病而色見是以身發黃者為色黃如煙燻非正黃色也濕家其人但頭汗出背強欲得被覆向火若下之早則噦或胸滿小便不利一云利舌上如苔者以丹田有熱胸中有寒渴欲得飲而不能飲則口燥煩也衍義按傷寒論成無己注曰濕家有風濕有寒濕此寒濕相搏者也濕勝則多汗傷寒則無汗寒濕相搏雖有汗而不能周身故但頭汗出也背陽也腹陰也太陽之脈挾脊抵腰太陽客寒濕表氣不利而背強也里有邪者外不惡寒表有邪者則惡寒欲得被覆向火者寒濕在表而惡寒也若下之早則傷動胃氣損其津液故致噦而胸滿小便不利下后里虛上焦陽氣因虛而陷於下焦為丹田有熱表中寒乘而入於胸中胸中有寒故使舌上生白苔滑藏燥則欲飲水以胸中客寒濕故不能飲而但口燥煩也濕家下之額上汗出微喘小便利一云不利者死若下利不止者亦死衍義傷寒論注曰本是後條濕家身煩疼可與麻黃加朮四兩發其汗妄下之因致此逆蓋逆則真陽自上越陰自下脫其額上汗出微喘者陽之越小便利與下利不止者陰之脫也陰陽離決必死之兆也自此而推之下之雖額上汗出微喘若大小便不利者是陰氣不退而陽之根猶在也下之雖大小便利若額上無汗出與喘是陽氣不越而陰之根猶在也則非離決可以隨其虛而救之風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也衍義按傷寒論注是條曰值天陰雨不止明其濕勝也內經曰陽受風寒陰受濕氣又云傷於風者上先受之傷於濕者下先受之風濕相搏則風在外而濕在內汗大出者其氣暴暴則外邪出而里邪不能出故風去而濕在汗微微而出者其氣緩緩則內外之邪皆出故風濕俱去也濕家病身疼發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈脈經云病人喘而無濕家病以下至而喘十三字衍義按傷寒論是條注曰病有淺深症有內外此則濕氣淺者也何以言之濕家不云關節煩疼而云身上疼痛是濕氣不流關節而外客肌表也不云發熱身似熏黃復云發熱面黃而喘是濕不幹於脾而薄於上焦也陰受濕氣則濕邪為深今頭痛鼻塞而煩是濕邪客於陽而不客於陰也濕家之脈沉細為濕內流今脈大者是濕不內流而在表也又以自能飲食胸腹別無滿痞為腹中和無病知其濕氣微但內藥鼻中以宣通頭中寒濕是注其理明且盡矣若夫脈經之無身上疼痛十三字豈無其說乎頭痛鼻塞其痛在頭身上疼痛發熱其病在經脈內藥鼻中者為去頭中寒濕故減十三字爾然則三陽經皆上於頭太陽與陽明俱到鼻頞今頭上寒濕而鼻為之塞也則二經脈皆不通鬱而發熱身無疼痛內藥鼻中頭上之濕散則二陽之經脈行而病可盡愈矣濕家身煩疼可與麻黃加朮湯發其汗慎不可以火攻之麻黃加朮湯方麻黃二兩去節桂枝二兩去皮甘草一兩炙杏仁七十個去皮尖白朮四兩上五味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗衍義此為氣濕之邪蓋邪者濕與寒合故令人身疼大法表實成熱則可發汗無熱是陽氣尚微汗之恐虛其表今是症雖不云發熱而煩已生煩由熱也所以服藥不敢大發其汗且濕亦非暴汗可散故用麻黃湯治寒加朮去濕使其微汗爾然濕邪在表者惟可汗之不可火攻火攻則增其熱必有發痙之變所以戒人慎之病者一身盡疼發熱日晡所劇者名風濕此病傷於汗出當風或久傷取冷水所致也可與麻黃杏仁薏苡甘草湯麻黃杏仁薏苡甘草湯方麻黃去節半兩湯泡甘草一兩炙薏苡仁半兩杏仁十個去皮尖炒上銼麻豆大每服四錢水一盞半煮八分去滓溫服有微汗避風衍義按傷寒論注曰身盡疼痛濕也發熱日晡所劇者風也若汗出當風而得之者則先客熱而後感風若久傷取冷得之者則先傷風而後中濕註文若是其謂日晡所劇為風者則義未了予按內經太陰陽明論曰太陰陽明為表裡脾胃脈也外合肌肉故陽受風氣陰受濕氣所以風濕客之則一身肌內盡痛夫陽氣者一日而主外平旦陽氣生屬少陽日中陽氣隆屬太陽日西氣門內閉屬陽明是故陽明之氣主乎申酉所以日晡所劇也方用麻黃治寒濕取汗為主杏仁利氣薏苡仁除風熱濕痹為臣甘草和脾胃解肌肉為使風濕脈浮身重汗出惡風者防己黃耆湯主之防己黃耆湯方防己一兩甘草半兩炒白朮七錢五分黃耆一兩一分去蘆上銼麻豆大每抄五錢匕生薑四片大棗一枚水盞半煎八分去滓溫服良久再服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如蟲行皮中從腰下如冰後坐被上又以一被繞腰下溫令微汗瘥衍義此症風濕皆從表受之其病在外故脈浮汗出凡身重有肌肉痿而重者有骨痿而重者此之身重乃風濕在表故不作疼虛其衛氣而濕著為身重由是以黃耆實衛甘草佐之防己去濕白朮佐之然則風濕二邪獨無散風之藥何耶蓋汗多知其風已不留以表虛而風出入乎其間因之惡風爾惟實其衛正氣壯則風自退此不治而治者也若其有喘者濕中兼寒也則加麻黃以散之若風內應肝木傷其胃中不和者則加芍藥以瀉之芍藥味酸能自土中瀉木若氣上衝者則加桂枝以散其逆若下有陳寒者謂下焦肝腎之分則加細辛以溫之細辛散里之表藥也服後云云者方中令作一段然考之當在下有陳寒加細辛之後連為一段何則細辛佐防己去寒濕黃耆實表表尚全實則濕不退所以皮中如蟲行表實未全則陽氣未周於是從腰以下其陳寒者猶得如冰必以被令溫助接其陽使之微汗傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若大便堅小便自利者去桂加白朮湯主之桂枝附子湯方桂枝四兩去皮生薑三兩切附子三枚炮去皮破八片甘草二兩炙大棗十二枚擘上五味以水三升煮取一升去渣分溫三服白朮附子湯方白朮二兩附子一枚半炮去皮甘草一兩炙生薑一兩半切大棗六枚上五味以水三升煮取一升去滓分溫三服一服覺身痹半日許再服三服都盡其人如蝟狀勿怪即是朮附並走皮中逐水氣未得除故爾衍義按是症亦出傷寒論其注曰傷寒與中風至八九日邪氣多在裡必不苦疼痛今日數多復身體疼煩不能自轉側者風濕相搏也煩者風也身疼不能自轉側者濕也脈浮虛為風澀為寒濕也不渴不嘔里無邪也風濕俱在經也與桂枝附子湯以桂枝散表之風附子逐經中之濕小便利大便堅為津液之不足桂枝發汗走津液故去之而加白朮雖然自病而察藥自藥而察病因知身之不能自轉側者非惟濕邪所致也亦為陽氣不充筋脈無養故動之不能也欲去陽氣不充之濕者必以辛熱氣味之藥則可補其陽而逐其濕與治傷寒同法是症之用附子者殆此歟於是雖大便堅而不為微結者亦用之如後條身疼不能屈伸用附子甘草湯治者亦此意不然身疼脈浮為病在經又不言其有汗必取汗而解乃云其服藥如蝟者得非陽虛不勝夫邪藥之相逐而然歟補註傷寒至八九日亦云久矣既不傳經復不入腑者因風濕持之也所顯外症煩疼者風也不能轉側者濕也不嘔不渴者無里症也其脈浮虛而澀正與相應然後知風濕之邪在肌肉而不在筋節故以桂枝表之不發熱為陽氣素虛故以附子逐濕兩相綰合自不能留矣然在經曰傷於濕者必小便不利大便反快今其人與此相反者知膀胱之氣化無傷而胃腑之津液已耗也又安取於桂枝之散布乎加白朮者所以安胃也然白朮性燥仲景何以復燥其結耶殊不知內已結者邪入必易況外無熱症必濕多風少可知矣設濕氣內入將有初硬後溏之慮故用術草以和中氣仍姜附以驅外邪略轉易間便是因人而施之大道也然則人病何常精神不等仲景又何能逐一以相告耶風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之甘草附子湯方甘草二兩炙附子二枚炮去皮白朮二兩桂枝四兩去皮上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解食汗出復煩者服五合恐一升多者服六七合為妙衍義此亦出傷寒論其注曰風則傷衛濕流關節風濕相搏而邪亂經故骨節疼煩掣痛不得屈伸近之則痛劇也風勝則衛氣不固汗出短氣惡風不欲去衣為在表濕勝則水氣不行小便不利或身微腫為濕外薄也此湯散濕溫經固衛觀夫此方與前意同但此不用薑棗為汗出更不發之白朮以去濕取汗益短氣也補註此條方是風行於皮毛關節之間濕流於腠理筋骨之際阻遏正氣不令宣通遂致痛不可近不得屈伸此其徵也汗出短氣惡風不欲去衣邪風襲入而中衛之正氣俱虛也小便不利身微腫者中外為濕所持而膀胱之化不行也安得不以甘術和中桂附去邪耶然此症較前條更重且里已受傷曷為反減去附子耶前條風濕尚在外在外者利其速去此條風濕半入里入里者妙在緩攻仲景正恐附子多則性猛且急骨節之竅未必驟開風濕之邪豈能托出徒使汗大出而邪不盡爾君甘草者欲其緩也和中之力短戀藥之用長也此仲景所以前條用附子三枚者分三服此條只二枚者初服五合恐一升為多宜服六七合全是不欲盡劑之意學者於仲景書有未解即於本文中求之自得矣太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已洒洒然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗則惡寒甚加溫針則發熱甚數下之則淋甚衍義按是症亦出傷寒論其注曰病有在表有在裡有表裡俱病者發熱惡寒身重疼痛者表中暍也脈弦細芤遲者中暑脈虛也小便已洒洒毛聳手足逆冷者太陽經氣不足也小有勞身即熱者謂勞其陽氣而暍即發也口開前板齒燥者里有濕也口開為喘喝也以喘喝不止故前板齒乾燥若發汗以去表邪則外虛陽氣故惡寒甚若以溫針助陽則火熱內攻故發熱甚若下之以除裡熱則內虛而膀胱燥故淋甚注雖已解過治之失於當救之道則未明予嘗思之此症屬陰陽俱虛脈弦細者陽虛也芤遲者陰虛也所以溫針復損其陰汗之復傷其陽此症惟宜甘藥補正以解其熱爾即靈樞所謂陰陽俱不足補陽則陰竭補陰則陽脫可將以甘藥不可飲以剛劑太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯主之白虎加人參湯方知母六兩石膏一斤碎甘草一兩粳米六合人參三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服衍義此症亦出傷寒論其注云汗出惡寒身熱而不渴者中風也汗出惡寒而渴者中暍也然而未有明其至理者蓋此但言中風初得表症與自汗出身熱惡寒相似獨以渴不渴為辨爾籲豈謂中風終無渴者耶若傷寒中風則皆有背微寒與時時惡風而渴者矣亦以白虎人參湯治之乎夫此症汗出惡寒身熱而渴豈不與彼證所同者哉蓋此證為令火之氣酷其金肺主氣者也肺傷則衛氣虛然太陽膀胱屬水主表肺金之子也母虛而子亦不足衛虛表不足由是汗出身熱惡寒內經曰心移熱於肺傳為膈消膈消則渴也皆相火傷脈之所致此可知其要在救肺也石膏雖能除三焦火熱然仲景名白虎者為石膏功獨多於清肺退肺中之火是用為君知母亦就肺中瀉心火滋水之源人參生津益所傷之氣而為臣粳米甘草補土以資金為佐也太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也一物瓜蒂湯主之一物瓜蒂湯方瓜蒂二十個上銼以水一升煮取五合去滓頓服衍義此證嘗見傷寒注云脈虛身熱得之傷暑身熱脈微弱者暍也身體疼痛者水也夏得暑熱以水灌洗而得之一物瓜蒂散服之嘗觀仲景暍病惟出三證豈偶然哉舉其端將為後世準繩一者明其表裡俱虛一者言其暍中表之熱而此言外邪郁令火而成中暍也若是邪郁令火比類而推其因殆有不可勝言者焉如取風涼者感霧濕者食生冷者素有積熱者陰血素虛不勝夫熱者宿邪感動者處陰地者凡是之因皆足以郁其令火為中暍之病或輕或重或表或里或虛或實隨證發現若論其治邪退熱較量權衡又可一言盡哉諸集類方論徒多其證聚其方未有明言其脈證屬於何因害於何經用何藥為君以治之苟不潛心於仲景書者吾未信其泛然從方論者果切於病情乎瓜蒂本草謂其主胸腹邪氣皆吐下之此以夏傷冷水水行皮中而皮中者豈非屬表何乃用是藥去胸中之水乎蓋內經有形寒飲冷則傷肺況皮乃肺之所合內外相應且瓜蒂又治四肢浮腫下水而冷水之在皮中者不惟灌洗得散而飲冷停水者亦得散於皮中故兩者皆得而用之嘉言合論治暍用白虎加人參湯瓜蒂湯二方補註金匱治暍病只出二方一者白虎加人參湯專治其熱以夏月之熱淫必僭而犯上傷其肺金耗其津液用之以救肺金存津液也孫思邈之生脈散李東垣之清暑益氣湯亦既祖之矣一者瓜蒂散專治其濕以夏月之濕淫上甚為熱亦先傷其肺金故外漬之水得以聚於皮間皮者肺之合也用以搐其胸中之水或吐或瀉而出則肺氣得以不壅而皮間之水得以下趨也何後人但宗仲景五苓散為例如河間之通苓散子和之桂苓甘露湯非不得導濕消暑之意求其引伸瓜蒂湯之制以治上焦濕熱而清肺金則絕無一方矣抑知無形之熱傷其肺金則用白虎加人參湯救之有形之濕傷其肺金則用瓜蒂湯救之各有所主也
