body:
  text: 卷十五黃疸病脈證並治第十五論二首脈證十四條方七首寸口脈浮而緩浮則為風緩則為痹痹非中風四肢苦煩脾色必黃瘀熱以行衍義脾胃者主四肢合肌肉其色黃其氣化濕其性痞著其脈遲緩所畏風木風者善行數變若中風而風獨行者開則泄皮毛而出汗閉則熱肌肉以悶亂今風與濕相搏則成痹所以痹之風則不能中風之善行數變內郁為瘀熱鬱極乃發風風性動挾脾胃之積熱以行從而走四肢欲散不散為之苦煩出肌膚為之色黃緣風所致故脈浮因取痹故脈緩也趺陽脈緊而數數則為熱熱則消穀緊則為寒食則為滿尺脈浮則傷腎趺陽脈緊則傷脾風寒相搏食谷即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞疸腹如水狀不治衍義谷疸症趺陽脈緊數者何寒而致緊何熱而致數尺浮何為傷腎趺陽緊何為傷脾風從何生不詳其源莫知其所治矣蓋天之六氣感人臟腑而應於脈診因以數為熱緊為寒矣然人臟腑氣化亦有風寒濕熱燥火與天氣同其名寒熱濕溫涼同其性陰陽表裡同其情浮沉遲數同其病將何以別天與人之氣乎天氣從八風之變邪自外入人氣從七情食色勞役之傷邪自內出谷疸由臟氣所化之淫邪為病非天氣也蓋脾胃之土有陰陽脾陰而胃陽陰陽離決二氣不合則胃獨聚其陽以成熱為病消穀脾獨聚其陰以成寒為腹滿於是寒熱見緊數之脈而緊又為之傷脾者乃肝木挾腎寒乘虛剋土故曰風寒相搏食入於胃長氣於陽肝木之風得陽則動故食谷則頭目眩暈也腎屬水藏精實則脈沉虛則脈浮而精生於穀穀不化則精不生精不生則腎無所受虛而反受下流之脾邪故曰尺浮傷腎又曰陰被其寒陰謂腎寒謂脾也此穀氣不化所積之瘀濁屬於脾之寒者不流則傷腎屬於胃之熱者下流則傷膀胱由是小便不通身體盡黃生於胃熱食谷之濁故曰谷疸陳無擇謂是症用苦參丸方苦參用龍膽除胃中伏熱本草以二藥能益肝膽平胃氣以豬膽為使此退胃之木火用大麥者五穀之長脾胃所宜將苦參龍膽入脾土也本草又曰破冷氣去腹滿此療脾陰寒結衍義女勞疸惟言額上黑不言身黃簡文也後人雖曰交接水中所致特其一端耳然以此連谷疸之後必胃先有穀氣之濁熱下傷於腎而後黑黑疸因黃而發也二臟並病安得不交見其色乎蓋胃陽明也陽明與宗筋合於氣街飲食入內宗筋通用陰精泄脫而陽明之濕熱乘虛下流於腎之中腎中之火亦乘陽明上下交馳胃土發越而色黃相火入炎水中而色黑二臟並病故二色並見其黑色先見於額者膀胱脈上巔交鼻額火性炎上故腎火從膀胱上越額為神庭屬心部心火之主也心腎子午同化足經之火炎就手經亦必出於額額火之巔也心主汗火越於此汗亦出此所以額黑微汗也手足心熱者手心乃包絡滎穴足心乃腎之井穴心腎火盛則應之薄暮即發膀胱急小便自利乃陽明主闔日暮陽明收斂濕熱下流膀胱之氣雖滿急其氣降故小便自利若濕熱火鬱甚腎水之氣不行停積於腹脹如水狀者則腎衰矣故難治此以氣受病者言之若血病而黑則如下條女勞疸云心中懊憹而熱不能食時欲吐名曰酒疸衍義此飲之過當所致也酒為五穀所致醞而成濕熱有毒其氣歸心味歸脾胃胃陽主升脾陰主降胃得之則熱甚脾得之則陰傷陰傷則不能降不降則所飲停而不去氣熏於心心神不寧而作懊憹氣痞中焦故不能食蓄極乃發故時欲嘔而為疸也陽明病脈遲者食難用飽飽則發煩頭眩小便必難此欲作谷疸雖下之腹滿如故所以然者脈遲故也衍義傷寒陽明證注陽明病脈遲邪方入里熱未為實食入於胃長氣於陽胃中有熱食難飽飽則微煩而目眩者穀氣與熱氣相擊兩熱合消搏津液若小便利者不發黃熱得泄也小便不利則熱不得泄身必發黃以其發於穀氣之熱故名谷疸熱實者下之脈遲為熱氣未實雖下之腹滿亦不減也經曰脈遲尚未可攻且脈遲不但為熱未實脈經曰關脈遲滯而弱者無胃氣而有熱則胃虛而脈遲尤不可攻也夫病酒黃疸必小便不利其候心中熱足下熱是其證也衍義酒為濕熱之最膀胱者清淨之府津液藏焉氣化所出若過於酒傷其氣化小便必難積氣於中則心熱流於腎則足下熱積成瘀熱發於外而為黃疸也酒黃疸者或無熱清言了了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之衍義酒入胃而不傷心則無心熱故神不昏而其言清朗也不傷腎則無足熱但酒停於膈欲吐陽明氣鬱成腹滿陽明脈上入額中作鼻燥脈浮者在膈上積多在陽先吐上焦而後治其中滿沉弦者在膈下積多在陰先下其中滿而後治其上焦也酒疸心中熱欲嘔者吐之愈酒停胃上脘則心中熱而後嘔必吐之乃愈酒疸下之久久為黑疸目青面黑心中如啖蒜齏狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之衍義酒疸之黑非女勞疸之黑也女勞之黑腎氣所發也酒疸之黑敗血之黑也因酒之濕熱傷脾胃脾胃不利陽氣不化陰血不運若更下之久久則運化之用愈耗矣氣耗血積故腐瘀濁色越肌面為黑味變於心咽作嘈雜心辣如啖蒜齏狀榮血衰而行於皮膚爪之不仁輸於大腸便如黑漆其目青與脈浮弦皆血病也師曰病黃疸發熱煩喘胸滿口燥者以病發時火劫其汗兩熱相得然黃家所得從濕得之一身盡發熱而黃肚熱熱在裡當下之衍義黃疸必由濕熱所發濕有天地之濕有人氣之濕有飲食之濕三者皆內應脾胃鬱而成熱鬱極乃發則一身熱而土之黃色出見於表為黃疸也此證先因外感濕邪大法濕宜緩取微汗久久乃解今因火劫其汗汗縱出而濕不去火熱反與內之鬱熱相併客於足陽明經故發熱煩喘胸滿熱仍在故燥此際宜寒涼之劑如肚熱入腑則當下之矣脈沉渴欲飲水小便不利者皆發黃衍義大抵黃疸俱屬太陽陽明熱蒸其土而然也而陽明又屬金金得火則膹郁燥渴燥與濕熱相搏則津液不化故上焦渴而欲飲下焦約而小便難上下不通鬱極而發於皮膚故作黃此條在裡之熱甚故脈沉傷寒論陽明病有發熱頭汗出身無汗渴飲水漿小便不利者茵陳湯主之黃疸之病當以十八日為期治之十日以上瘥反劇者難治疸而渴者其疸難治疸而不渴者其疸可治發於陰部其人必嘔發於陽部其人振寒而發熱也衍義疸即疸也單陽而無陰濕熱甚脾胃之津液乏竭無陰熱蒸不已孤陽能獨生乎內經曰剛其剛陰氣破散陽氣消亡其難治為此若不渴則陰氣猶存故可治陰部者脾太陰也陽部者胃陽明也熱甚於里則嘔熱在於表則發熱振寒靈樞曰脾是動者嘔陽明是靜者灑灑振寒也傷寒發黃渴亦茵陳湯主之谷疸之為病寒熱不食食即頭眩心胸不安久久發黃為谷疸茵陳蒿湯主之茵陳蒿湯方茵陳蒿六兩梔子十四枚炒大黃三兩上三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也衍義此湯治陽明瘀熱在裡身黃髮熱但頭汗出身無汗劑頸而還小便不利渴飲水漿者又傷寒七八日身黃如橘子色小便不利腹微滿者今又治是證三者盡屬裡熱但務去其邪病狀之異弗論矣此寒熱不在表脾胃內熱達於外而成肌膚寒熱者亦不能食靈樞曰肌膚熱者取三陽於下補足太陰以出其汗皆因脾胃熱故不解其表而遽治其里也蓋茵陳湯治熱結髮黃佐梔子去胃熱通小便更以大黃為使蕩滌之雖然治疸不可不分輕重如梔子柏皮湯解身熱發黃內熱之未實者麻黃連翹赤小豆湯治表寒濕內有瘀熱而黃者大黃硝石湯下內熱之實者梔子大黃湯次之茵陳蒿湯又次之又必究其受病之因有同異既病之人有勞逸若得之膏粱食肥者氣滯血壅得之先貴後賤前富後貧與脫勢慚愧離愁憂患者雖皆鬱積成熱氣血失損不可與食肥者同治若始終貧賤不近水冒雨即殘羹冷汁久臥濕地多挾寒濕致陰雨乖隔而病又可與上二者同治乎故攻邪同而先後調治亦不可不審也腹滿舌痿黃躁不得臥屬黃家一作身痿衍義瘀熱內積為腹滿外連肌表成痿黃身熱氣煩血少榮微夜不入陰故不睡屬黃家者以其雖不似黃疸之黃亦由積漸所致也黃疸之黃深實熱之黃痿黃之黃淺虛熱之黃若舌痿黃燥者亦有說心脾脈絡舌上下凡舌本黃燥即是內熱況舌痿乎濕熱結積雖不行肌表然已見於舌即屬黃家也黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治硝石礬石散主之硝石礬石散方硝石礬石燒等分上二味為散以大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黑是候也衍義腎者陰之主也為五臟之根血盡屬之血雖化於中土生之於心藏之於肝若腎陰病則中土莫得而化心莫得而生肝莫得而藏榮衛莫得而行其血敗矣將與濕熱凝瘀於腸胃之間腎屬水其味鹹其性寒故治之之藥必用鹹寒補其不足之水瀉其所客之熱蕩滌腸胃推陳致新用硝石為君本草礬石能除固熱在骨髓者骨與腎合亦必能治腎熱可知也大麥粥汁為之使引入腸胃下泄鬱氣大便屬陰瘀血由是而出其色黑小便屬陽熱液從是而利其色黃也酒疸病心中懊憹或熱痛梔子大黃湯主之梔子大黃湯方梔子十四枚大黃一兩枳實五枚香豉一升上四味以水六升煮取三升分溫三服衍義酒熱內結心神昏亂作懊憹甚則熱痛梔子香豉皆能治心中懊憹大黃蕩滌實熱枳實破結逐停去宿積也傷寒論陽明病無汗小便不利心中懊憹者身必發黃是知熱甚於內者皆能成是病非獨酒也諸病黃家但利其小便假令脈浮當以汗解之宜桂枝加黃耆湯主之衍義黃家大約從水濕得之經雖云治濕不利小便非其治也然脈浮者濕不在裡而在表表熱乘虛入里亦作癃閉故須以脈別之汗解攻下各有所宜也而攻下之法既有淺深輕重利小便與發汗之方何獨不然乎是方所主惟和榮衛非有發汗峻劑必表之虛者用之連翹赤小豆湯又是里之虛者用之利小便亦然是宜知其大略也諸黃豬膏發煎主之附方豬膏半斤亂髮如雞子大三枚上二味和膏發中共煎發消藥成分再服病從小便出衍義此但言諸黃無他證必將謂證有變態不可悉數及方云女勞疸身目盡黃發熱惡寒小腹滿小便難以大熱大寒女勞交接從而入水所致用是湯又云五疸身體四肢微腫胸滿不得汗汗出如黃柏汁由大汗出入水所致豬脂一味服傷寒類略亦云男子女人黃疸飲食不消胃中脹熱生黃衣胃中有燥屎使然豬脂煎服則愈因明此方乃治血燥者也諸黃所感之邪與所變之臟雖不同然至郁成濕熱則悉干於脾胃胃之陽明經更屬於肺金金主燥若濕熱勝則愈變枯澀血愈耗干故諸黃起於血燥者皆得用之考之本草豬脂利血脈解風熱潤肺痿熱毒五疸身腫不得臥者非燥之在上歟胃中黃衣干屎非燥之在中歟小腹滿小便難非燥之在下歟三焦之燥皆將豬脂潤之而燥在下小便難者又須亂髮消瘀開關格利水道故用為佐此與前條硝石礬石散同治膀胱小腹滿之血病然一以除熱去瘀一以潤燥礬石之性燥走血安可治血燥乎又太陽證身盡黃脈沉結小便自利其人如狂者血證諦也抵當湯主之乃重劑也此則治血燥之輕劑也黃疸病茵陳五苓散主之茵陳五苓散方茵陳蒿末十分五苓散五分上二味和先食飲方寸匕日三服衍義此亦治黃疸不言他證與豬膚髮煎並出者彼以燥在血此以燥在氣也夫病得之汗出入水何以成燥曰濕熱相紐而不解則肺金治節之政不行津液不布而成燥也燥郁之久濕熱蒸為黃疸矣本草茵陳治熱結黃疸小便不利故主之也燥因熱勝梔子柏皮湯因濕鬱茵陳五苓散然非徒治濕而已亦潤劑也桂枝開腠理致津液通氣白朮茯苓生津皆可潤燥也古人論黃疸有濕黃有熱黃濕黃者色如熏黃熱黃者色如橘子色更有陽黃有陰黃陽黃者大黃佐茵陳陰黃者附子佐茵陳此用五苓散佐者因濕熱鬱成燥也明矣黃疸腹滿小便不利而赤自汗出此為表和裡實當下之宜大黃硝石湯大黃硝石湯方大黃硝石黃柏各四兩梔子十五枚上四味以水六升煮取二升去滓內硝更煮取一升頓服衍義邪熱內結成腹滿自汗大黃硝石蕩而去之膀胱內熱致小便不利而赤黃柏梔子涼以行之此下黃疸重劑也黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之衍義小便不變欲自利者內有濕飲積而熱未盛也脾太陰濕甚土氣不化則滿脾濕動肺則喘有似支飲之狀者故不可除其熱熱除則胃中反寒寒氣上逆為噦矣半夏生薑能散逆去濕消痰止噦此湯用在除熱之後非治未除熱之前者也諸黃腹滿而嘔者宜柴胡湯柴胡湯方柴胡半斤半夏半升人參甘草黃芩各三兩大棗十二枚生薑三兩切上六味以水六升煮取三升分溫服日三服衍義邪正相擊在裡則腹滿氣逆在上則嘔上猶表也故屬半表半裡小柴胡湯主之柴胡黃芩除裡熱半夏散里逆人參甘草補正緩邪生薑大棗和榮衛合表裡調陰陽也又必隨證加減法在傷寒論小柴胡湯後男子黃小便自利當與虛勞小建中湯衍義雜病中虛致脾胃不化濕熱蓄積而為黃雖小便不利亦當補瀉兼施男子黃者必由入內虛熱而致也反見小便自利為中下無實熱惟虛陽浮沉為黃耳故與治虛勞之劑補正氣正氣旺則榮衛陰陽和而黃自愈矣補注傷寒論中雲小便利者不能發黃以熱從小便去故也今便利而黃自若則其黃亦必色淡氣虛非誠有大熱也故從補不然便即利矣黃胡為乎來哉與瘀血在脾者不侔也與熱積膀胱者不侔也此明系虛黃上泛從中下二焦虛得之然仲景微示房勞之意而仍補中焦者正以黃終歸土色也瓜蒂散古方多用此治黃或作散或吹鼻皆取黃水為效此治水飲鬱熱在膈上者何也蓋瓜蒂吐劑也內經曰在上者因而越之仲景云濕家身上疼而黃內藥鼻中是亦邪淺之故也附方千金麻黃醇酒湯方麻黃一把去節綿裹美酒五升上二味煮取半升頓服取小汗春月用水煮
