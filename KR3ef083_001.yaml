body:
  text: 卷一臟腑經絡先後病脈證第一論十三首方一首脈證二條問曰上工治未病何也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾旺不受邪即勿補之中工不曉相傳見肝之病不解實脾惟治肝也夫肝之病補用酸助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛心火氣盛則傷肺肺被傷則金氣不行金氣不行則肝氣盛肝氣盛則肝自愈此治肝補脾之要妙也肝虛則用此法實則不可用之經曰虛虛實實補不足損有餘是其義也餘臟準此衍義經謂五臟相傳者又是臟氣因邪並之邪正相合發動則有餘故得傳於不勝也今乃云肝虛虛證知其傳脾然肝虛必弱弱則必為所勝者克奚能傳於不勝也藏氣法時論曰肝欲補急食辛以補之欲瀉以酸瀉之今云肝虛之病補用酸又奚為與內經相反也試嘗思之金匱首篇之所敘者由人稟五行氣味以成形形成則聲色漸著於是四者日行變化於身形之中未嘗斯須離也故列於篇首以為治病之規範此條特明於味者耳夫陰陽者在天為風寒濕熱燥火之氣在地成水火金土木之形在人化辛酸咸苦甘之味是故人之五臟從五行生數配其奇偶互成體用天一生水在體為精在氣為寒地二生火在體為神在氣為熱精與神配寒與熱配二者形之始著自合一奇偶也天三生木在體為魂在氣為風地四生金在體為魄在氣為燥魂與魄合風與燥配居形生成之中亦合奇偶然生物者氣也成之者味也以奇生則成而偶以偶生則成而奇寒之氣堅故其味可用鹹以耎熱之氣耎故其味可用苦以堅風之氣散故其味可用酸以收燥之氣收故其味可用辛以散土兼四時行無定位無專性陰陽沖氣之所生故其味甘以緩洪範亦曰稼穡作甘味之成者為體氣之成者為用有諸體而形諸用故肝木者必收之而後可散非收則體不立非散則用不行遂致體用之偏之氣皆足以傳於不勝也偏於體不足者必補酸以收之偏於用不足者必補辛以散之故補體者必瀉其用補用者即瀉其體因知內經云辛補為其用也仲景云酸補為其體也然仲景之言亦出內經內經謂風生木木生酸酸生肝豈非酸乃肝之本味以本味補本體不待言而可知故正言時論補瀉其用之行變化者亦不可以為仲景相反也又云弱水壯火使金氣不行則肝氣自愈者水乃木之母火乃木之子此即母能令子虛子能令母實之義由子克退鬼賊故也然不止一法又有所謂虛則補其母實則瀉其子二者之法常對待而立為五行逆順而設逆行則相勝順行則相生治相勝者則當弱水旺火治相生者則當益水瀉火水能生木於木虛者便當補水水盛則木得受其所生矣於木實者便當瀉火火退則金氣來制而木平矣仲景謂肝虛用此實則不用者意則在是觀夫內經治勝復之氣於既復之後兩氣皆虛必補養安全而平定之使余之氣自歸其所屬少之氣自安其所居初勝之際其氣為實則瀉其有餘由是以言仲景此條之意又未必不似於斯也夫人秉五常因風氣而生長風氣雖能生萬物亦能害萬物如水能浮舟亦能覆舟若五臟元真通暢人即安和客氣邪風中人多死千般疢難不越三條一者經絡受邪入臟腑為內所因也二者四肢九竅血脈相傳壅塞不通為皮膚所中也三者房室金刃蟲獸所傷以此詳之病由都盡若人能養慎不令邪風乾忤經絡適中經絡未流傳腑臟即醫治之四肢才覺重滯即導引吐納針灸膏摩勿令九竅閉塞更能無犯王法禽獸災傷房室勿令竭乏服食節其冷熱苦辛酸甘不遣形體有衰病則無由入其腠理腠者是三焦通會元真之處為血氣所注理者是皮膚臟腑之紋理也衍義此條舉生身之氣而言所謂五常者五行經常之氣也上應列宿在地成象名曰剛柔金木水火土也在天無質名曰陰陽風寒濕熱燥火也人在氣交中秉地之剛柔以成五臟百骸之形秉天地之陰陽以成六經之氣形氣合一神機發用駕行穀氣出入內外同乎天度升降浮沉應夫四時主宰於身形之中者謂之元真其外感者皆客氣也主客之氣各有正不正主氣正則不受邪不正則邪乘之客氣正則助其生長不正則害之主氣不正者由七情動中服食不節房欲過度金刃蟲獸傷其氣血盡足以虛之客氣之不正者由氣運興衰八風不常盡足以虛之客氣傷人或謂風寒濕熱燥火但有德化政令行於時和則化乖則變變則眚豈獨風能生能害於物哉今仲景止言風而不及五氣何也曰陰陽在天地間有是氣則有是理人秉是氣即以為命受是理即以為性若仁者乃風木之理風木乃仁之氣先儒且言仁者天地生物之心兼統五常之性其風木者亦天地生物號令之首必兼統五常之氣五氣莫不待其鼓動以行變化故內經曰之化之變風之來也大抵醫之獨言風猶儒之專言仁也內經又曰八風發邪以為經風觸五臟靈樞曰虛邪不能獨傷人必因身形之虛而後客之又云風寒傷人自經絡傳入經脈肌肉筋骨內經內臟仲景所謂人能慎養不令邪中為內外所因者蓋取諸此以分表裡者也非後世分三因之內因也語同而理異三因之內因由七情房室虛其元真以致經絡臟腑之氣自相剋伐者也補注此條首言元真通暢人即安和末言病則無由入其腠理蓋重陽氣以固其陰也問曰病人有氣色見於面部願聞其説師曰鼻頭色青腹中痛苦冷者死一云腹中冷苦痛者死鼻頭色微黑者有金氣色黃者胸上有寒色白者亡血也設微赤非其時者死其目正圓者痙不治又色青為痛色黑為勞色赤為風色黃者便難色鮮明者有留飲衍義青者肝之色肝苦急急則痛苦冷者是厥陰挾其腎水為寒寒極則陽亡陽亡則死微黑者腎之色也腎屬水水停則色微黑而不照若照者是水勝火而血死黃者脾之色脾主土輸穀氣於上焦以化榮衛今胸中有寒穀氣不化郁為胃熱顯出其黃色黃為中焦蓄熱今不謂中焦熱而為胸中有寒者乃指其致病之本而言也白者肺之色肺主上焦以行榮衛榮之色充則面華不充則面白知其亡血也赤為火色若非火令之時加於白色之上是火重來剋金也故死目通於肝眼皮屬之脾其肺金不能制木風木得以自盛反勝脾肺是故風急則眼皮斂澀目為之正圓甚則筋強肉重而成痙痙由木賊土敗故亦不治雖然色不可一例取則又云青為痛者與正文義同黑為勞者房勞也入房太盛竭精無度情火熾而腎水乏則又與水氣之黑異矣此屬之火也火之色雖赤然是火發於腎水之中故不赤而反黑其黑必枯燥不似水氣之黑黑而光澤者也赤為風者由熱生風子令母實故也黃為便難者以中焦熱燥其液腸胃不潤是以便難然是黃色必枯而不澤所以又謂若鮮明者為留飲留飲以津液不行滯其穀氣化熱致黃也雖然同此論也及考夫內經其五色又有從觀於面察於目謂面黃目青面黃目赤面黃目白面黃目黑皆不死又謂青如翠羽赤如雞冠黃如蟹腹白如豕膏黑如烏羽者是生色也青如草滋赤如衃血黃如枳實黑如炲煤白如枯骨是死色也又有從五臟分部顏頰鼻頤者如刺熱篇謂赤色是也由是推之五臟善惡之色更必有隨其氣顯露其色各於其所司目唇鼻竅之內外者蓋仲景欲明望色知病之道故舉此略耳師曰病人語聲寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病衍義此條舉聽五行之病聲而言所謂寂然者欲語而默默處也夫陰靜而陽躁此病在厥陰故好寂然也厥陰在志為驚在聲為呼在體為筋筋束關節所以厥陰之病善驚在聲為呼則知其病在骨節也喑喑然不徹者聲出不揚也蓋肺主氣膈乃肺之部宗氣行呼吸入出升降於是焉語聲之不徹則知其氣不得升是心膈之有病也啾啾者聲小啾唧也細而長者其氣起自下焦從陰則細道遠則長蓋是巨陽主氣少陰與之為表裡巨陽有邪則少陰上從而逆於巔腎在聲為呻陽主躁故呻吟之聲從陽變而為啾唧細長也巨陽脈在頭是頭中病亦仲景特發聽聲察病之一法耳若更推而廣之則五音之宮商角徵羽五聲之歌哭笑呻吟之變皆可求五臟表裡虛實之病五氣之邪尤醫者之當要也師曰息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿唾沫衍義息者呼氣出粗類微喘而有聲也呼出心與肺今火乘肺故呼氣奔促而為息也搖肩者肩隨息氣搖動以火主動故也其心之經脈掣引也因心中有堅實之邪不得和於經脈故經脈抽掣搖動息引胸中上氣咳者胸中脈所主也宗氣之所在火炎於肺則肺收降之令不行反就燥而為固澀堅徑氣道不利所以上氣出於胸中者則咳也息張口短氣肺痿唾沫此又火炎於肺之甚者收降清肅之氣亡惟從火出故張口不合也宗氣亦衰而息短矣津液不布從火而為沫唾矣此仲景因呼息以為察病之法與後條吸對言以舉端耳然息病屬於內外者豈止此而已動搖與息相應者又寧獨在肩而已豈無陰虛以火動者焉如內經謂乳子中風熱喘鳴息肩者脈實大也緩則生急則死是又在脈別者也師曰吸而微數其病在中焦實也當下之即愈虛者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治衍義谷之精氣乃分三隧清者化榮濁者化衛其一為宗氣留胸中以行呼吸焉呼吸固資於宗氣然必自陰陽合闢而為之機於是呼出者心肺主之吸入者腎肝主之心肺陽也腎肝陰也若中焦有邪實則阻其升降宗氣因之不盛於上吸氣因之不達於下中道即還宗氣不盛則吸微中道即還則往來速速則數故吸而微數瀉中焦實則升降行而吸即平矣不因中焦實即是腎肝之陰虛根本不固其氣輕浮上走脫陰之陽宗氣亦衰若此者死日有期尚可治乎然則上焦固是主乎呼下焦固是主乎吸若陰陽之配合則又未始有相離者故上焦亦得而候其吸焉而心肺之道近其真陰之虛者則從陽火而升不入乎下故吸促肝腎之道遠其元陽之衰者則因於陰邪所伏卒難升上故其吸遠此屬真陰元陽之病皆難以治若夫人身之筋骨血肉脈絡皆藉陰氣之所成生氣無所克然後得以鎮靜而為化生之宇今陰氣憊矣生氣索矣器宇亦空矣惟呼吸之氣往來於其中故振振動搖不自禁也若此者即內經所謂出入廢則神機化滅是也故針藥無及矣師曰寸口脈動者因其旺時而動假令肝旺色青四時各隨其色肝色青而反色白非其時色脈皆當病衍義內經有謂五臟之脈春弦夏鉤秋毛冬石強則為太過弱則為不足四時皆以胃氣為本有胃氣曰平胃少曰病無胃曰死有胃而反見所勝之臟脈甚者今病微者至其所勝之時病又謂五臟之色在旺時見者春蒼夏赤長夏黃秋白冬黑所主外榮之常者白當肺當皮赤當心當脈黃當脾當肉青當肝當筋黑當腎當骨五色微診可以目察能合脈色可以萬全其內經之言如此斯論殆將本於是之節文也問曰有未至而至有至而不至有至而不去有至而太過何謂也師曰冬至之後甲子夜半少陽起少陽之時陽始生天得溫和以未得甲子天因溫和此為未至而至也以得甲子而天未溫和此謂至而不至也以得甲子而天大寒不解此謂至而不去也以得甲子而天溫如盛夏五六月時此謂至而太過也衍義夫鬥建子月中辰即冬至節也節陽至一之氣即至故律管飛灰候於是日今仲景乃云冬至後甲子夜半候以至未至者何歟殆以天干地支所合節至之日便名甲子非直待其真甲子日至以候氣也不然假如乙丑丙寅日冬至兩月後方是甲子其時始候之乎考之內經候氣至不至有謂四時者有謂五運者有謂六氣者發明詳矣至四時則曰天以六六為節地以九九制會六甲終歲三百六十日法也五日為一候三候為一氣六氣為一時四時為一歲而各從其治主焉求其氣之至也皆從春始未至而至此為太過則薄所不勝乘所勝也命曰氣淫至而不至此為不及則所勝妄行而所生受病所不勝薄之也命曰氣迫然在脈應春弦夏鉤秋毛冬石太過者病在外不及者病在內在五運相襲而皆治之終期之日陽年先天而至當歲之運則氣太過陰年後天而至當歲之運則氣不及與其年和則非太過不及而平與司天地氣不和則勝而報復復則鬱發待時而作作則風濕燥熱火寒之氣非常而暴在六氣則曰六氣之勝清氣大來燥之勝也風木受邪肝病生焉熱氣大來火之勝也燥金受邪肺病生焉之類在脈應則曰厥陰之至弦少陰之至鉤少陽之至大而浮太陰之至沉陽明之至短而澀太陽之至大而長至而和則平至而甚則病至而反者病至而不至者病未至而至者病陰陽易者危然候六氣之應常以正月朔旦平明視之觀其位而知其所在而其至則從運之先天后天也由是觀之仲景言四時之定法者若遇氣運加臨主位則必將奉天政之寒溫雖與四時氣有反者難為逆時也候同也且經曰主勝逆客勝從又曰必先歲氣毋伐天和此又不在獨守四時之氣而參之以運氣者矣師曰病人脈浮者在前其病在表浮者在後其病在裡腰痛背強不能行必短氣而極也衍義脈浮為虛關前屬陽主表關後屬陰主裡所謂表者以足太陽言也里者以足少陰言也一腑一臟是其表裡所合其太陽經自足從背至項腰者腎府也是故表病則背強不能行里病則腰痛短氣而極少雖然寸尺脈浮非一經一病之可盡今獨出此病何也大抵用表裡而言病必舉太陽腎為例蓋太陽是諸陽之屬凡受邪必自此始腎是治內之主事書獨言此例以推之問曰經云厥陽獨行何謂也師曰此為有陽無陰故稱厥陽上言陽虛此言亡陰衍義厥者猶極也獨行無陰與配也王冰注內經一水不勝五火謂五臟厥陽也經又謂六陽並至謂之至陽又云至陽盛地氣不足由是觀之火即陽也至陽即厥陽也獨行獨並至也皆是陰不足而陽盛之極者也問曰寸脈沉大而滑沉則為實滑則為氣實氣相搏厥氣入臟即死入腑即愈此為卒厥何謂也師曰唇口青身冷為入臟即死如身和汗自出為入腑即愈衍義沉陰象也滑陽象也陰主血陽主氣邪在於血則血實邪在於氣則氣實故血實者脈沉氣實者脈滑邪盛者脈大五臟治內屬陰主藏精宅神今血氣並其邪而入堵塞於臟身之精氣不行神機化滅升降出入之道皆絶榮絶則唇口青靈樞曰是厥陰氣絶則唇青夫六腑治外屬陽主傳用水穀之氣充乎內外者也今血氣並邪入於腑腑陽動不比臟之陰靜靜者得其邪則因而堵塞不行動者邪雖入終不能久閉其氣道何則為在內之神機應乎外主養榮衛之氣則散行於表而身和和則腠理開邪散而汗自出榮衛之氣行故愈矣此仲景舉陰陽臟腑之大端如此至若厥病多由難以概論內經曰血氣並走於上則為大厥暴死者其上非膻中三焦之府者乎而乃以氣反則愈不反則死又如邪客五絡狀若尸厥者以通脈絡為治非頭面諸脈證為難概論也問曰脈脫入臟即死入腑即愈何謂也師曰非為一病百病皆然譬如浸淫瘡從口起流向四肢者可治從四肢流來入口者不可治病在外者可治入里者即死衍義脫者去也經派乃臟腑之隧道為邪氣所逼故絶氣脫去其脈而入於內五臟陰也六腑陽也陰主死而陽主生所以入臟即死入腑即愈而可治非惟臟腑之陰陽然也凡內外陰陽之邪毒出入表裡者皆然也問曰陽病十八何謂也師曰頭痛項腰脊臂腳掣痛陰病十八何謂也師曰咳上氣喘噦咽腸鳴脹滿心痛拘急五臟病各有十八合為九十病人又有六微微有十八病合為一百八病五勞七傷六極婦人三十六病不在其中清邪居上濁邪居下大邪中表小邪中里䅽飥之邪從口入者宿食也五邪中人各有法度風中於前寒中於暮濕傷於下霧傷於上風令脈浮寒令脈緊霧傷皮腠濕流關節食傷脾胃極寒傷經極熱傷絡補注此總內經所著之病而為之分陰陽悉表裡合上下內外以立言庶幾經絡明腑臟著所因顯不致散而難稽也如三陽在外病頭痛等六證則各有所行之經各顯本經之證三而六之非十八乎而三陰之在裡者亦然五臟各有十八合計為九十病其為病則於靈樞論心脈為瘛瘲班班可考矣若六腑則何如腑居內而實合於經者也故言腑者取諸合如胃合三里大腸合巨虛上廉小腸合巨虛下廉三焦合委陽膀胱合委中央膽合陽陵泉故邪之在腑者合外於經其受患為淺而欲散不難不若五臟之深且甚焉故曰微也其為病內經有分屬仲景括為一百八病蓋因腑之六以為數也凡此共二百三十四病統內外而言之也乃專為內因者如所謂五勞即視久傷血等云云也夫行立坐臥俱不可強乃至久者必迫於所不得已也其為傷孰甚焉然後知人之有體固有以用之也不用則體為不運然使過於用則體亦太勞而失所養矣若七傷則太飽傷脾等云云也夫五臟各有所司苟無以節之或貪於可欲之事或任其性氣之偏皆足害其和而況形為外之氣侵志為內之情動乎至極者又各極其偏之謂也氣血也肌肉也筋骨也精神也相均始為無弊設有過則必有不及者矣婦人三十六病瘕居十二謂月不應期而所下之物不一色也夫婦人為陰其痛屬腰半以下居多者以沖督任三脈之病有九痛也七害五傷三因各詳於經共為三十六病焉然則人之病也邪有以中之也明乎所中之邪則此邪非彼邪從可識矣人之一身上下表里盡之矣而所謂清濁大小邪者一為霧露一為地濁本天者親上本地者親下百病之長傷人之陽肅殺之氣傷人之陰者是也從口入者為內傷亦足使人發熱腹痛喘嘔脹滿不去其陳而致新不足以為功然邪之本於外中者因乎六氣乃仲景以為五邪如風寒濕霧熱而遺燥之一氣豈非以風寒與火皆足以成燥則燥本非一致而其情已兼三氣之內歟夫風之傷人三時俱有若寒必於冬故云暮其脈證詳於傷寒論中矣而仲景復詳於此者以其統論病之陰陽不可不言天地之陰陽分論人之五臟不可不言所淫之五邪蓋五氣之勝在天地五行之不足在人也故曰邪之所湊其氣必虛也問曰病有急當救里救表者何謂也師曰病醫下之續得下利清穀不止身體疼痛者急當救里後身體疼痛清便自調者急當救表也補注先表后里者不易之法也乃有救里先於表者豈無謂乎答曰攻表者正以里為急也邪在表苟不依法治之將延遲時日勢必內入而大患醫乃不明此理下之或早或重遂使下利清穀至於不止則里已急矣表證雖在法當救里里和而表未解仍當救表此亦一定之法也然仲景何以不言所以救之之法耶而四逆以佐正桂枝以退邪已詳於太陽篇中矣大病痼疾加以卒病當先治其卒病後乃治其痼疾也補注痼疾謂病已沉痼非旦夕可取效者卒病謂卒然而來新感而可取效於旦夕者乘其所入未深急去其邪不使稽留而為患也且痼疾之人正氣素虛邪尤易傳設多瞻顧致令兩邪相合為患不淺故仲景立言於此使後之學者知所先後也問曰五臟病各有得者愈五臟病各有所惡各隨其所不喜者為病病者素不應食而反暴思之必發熱也婁全善作暴食之補注五臟配五味理之正也言理之自然而見其性焉即以見其情焉何也如仲景言臟之各得者得其性之近也內經則言欲非以其情乎仲景言所惡亦以其性也而復云不喜亦即內經之所云苦非以其情乎然則五臟既各有性則惟遂其性而情始洽焉斯病者愈矣使拂其性而所惡乘之則情抑而為病固其常也雖然肝欲酸喜其收也又云肝欲辛又喜其散五臟皆然豈其欲本有相反者耶殊不知木曰曲直曲直作酸酸以固其體也木喜條達實近於散辛以益其用也天下無體不立無用不生體用得而自和矣論如肝惡風木性不喜動也而木又自足生風風性急木失其養足以生之故又云肝苦急也苦急而肝病矣經謂急食甘以緩之則病可愈假使忽思食苦是反得子助而氣為有餘則發熱可必他臟如之故五味得其平則足以相養而無偏勝之患四時合於正則各以相生而無不足之虞此在人之善調之也夫諸病在臟欲攻之當隨其所得而攻之如渴者與豬苓湯余皆仿此衍義此概言諸病在臟之屬裡者治法有下之泄之奪之消之溫之寒之和以平之各量輕重從宜施治務去其邪以要其正故引渴病以比類之而是證之用豬苓湯見卷十三消渴證中
