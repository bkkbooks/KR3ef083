body:
  text: 卷十四水氣病脈證第十四論七首脈證五條方九首師曰病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛惡風皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿衍義風水者腎本屬水因風而水積也內經大奇病論曰並浮為風水注以浮脈為風水脈浮下焦主水風搏於下故曰風水水熱穴論曰腎至陰勇而勞甚則腎汗出逢於風內不入於臟腑外不越於肌膚客於玄府行於皮里傳為胻腫本之於腎名曰風水評熱病論曰腎風面胕龐然壅害於言不當刺而刺後五日其氣必至至必少氣時熱熱從胸背上至頭汗出手熱口乾小便黃目下腫腹中鳴身重難以轉側月事不來煩不能正偃正偃則咳名曰風水今只言外證骨節痛惡風不言胕腫腎外合於骨水則病骨肝外合於筋風則筋束關節故骨節痛脈浮惡風者知其風水之證在表耳皮水者皮膚胕腫也靈樞曰腹脹者寒氣客於皮膚間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變巢氏病源則以皮水者腹如故而不渴與靈樞異蓋肺主氣以行榮衛外合皮毛皮毛病甚則肺氣膹郁榮衛停滯不行然肺氣之滿異於他邪氣雖成水終本輕清故𪔣𪔣然不堅按之沒指腹亦窅而不起玄府閉塞而不惡風鬱火燥其液而不渴當發其汗散皮毛之邪外氣通而鬱解矣此開鬼門也正水者腎主水腎經之水自病也內經曰腎者胃之關關不利故聚水成病上下溢於皮膚胕腫脹大上為喘呼不得臥標本俱病也石水者乃水積小腹胞內堅滿如石內經曰陰陽結邪陰多陽少名曰石水又曰腎肝並沉為石水注曰肝脈入陰內貫小腹腎脈貫脊中絡膀胱兩臟並藏氣熏衝脈自腎下入於胞今水不行故堅而結然腎主水水冬冰水宗於腎腎象水而沉名曰石水因水積胞內下從足手少陰上逆於肺而為喘巢氏病源石水者引兩脅下脹痛或上至胃脘則死看來上條雖同為石水與此條少異此偏於腎氣多腎為陰陰主靜故病只在下而不動彼則偏於肝氣多肝為陽主動故上行克胃脘也黃汗者病水身黃汗出如柏汁自後條諸證各有所致其因不一大抵黃色屬土由陽明胃熱故色見於外今之發熱胸滿四肢頭面腫者正屬足陽明經脈之證也熱久在肌肉故化癰膿若巢氏云疸水因脾胃有熱流於膀胱小便澀而身面大黃腹滿如水狀此亦黃汗之一也脈浮而洪浮則為風洪則為氣風氣相搏風強則為癮疹身體為癢癢者為泄風久為痂癩氣強則為水難以俯仰風氣相擊身體洪腫汗出乃愈惡風則虛此為風水不惡風者小便通利上焦有寒其口多涎此為黃汗衍義風者外感之風也氣者榮衛之氣也風乃陽邪從上受之故脈浮榮衛得風而熱故脈洪洪大也內經曰脈大則病進由邪之盛耳榮行脈中主血衛行脈外主氣風強者風得熱而強也風熱入搏於衛客於皮里氣滯郁聚而風鼓之為癮疹火復助風腠理開毫毛搖則身體癢癢為泄風內經曰諸痛瘡瘍皆屬於火又曰風氣外在腠理則為泄風久之不解風入分肉間相搏於脈之內外氣道澀而不利與衛相搏則肌肉膹䐜而瘡出風入脈中內攻榮血風氣合熱而血胕壞遂為痂癩也內經曰風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不行使肌肉膹䐜之而有瘍又曰脈風成厲厲即癩也所謂氣強者衛因熱則怫鬱停而不行氣水同類氣停則水生所聚之液血皆化水也不惟榮衛不能和筋骨肌肉鬱熱之邪且禁固難俯仰也至於風氣復行相擊榮衛之熱與水皆散溢於肌表而為洪腫及風氣兩解則水散衛行汗出乃愈惡風者不敵於風與水同為汗散而表虛因名風水不惡風者衛氣不從汗散外得固腠理則不惡而得固上焦則小便通利所謂上焦有寒者因風邪在上焦非真有寒冷也如傷寒證邪客上焦則中焦之穀氣不得上輸於肺郁為內熱津液凝積為胃熱熱則廉泉開廉泉者津液之道也開則發涎出流於唇口此黃汗由身倦浮腫胃熱發出土色也寸口脈沉滑者中有水氣面目腫大有熱名曰風水視人之目窠上微擁如蠶新臥起狀其頸脈動時時咳按手足上陷而不起者風水衍義內經脈沉曰水脈滑曰風面腫曰風目腫如新臥起之狀曰水頸脈動喘咳曰水又腎風者面胕龐然少氣時熱其有胕腫者亦曰本於腎名風水皆出內經也太陽病脈浮而緊法當骨節疼痛反不疼身體反重而酸其人不渴汗出即愈此為風水惡寒者此為極虛發汗得之渴而不惡寒者此為皮水身腫而冷狀如周痹胸中窒不能食反聚痛暮躁不得眠此為黃汗骨節痛咳而喘不渴者此為肺脹其狀如腫發汗則愈然諸病此者渴而下利小便數者皆不可發汗衍義傷寒論脈浮而緊者為風寒風傷衛寒傷榮榮衛俱病也榮衛者胃之穀氣所化從手太陽所出循行表裡在外則榮筋骨溫皮肉在內則貫五臟絡六腑故浮沉變脈皆見於寸口此條首言太陽病脈緊為太陽屬表榮衛所受風水隨在諸經四屬隸於太陽之表者分出六等於肝臟所合則骨節痛若風水挾木剋土脾合肌肉則肌肉不利骨節反不痛身體重而酸內經曰土不及則體重而筋肉瞤酸也因不渴則可發汗汗則邪散乃愈此由風勝水也亦名風水其汗皆生於氣氣生於精精氣若不足輒發其汗風水未散而榮衛之精先從汗散遂致虛極不能溫腠理故惡寒也若發汗辛熱之味上衝於肺亡其津液則肺燥而渴榮衛不虛則不惡寒風水之邪從肺虛風入並於所合之皮毛遂為皮水皮水久不解榮衛與邪並外不得溫分肉至於身腫冷狀如周痹內窒胸膈脾胃氣鬱成熱故不能食胃熱復上與外入之水寒相擊故痛聚胸中暮躁不得眠也脾土之色發於外是為黃汗若骨節疼痛而胕腫者是腎之候也咳而喘者是肺之候也二病俱見由腎脈上貫肝入肺乃標本俱病言脾脹恐肺字之誤靈樞曰肺是動病則肺脹滿膨膨而喘咳是也然病雖變更不動盡屬在表故浮緊之脈皆得汗之但渴與下利小便數亡津液者不可汗耳里水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴也越婢加朮湯主之方見中風衍義內經三陰結謂之水三陰乃脾肺少陰腎也蓋胃為五臟六腑之海十二經皆受氣焉脾為之行津液者臟腑經絡必因脾乃得稟水穀氣今脾之陰不與胃之陽和則陰氣結伏津液凝聚不行而關門閉矣關閉則小便不利不利則水積積則溢面目一身水從脾氣所結不與胃和遂從土色發黃腫結自三陰故曰里水其脈沉也如小便自利則中上焦之津液從三陰降下而亡故渴也是湯見後趺陽脈當伏今反緊本自有寒疝瘕腹中痛醫反下之下之即胸滿短氣衍義趺陽脈當伏者非趺陽胃氣之本脈也為水蓄於下其氣伏故脈亦伏脈法曰伏者為水急者為疝瘕小腹痛脈當伏而反緊知其初有寒疝瘕痛先病者治其本先當溫其疝瘕治寒救陽而後行可也若反下之是重虛在上之陽陽氣不布化而成胸滿短氣也趺陽脈當伏今反數本自有熱消穀小便數今反不利此欲作水衍義此與上條一寒一熱互舉其因此為熱消穀不能上化精微熱濁下流致膀胱不化小便蓄成積水故脈不伏而從熱反數也寸口脈浮而遲浮脈則熱遲脈則潛熱潛相搏名曰沉趺陽浮脈而數脈浮即熱數脈即止熱止相搏名曰伏沉伏相搏名曰水沉則絡脈虛伏則小便難虛難相搏水走皮膚即為水矣衍義寸口趺陽合診者何寸口者肺脈所過趺陽者胃之所過候脾肺合病必是二處也寸口脈浮而遲浮脈即熱者何浮為衛衛為陽衛不與榮和其陽獨在脈外故浮脈即熱矣遲脈即潛者何遲為榮榮陰也榮不從衛匿行脈中陰行遲故遲脈即潛矣熱潛相搏名曰沉者何脈者氣藏也榮衛之出陽入陰乃皆肺臟主之故百脈朝之也今榮衛不和熱潛之邪相搏而至則肺臟之氣不得布故結而沉矣趺陽脈浮而數浮脈即熱者何脾土中焦與胃為表裡脾陰也胃陽也脾與胃行津液化血者也胃經之陽不與脾經之陰合失陰之陽獨在表故脈浮即熱矣數脈即止者何脈者血之府血陰也血實則脈實陰失則脈緩今脾經之陰血虛不足脈被氣促而數數則陰血不得周流於脈故脈數即止矣熱止相搏名曰伏者何藏之於經表裡相資者也臟在裡以藉經脈之運動今二經以熱止之邪相搏名曰水者何脾肺手足太陰經之臟也夫陽為火陰為水今手足兩太陰持所結沉伏之陰相搏故化為水矣內經曰三陰結為水也沉則絡脈虛者何肺合皮毛絡脈之在皮膚者因肺氣沉不發於外榮血又潛不入於內絡脈虛矣伏則小便難者何小便以通行津液今脾氣復不為胃行津液則津液不入膀胱故小便難矣虛難相搏水走皮膚即為水者何小便難則水積積則溢溢則乘絡脈之虛而走注於皮膚故水病矣在內經則曰三陰結謂之水仲景則舉經絡榮衛之變而條析之以核病之源察脈論證其可不究心而消息之乎寸口脈弦而緊弦則衛氣不行緊即惡寒水不沾流走於腸間衍義脈弦為水緊為寒衛氣喜溫而惡寒水寒則衛氣無以溫分肉肥腠理故惡寒也然肺者榮衛之主通調水道下輸膀胱氣化出溺今衛氣不行即肺之治節不行治節不行則輸化之職廢故不得沾流水道反走腸間腸大腸也大腸與肺合若上條之走皮膚皮膚亦肺所主二者對出以明肺之不調則隨其所屬而為病耳少陰脈緊而沉緊則為痛沉則為水小便即難脈得諸沉當責有水身體腫重水病脈出者死衍義脈可一法取之乎不可也此脈沉有水脈出為死者是脈不可出而浮大也試以氣強為水者觀之非脈之浮大者乎而風水皮水脈皆浮懷孕婦病水亦浮水病豈獨取沉脈為例哉此條之論蓋獨為少陰病水耳少陰者至陰盛水也合四時主冬故脈沉水之象當然也少陰經氣當然也當沉故不可出出則少陰經氣外絶死之徵矣凡言浮沉遲數之脈為其各有所由故不可以一法取之也雖然腎臟獨病其水則沉兼風則不沉所為出者非獨為浮也為經氣離出其臟沉之亦無有也夫水病人目下有臥蠶面目鮮澤脈伏其人消渴病水腹大小便不利其脈沉絶者有水可下之衍義內經色澤者病溢飲溢飲者渴而多飲易入肌皮腸胃之外注云是血虛中濕又曰水陰也目下亦陰也腹者至陰之所居也故水在腹便目下腫也靈樞曰水始起也目下微腫如蠶如新臥起之狀其人初由水穀不化津液以成消渴必多飲多飲則水積水積則氣道不宣故脈浮矣所積之水溢於腸胃之郭則腹大三焦之氣不化則小便難若脈沉絶者知其水積在內已甚脈氣不發故也必下其水乃可愈問曰病下利後渴飲水小便不利腹滿陰腫者何也答曰此法當病水若小便自利及汗出者自當愈衍義下利血虛液少故渴渴而暴飲水停不散故小便不利溢於內外以成腫滿故小便利而汗出則所停之水行而腫滿愈矣心水者其身重而少氣不得臥煩而躁其人陰腫衍義心君火也其氣蕃茂遇寒水則屈伏今水客於心火氣鬱蕃不得發於分肉則身重不充盛於氣海則少氣煩熱內作則躁而不得眠也火氣不舒其味從郁所化而過於苦水積於外其味從濕所化而過於咸鹹味歸陰苦乃從咸潤下入於胞囊故陰腫也如病腎水者止以咸滲泄但陰下濕而已此因苦與咸相合苦性堅因火與水相搏所以鹹味不得滲泄而結為陰腫矣肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通衍義足厥陰之脈過陰器抵少腹挾胃屬肝絡膽布脅肋今客於經傷其生髮之氣肝臟之陽故病如此然肝在下主疏泄雖受水鬱終有時而津可微生則小便得以暫通也肺水者其身腫小便難時時鴨溏衍義肺主皮毛行榮衛與大腸合今有水病是榮泣衛停其魄獨居陽竭於外則水充滿皮膚肺本通水道下輸膀胱為尿溺今既不通水不得自小便出反從其合與糟粕混成鴨溏也脾水者其腹大四肢苦重津液不生但苦少氣小便難衍義脾居中及四肢與胃合為其脈自足入腹屬脾絡胃為陰臟也中主藏物今水在脾而脾胃之氣不行蓄積於中故腹大四肢不得並水穀故苦重穀精不布故津液不生胃之賁門不化則宗氣虛而少氣胃之幽關不通則水積而小便難腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面反瘦衍義足少陰之脈起足心循內踝貫脊屬腎絡膀胱為胃之關今水在腎關門不利故聚水而為腹大臍腫腰痛不得溺也夫腎為水之海然水在海者其味必咸咸必滲走囊外濕如牛鼻上汗也鹹水之病作則心火必退而衰微惟孤陰而已故逆冷也心火退伏則榮衛諸陽盡退不榮於上而脾胃穀精亦不循脈上於麵皮故瘦也師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈衍義分腰上下為便利發汗何也蓋身半以上天之分陽也身半以下地之分陰也而身之腠理行天分之陽小便通地分之陰故水停於天者開腠理而水從汗散水停於地者決其出關而水自出矣即內經開鬼門潔淨府法也師曰寸口脈沉而遲沉則為水遲則為寒寒水相搏趺陽脈伏水穀不化脾氣衰則鶩溏胃氣衰則身腫少陽脈卑音怯少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分衍義仲景脈法寸口多與趺陽合何也蓋寸口屬肺手太陰之所過肺朝百脈十二經各以其時來見於寸口脾胃二經出在右關胃乃水穀之海五臟皆稟氣於胃則胃又五臟之本所以經脈尤為諸經之要領也邪或干於胃者必再就趺陽診之趺陽足跗上衝陽胃脈之源也此條寸口沉為水遲為寒者非外入之邪即脾胃衝脈二海之病因水穀之陽不布則五陽虛竭虛竭則生寒下焦血海之陰不生化則陰內結內結則生水水寒相搏十二經脈盡從所稟而變見於寸口也脾與胃為表裡脾氣衰則不能與胃行其津液致清濁不分於裡而為鶩溏胃氣衰則不能行氣於三陽致陽道不行於表則身體分肉皆腫二經既不利則趺陽之脈伏矣邪在血海血海者衝脈所主衝脈與腎之大絡同出腎下男女天癸之盛衰皆系焉內經曰腎為作強之官伎巧出焉自越人以兩腎分左右右腎為男子藏精施化女子系胞成孕則衝任正隸其所用之脈也王叔和分兩腎於左右尺部皆以足少陰經屬之其表之腑亦並以膀胱足太陽配之但在左尺足太陽下注一說與三焦為表裡嘗考其由出自靈樞謂足三焦下輸出於委陽太陽之別也手少陰經也並太陽之正入絡膀胱約下焦實則癃閉又曰三焦者中瀆之腑水道出焉膀胱是孤腑也今以邪搏血海血海屬右腎之藏三焦是其腑是以男女亦必從陰陽氣血表裡而分在女則是其陰血海者病在男則是其陽三焦者病衝脈非大經十二之數附見於足少陰脈者是故男子少陽脈革為三焦氣不化氣不化則小便不利婦人少陰脈細則經水不通經為血血不利則為水名為血分雖然小便不利因水者不獨由於氣亦或有因血所致如前用蒲黃散等方治血概可見也問曰病者苦水面目身體四肢皆腫小便不利脈之不言水反言胸中痛氣上衝咽狀如炙肉當微咳喘審如師言其脈何類師曰寸口脈沉而緊沉為水緊為寒沉緊相搏結在關元始時當微年盛不覺陽衰之後榮衛相干陽損陰盛結寒微動腎氣上衝咽喉塞噎脅下結痛醫以為留飲而大下之氣擊不去其病不除後重吐之胃家虛煩咽燥欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小瘥食飲過度腫復如前胸脅苦痛象若奔豚其水揚溢則浮咳喘逆當先攻擊沖氣令止乃治咳咳止其喘自瘥先治新病病當在後衍義此水病脈之不言水反言胸中痛等病當時記其說者以為異非異也是從色脈言耳脈沉為水緊為寒為痛水寒屬於腎足少陰脈自腎上貫肝膈入肺中循喉嚨其支者從肺出絡心注胸中凡腎氣上逆必衝脈與之並行因作沖氣從其脈所過隨處與正氣相擊而為病耳要知其病始由關元夫五臟六腑在內有強弱榮悴盡見於面部分五官五色以辨之關元是下紀足三陰任脈所會寒結關元其腎部之色必微枯而黑知是久痹之證非一日也及陽衰之後榮衛失常陰陽反作寒結之邪沖腎氣而上故作此證醫不治其沖氣反吐下之遂損其胃致水穀不化斯津液不行而渴欲飲水小便不利也由是揚溢於面目四肢浮腫並至沖氣乘虛愈擊更有象若奔豚喘咳之狀必先治其沖氣之本沖氣止腎氣平則諸證自瘥未瘥者當補陽瀉陰行水扶胃疏通關元之久痹次第施治焉耳風水脈浮身重汗出惡風者防己黃耆湯主之腹痛者加芍藥方見濕病衍義脈浮表也汗出惡風表之虛也身重水客分肉也防己療風腫水腫通腠理黃耆溫分肉補衛虛白朮治皮風止汗甘草和藥益土生薑大棗辛甘發散腹痛者陰陽氣塞不得升降故加芍藥收陰風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之越婢湯方麻黃六兩石膏半斤生薑三兩大棗十二枚甘草二兩上五味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服惡風者加附子一枚炮風水者加白朮四兩古今録驗衍義榮陰也水亦陰也衛陽也風亦陽也各從其類水寒則傷榮風熱則傷衛脾乃榮之本胃乃衛之源榮傷胃即應而病脾病則陰自結不與胃和以行其津液胃病則陽自壅不與脾和以輸其穀氣而榮衛不得受水穀之精悍故氣自削不肥腠理惡風不充分肉皮膚唯邪自布故一身悉腫其脈浮者即首章水風脈浮是也續自汗出者為風有時開其腠理也無大熱者只因風熱在衛而衛自不成其熱也不渴者以內無積熱外無大汗其津液不耗故不渴也用越婢湯主之與前條所謂里水脈沉者相反何亦用是方治之乎蓋里水為脾之三陰結而化水不得升發故用是湯發之此證表虛惡風續自汗出者亦欲發中焦之穀氣以輸榮衛東垣云上氣不足推而揚之是二證雖有表裡之分皆當發越脾氣以一湯治或曰麻黃能調血脈開毛孔皮膚散水寒石膏解肌退風熱今不言藥而云發越脾氣以愈病何也曰仲景命方如青龍白虎各有所持豈越婢而漫然天人萬物氣皆相貫邪之感人必客同類當假物之同類者以祛之則用力少而成功多非惟祛之而已且能發越脾氣無一味相間豈非仲景有意於名方哉夫五臟各一其陰陽獨脾胃居中而兩屬之脾主陰而胃主陽自流利者言之土固五行之一自生成者言之則四氣皆因土而後成故萬物生於土死亦歸於土然土不獨成四氣土亦從四維而後成不惟火生而已故四氣有水之陰即應於脾風熱之陽即應於胃飲食五味寒熱凡入於脾胃者亦然一有相干則脾氣不和胃氣不清而水穀不化其精微以榮營衛而實陰陽也然甘者土之本位脾氣不清清以甘寒要而行之必走經脈要而合之必通經隧經隧者臟腑相通之別脈也是故麻黃之甘熱自陰血走手足太陰經達於皮膚行氣於三陰以去陰寒之邪石膏之甘寒自氣分出走手足陽明經達於肌肉行氣於三陽以去風熱之邪用其味之甘以入土用其氣之寒熱以和陰陽用其性之善走以發越脾氣更以甘草和中調其寒熱緩急二藥相合協以成功必以大棗補脾中之血生薑之辛益胃中之氣惡風者陽虛故加附子以入陽風水者則加白朮以散皮膚間風水之氣發穀精以宣榮衛與麻黃石膏為使引其入土也越婢之名不亦宜乎皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之防己茯苓湯方防己三兩黃耆三兩桂枝三兩茯苓六兩甘草二兩上五味以水六升煮取二升分溫三服衍義此證與風水脈浮用防己黃耆同而有淺深之異風水者脈浮在表土氣不發用白朮薑棗發之此乃皮水鬱其榮衛手太陰不宣金鬱者泄之水停者以淡滲故用茯苓易白朮榮衛不得宣行者散以辛甘故用桂枝甘草以易薑棗內經云肉蠕動名曰微風以四肢聶聶動者為風在榮衛觸於經絡而動故桂枝甘草亦得治之也里水越婢加朮湯主之甘草麻黃湯亦主之越婢加朮湯方方見上內加白朮四兩甘草麻黃湯方甘草二兩麻黃四兩上二味以水五升先煮麻黃去上沫內甘草煮取三升溫服一升重覆汗出不汗再服慎風寒衍義此條但言里水不敘脈證與前條里水用湯俱同何兩出之將亦有異乎前條里水證只就身腫小便不利亡津液而渴者大抵一經之病隨其氣化所變難以一二數其經之邪無明其變不可詳惟在方中佐使之損益何如耳水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗則已脈沉者宜麻黃附子湯浮者宜杏子湯麻黃附子湯方麻黃三兩甘草二兩附子一枚炮上三味以水七升先煮麻黃去沫內諸藥煮取二升半溫服八分日三服杏子湯方缺恐即麻黃杏仁甘草石膏湯衍義少陰主水其性寒此條皆少陰證也非獨脈沉小者屬之但因其從風出於表水不內積故曰無水若不因風只是腎脈上入於肺而虛脹者則名曰氣水然腎水風水已有治法獨氣水分脈浮沉發其汗由少陽水寒之邪其本尚在於里陰未變故用麻黃散水附子治寒脈浮者其水已從腎上逆於肺之標居於陽矣變而不寒於是用杏子湯就肺中下逆氣注謂未見其湯恐即麻黃杏子石膏甘草湯皆發汗散水者獨附子杏仁分表裡耳厥而皮水者蒲灰散主之方見消渴中衍義此病水不言病形之狀惟言止用蒲灰散何也大抵此證與首章同然彼以發汗此得之於厥故治法不同厥者逆也由少陰經腎氣逆上入肺肺與皮毛合故逆氣溢出經絡經絡之血泣與腎氣合化而為水充滿於皮膚故曰皮水用蒲黃消經絡之滯利小便為君滑石開竅通水通以佐之小便利則水下行逆氣降與首章皮水二條有氣血虛實之不同只此可見仲景隨機應用之治矣問曰黃汗之為病身體腫一作重發熱汗出而渴狀如風水汗沾衣色正黃如柏汁脈自沉何從得之師曰以汗出入水中浴水從汗孔入得之宜耆芍桂酒湯主之黃耆芍藥桂枝苦酒湯方黃耆五兩芍藥三兩桂枝三兩上三味以苦酒一升水七升相和煮取三升溫服一升當心煩服至六七日乃解若心煩不解者以苦酒阻故也一方用美酒醯代苦酒衍義汗本津也津泄則衛虛水血同類陰也水入則榮寒寒則氣鬱鬱則發熱水熱相搏於分肉則身腫榮出中焦榮之鬱熱內蓄於脾則津液不行而渴衛虛腠理不固則汗出脾土發熱則黃色見於面如柏汁也所以補衛為要黃耆益氣入皮毛肥腠理退熱止汗之功尤切故為君桂枝理血入榮散寒通血脈解肌肉用之調榮以和衛故為臣榮氣因邪所阻不利於行芍藥能收陰氣故佐桂枝一陰一陽以利其榮苦酒醋也用之使引入血分以散滯注一方用美酒美酒性熱入心可以致煩醋但刺心而不煩未審孰是黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮臥盜汗出者此榮氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之桂枝加黃耆湯方桂枝二兩芍藥二兩甘草二兩生薑三兩大棗十二枚黃耆二兩上六味以水八升煮取三升溫服一升須臾飲熱稀粥一升余以助藥力溫覆取微汗若不汗更服衍義黃汗病由陰陽水火不既濟陰陽者榮衛之主榮衛者陰陽之用陰陽不既濟而榮衛亦不循行上下陽火獨壅於上為黃汗陰水獨積於下致兩脛冷設陽火熱甚及肌肉則發熱陰水寒及筋骨則歷節痛若起居飲食過節之勞必傷脾胃將榮衛不充於腠理而食入所長之陽即與勞氣相搏散出為汗又或日暮氣門不閉其津液常泄為盜汗也凡汗出必當熱解今汗已反發熱者是邪氣勝而津液亡也斯肌肉無以潤澤久久必枯澀而甲錯發熱不已其熱逆於肉裡乃生惡瘡若邪正相搏於分肉間則身重汗出已雖身重輒輕然正氣又從汗散而虛榮衛衰微脈絡皆空久久邪氣熱生風火動於分肉脈絡間必作身瞤瞤即胸中痛者由胸中屬肺金主氣行營衛之部氣海在焉即虛之氣不勝風火之擊是以痛也又從腰以上必汗出者腰以上陽也陽與榮衛俱虛腠理不密故津液被風火泄出也腰以下陰也為孤陰痹於下故無汗所以腰髖弛痛如有物在皮中狀者即內經所謂痛痹逢寒之類也劇則不能食身疼煩躁小便不利者為榮衛甚虛穀氣不充不能食榮衛不充於分肉故身疼重胃中虛熱上注心中作煩躁小便不利者因津液從汗出故也師曰寸口脈遲而澀遲則為寒澀為血不足趺陽脈微而遲微則為氣遲則為寒寒氣不足則手足逆冷手足逆冷則榮衛不利榮衛不利則腹滿脅鳴相逐氣轉膀胱榮衛俱勞陽氣不通即身冷陰氣不通即骨疼陽前通則惡寒陰前通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺溺名曰氣分衍義人之血氣榮衛皆主於谷谷入於胃化為精微脾與胃以膜相連主四肢脾輸穀氣於三陰胃輸穀氣於三陽六經皆起於手足故內外悉藉穀氣溫養之也寸口以候榮衛趺陽以候脾胃脾胃之脈虛寒則手足不得稟水穀氣故逆冷也手足逆冷則榮衛之運行於陰陽六經者皆不利榮衛不利則逆冷之氣入積於中而不瀉不瀉則內之溫氣去寒獨留寒獨留則宗氣不行而腹滿脾之幕在季脅章門寒氣入於幕止當少陽經脈所過且少陽為樞主十二官行氣之使少陽之腑三焦也既不得行升發之氣於三焦以化榮衛必引留幕之寒相逐於三焦之下輸下輸屬膀胱也當其時衛微營衰衛氣不得行其陽於表即身冷營氣不得行其陰於裡即痛陽雖暫得前通身冷不能即溫斯惡寒也陰既前通痛應少愈然營氣未與衛之陽合孤陰獨至故痹而不仁必從膻中氣海之宗氣通轉然後陰陽和榮衛布邪氣乃從下焦而散也下焦者中瀆之官水道出焉前後二竅皆屬之前竅屬陽後竅屬陰陽道實則前竅固邪從後竅失氣而出陽道虛則從前竅遺尿而去矣為大氣一轉而邪散故曰氣分氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍藥加麻黃細辛附子湯主之桂枝去芍加麻黃細辛附子湯方桂枝三兩生薑三兩甘草二兩大棗十二枚麻黃二兩細辛二兩附子一枚炮上七味以水七升煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如蟲行皮中即愈是症與上條所敘不同名氣分即同與下條亦同心下堅大如盤邊如旋杯水飲所作枳朮湯主之枳朮湯方枳實七枚白朮二兩上二味以水五升煮取三升分溫三服腹中耎即當散也衍義心下胃土脘也胃氣弱則所飲之水入而不消痞結而堅必強其胃乃可消痞白朮健脾強胃枳實善消心下痞逐停水散滯血附方外臺防己黃耆湯治風水脈浮為在表其人或頭汗出表無他病病者但下重從腰以上為和腰以下為腫及陰難以屈伸方見風濕中頭汗者風腰以下腫者水甚於風故表無他病當治腰下為要然是湯前條治風水在表此可治風水在下之病何也考本草防己療風水腫手腳攣急李東垣亦以治腰下及足濕熱腫甚脈浮頭汗雖曰表無他病然與表同故可通治
