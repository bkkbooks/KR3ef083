body:
  text: 卷十二痰飲咳嗽病脈證治第十二論一首脈證二十一條方十九首問曰夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲問曰四飲何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳吐引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲咳逆倚息氣短不得臥其形如腫謂之支飲衍義水性走下而高原之水流入於川川入於海塞其川則洪水泛溢而人之飲水亦若是內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行今所飲之水或因脾土壅塞而不行或因肺氣澀滯而不通以致流溢隨處停積水入腸間者大腸屬金主氣小腸屬火水與火氣相搏氣火皆動故水入不得流走腸間瀝瀝有聲是名痰飲然腸胃與肌膚為合素受水穀之氣長養而肥盛今為水所病故肌肉消瘦也水入脅下者屬足少陽經少陽經脈從缺盆下胸中循脅裡過季脅之部分其經多氣屬相火今為水所積其氣不利從火上逆胸中遂為咳吐吊引脅下痛是名懸飲水泛溢於表表陽也流入四肢者四肢為諸陽之本十二經脈之所起水至其處若不勝其表之陽則水散當為汗出今不汗是陽不勝水反被阻礙經脈榮衛之行故身體疼重是名溢飲水流入腸間宗氣不利陽不得升陰不得降呼吸之息與水迎逆於其間遂作咳逆倚息短氣不得臥榮衛皆不利故形如腫也是名支飲水在心心下堅築短氣惡水不欲飲衍義心屬火火陽也陽主動腎屬水水陰也陰主靜靜則堅今水在心下水剋火水守於外故堅火內郁不寧故築築然動而短氣水既外停故惡水不欲飲也水在肺吐涎沫欲飲水衍義仲景凡出病候隨其臟氣變動而言之不拘定於何邪也如吐涎沫屬肺臟在肺痿證中者上焦有熱者肺虛冷者皆吐涎沫今水在肺亦然蓋肺主氣行榮衛布津液諸邪傷之皆足以閉塞氣道故榮衛不行津液不布氣停液聚變成涎沫而吐出之若咳若渴者亦肺候也皆無冷熱之分但邪與氣相擊則咳不擊則不咳津液充其玄府則不渴燥之則渴隨所變而出其病亦不止於是也而在他證方後更立加減法便見仲景之意水在脾少氣身重衍義脾居中焦與胃為表裡受谷化精輸於五臟百骸脾實則中氣強盛體質強健今水在脾而脾病矣中虛則少氣肌肉不得所養唯受水氣水陰也故身重水在肝脅下支滿嚏而痛衍義肝有兩葉布在脅下經脈亦循於是與少陽膽為表裡今水客於肝表裡氣停故支滿嚏者氣噴出也少陽屬火火鬱則有時而發邪雖發動不得布散惟上衝於鼻額故作嚏吊引脅下所結而痛原病式曰嚏以鼻癢而作聲鼻為肺竅癢為火化火干陽明癢為嚏也水在腎心下悸衍義心屬火而宅神畏水者也今水在腎腎水愈盛上乘於心火氣內郁神靈不安故作悸動築築然懼也夫心下有留飲其人背寒冷如掌大衍義心之俞出於背背陽也心有留飲則火氣不行惟是寒飲注其俞出於背寒冷如掌大論其俞之處明其背之非盡寒也留飲者脅下痛引缺盆咳嗽則輒已一作轉甚衍義脅下為厥陰之支絡循胸出脅下足厥陰脈布脅肋而缺盆是三陽俱入然獨足少陽從缺盆過季脅飲留脅下阻礙厥陰少陽之經絡不得疏通肝苦急氣不通故痛少陽上引缺盆故咳嗽則氣攻衝其所結者通而痛輒已一作轉甚如上條咳而痛同也胸中有留飲其人短氣而渴四肢歷節痛脈沉者有留飲衍義胸中者肺部也肺主氣以朝百脈治節出焉飲留胸中宗氣呼吸惟以布息故短氣氣不布則津液不化而膈燥是以渴也足厥陰肝臟主筋束骨而利關節其經脈上貫於膈而膽之經亦下胸中貫膈夫飲者即濕也其濕喜流關節從經脈流而入之作四肢歷節痛留飲水類也所以脈亦沉也膈上病痰滿喘咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇必伏飲衍義膈上表分也病痰滿喘咳乃在表之三陽皆鬱而不伸極則化火衝動膈上之痰吐發然膈間之伏飲則留而不出因其不出則三陽之氣雖動尚被伏飲所抑足太陽經屈而不伸乃作寒熱腰背疼痛其經上至目內眥故目泣自出足少陽經氣屬風火之化被抑不散並於陽明屬在肌肉之分故振振身瞤而劇也是條首以痰言末以飲言二者有陰陽水火之分痰從火而上熬成而濁故名曰痰飲由水濕留積不散而清故名曰飲亦是五行水清火濁之義夫病人飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下后里虛脈偏弦者飲也衍義飲水多留於膈膈氣不行則喘滿食少胃氣虛復多飲胃土不能運水水停心下心火畏水甚則神不安為怔忡驚悸微者陽獨郁而為短氣夫脈弦者為虛為水若兩寸皆弦則是大下之後陽氣虛寒所致若偏見弦則是積水之處也肺飲不弦但苦喘短氣衍義脈弦為水為飲今肺飲而曰不弦何也水積則弦未積則不弦非謂肺飲盡不弦也此言飲水未積猶得害其陽雖不為他病亦適成其苦喘短氣也支飲亦喘而不能臥加短氣其脈平也行義脈平當無病何以有病而反平也正與上條不弦意同明其雖有支飲而飲尚不留伏不停積以其在上焦未及胸中不傷經脈故脈平然終礙其陰陽升降故喘不能臥短氣耳病痰飲者當以溫藥和之衍義痰飲由水停也得寒則聚得溫則行況水行從乎氣溫藥能發越陽氣開腠理通水道也心下有痰飲胸脅支滿目眩苓桂朮甘湯主之苓桂朮甘湯方茯苓四兩桂枝白朮各三兩甘草二兩上四味以水六升煮取三升分溫三服小便則利衍義心胞絡循脅出胸下靈樞曰胞絡是動則胸脅支滿此痰飲積其處而為病也目者心之使心有痰水精不上注於目故眩本草茯苓能治痰水伐腎邪痰水類也治水必自小便出之然其水淡滲手太陰引入膀胱故用為君桂枝乃手少陰經藥能調陽氣開經絡況痰水得溫則行用之為臣白朮除風眩燥痰水除脹滿以佐茯苓然中滿勿食甘用甘草何也蓋桂枝之辛得甘則佐其發散和其熱而使不僭也復益土以制水甘草有茯苓則不支滿而反滲泄本草曰甘草能下氣除煩滿也夫短氣有微飲當從小便去之苓桂朮甘湯主之方見上腎氣丸亦主之方見婦人雜病中衍義微飲而短氣由飲水停蓄致三焦之氣升降呼吸不前也二方各有所主苓桂朮甘湯主飲在陽呼氣之短腎氣丸主飲在陰吸氣之短蓋呼者出心肺吸者出腎肝茯苓入手太陰桂枝入手少陰皆輕清之劑治其陽也地黃入足少陰山萸入足厥陰皆重濁之劑治其陰也一證二方豈無故哉病者脈伏其人慾自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之甘遂半夏湯方甘遂大者三枚半夏十二枚芍藥五枚甘草如指大一枚炙上四味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服之衍義仲景嘗謂天樞開發胃和脈生今留飲之堵塞中焦以致天真不得流通胃氣不得轉輸脈隱伏而不顯留飲必自利自利而反快者中焦所塞暫通也通而復積續堅滿必更用藥盡逐之然欲直達其積飲莫若甘遂快利用之為君欲和脾胃除心下堅又必以半夏佐之然芍藥停濕何留飲用之乎甘草相反甘遂何一方兼用之蓋芍藥之酸以其留飲下行甘遂泄之本草謂其獨去水氣也甘草緩甘遂之性使不急速徘徊逐其所留入蜜亦此意也然心下者脾胃部也脾胃屬土土由木鬱其中而成堅滿非甘草不能補土非芍藥不能伐木又可佐半夏和胃消堅也雷公炮炙法有甘草湯浸甘遂者矣脈浮而細滑傷飲衍義脈之大小皆從氣血虛實變見者也傷於飲則氣虛而脈浮血虛而脈細陽火被郁則微熱而脈滑也脈弦數有寒飲冬夏難治衍義此言其脈邪之不相應也寒飲反見數脈數是內經有用熱遠熱有用寒遠寒之戒在夏用熱藥治飲則數脈愈增在冬用寒藥治熱則寒飲愈盛皆伐天和所以在冬夏難也在春秋或可適其寒溫而消息之脈沉而弦者懸飲內痛病懸飲者十棗湯主之十棗湯方芫花熬甘遂大戟各等分上三味搗篩以水一升五合先煮肥大棗十枚取八合去滓內藥末強人服一錢匕羸人服半錢平旦溫服之不下者明日更加半錢得快下後糜粥自養衍義脈沉病在裡也凡弦者為痛為飲為癖懸飲結積在內作痛故脈見沉弦此條言病脈而不言藥後出一條言藥而不言病脈可知懸飲之痛不止上條傷寒中懸飲亦用是湯則知十棗湯之治懸飲之證最多也故將下條黏連上條成注謂芫花之辛以散飲甘遂大戟之苦以泄水大棗之甘以益脾而勝水也病溢飲者當發其汗大青龍湯主之小青龍湯亦主之大青龍湯方麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁四十個去皮尖生薑三兩大棗十二枚石膏如雞子大碎上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗多者溫粉粉之小青龍湯方麻黃去節三兩芍藥三兩乾薑三兩五味子半升甘草三兩炙細辛三兩桂枝去皮三兩半夏半升湯洗上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升衍義傷寒論寒邪傷榮麻黃湯風邪傷衛桂枝湯風寒兩傷榮衛者大青龍湯稍迫心肺證小青龍湯今溢飲亦是榮衛兩傷治之何也出方不出證又何也蓋溢飲之證已見首篇故不重出水飲溢出於表榮衛盡為不利猶傷寒榮衛兩傷故必發汗以散水而後榮衛行經脈行則四肢之水亦消矣膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復與不愈者宜木防己湯去石膏加茯苓芒硝湯主之木防己湯方木防己三兩石膏十二枚雞子大桂枝二兩人參四兩上四味以水六升煮取二升分溫再服木防己加茯苓芒硝湯方木防己三兩桂枝三兩人參四兩芒硝三合茯苓四兩上五味以水六升煮取二升去滓內芒硝再微煎分溫再服微利則愈衍義心肺在膈上肺主氣心主血今支飲在膈間氣血皆不通利氣為陽主動血為陰主靜氣不利則與水同逆於肺而為喘滿血不利則與水雜揉結於心下而為痞堅腎氣上應水飲腎氣之色黑血凝之色亦黑故黧黑之色亦見於面也脈沉為水緊為寒非別有寒邪即水氣之寒也醫雖以吐下之法治然藥不切於病故不愈用木防己者味辛溫能散留飲結氣又主肺氣喘滿所以用為主治石膏味辛甘微寒主心下逆氣清肺定喘人參味甘溫治喘破堅積消痰飲補心肺氣不足皆為防己之佐桂枝味辛熱通血脈開結氣且支飲得溫則行又宣導諸藥用之為使若邪之淺在氣分多而虛者服之即愈若邪客之深在血分多而實者則愈後必再發故石膏是陽中之治氣者則去之加芒硝味鹹寒陰分藥也治痰實結賴之去堅消血癖茯苓伐腎邪治心下堅滿佐芒硝則行水之力益倍心下有支飲其人苦冒眩澤瀉湯主之澤瀉湯方澤瀉五兩白朮二兩上二味以水二升煮取一升分溫再服衍義明理論眩為眼黑冒為昏冒傷寒之冒眩以陽虛中風亦有眩冒乃風之旋動也原病式以昏冒由氣熱衝心也目暗黑亦火熱之氣鬱二論曰虛曰風曰火各一其說三者相因未始相離風火不由陽虛則不旋動陽虛不由風火則不冒眩蓋傷寒者以寒覆其陽陽郁化火火動風生故也衍義風火之動散亂其陽則陽虛濕飲者亦如傷寒之義雖然陽虛風火所致然必各治其所主寒者治寒濕者治濕察三者之輕重以藥佐之此乃支飲之在心者阻其陽之升降鬱而不行上不充於頭目久則化火火動風生而作眩暈故苦冒眩也利小便以泄去支飲和其中焦則陽自升而風火自息矣澤瀉能開胃關去伏水泄支飲從小便出之佐以白朮和中益氣燥濕息風藥不在品味之多惟要中病耳支飲胸滿者厚朴大黃湯主之厚朴大黃湯方厚朴一尺大黃六兩枳實四枚上三味以水五升煮取二升分溫再服衍義凡仲景方多一味減一藥與分兩之更重輕則易其名異其治有如轉丸者若此三味加芒硝則謂之大承氣治內熱腹實滿之甚無芒硝則謂之小承氣治內熱之微甚厚朴多則謂之厚朴三物湯治熱痛而閉今三味以大黃多名厚朴大黃湯上三湯皆治實熱而用之此支飲胸滿何亦以是治之倘胸滿之外復有熱蓄之病變遷不一在上在下通宜利之耶胸滿者下之然此水飲也不有熱證況胸滿未為心下實堅且胸中痞硬脈浮氣上衝咽喉者則半表半裡和解之至有醫誤下為心下硬痛名結胸者以大陷胸湯下之不甚痛猶不可下以小陷胸利之今支飲之胸滿遽用治中焦實熱之重劑乎是必有說姑闕之支飲不得息葶藶大棗瀉肺湯主之方見肺癰中衍義支飲留結氣塞胸中故不得息葶藶能治結利飲大棗通肺氣補中此雖與肺癰異而方相通者蓋支飲之與氣未嘗相離支飲以津液所聚氣行則液行氣停則液聚而氣亦結氣陽也結亦化熱所以與肺癰熱結者同治嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之小半夏湯方半夏一升生薑半斤上二味以水七升煮取一升半分溫再服衍義嘔家為有痰飲動中而欲出也飲去盡而欲解矣反不渴是積飲所留由氣不暢結聚津液而成耳半夏之味辛其性燥辛可散結燥可勝濕用生薑以制其悍孫真人云生薑嘔家之聖藥嘔為氣逆不散故用生薑以散之腹滿口舌乾燥此腸間有水氣己椒藶黃丸主之己椒藶黃丸方防己椒目葶藶熬大黃各一兩上四味末之蜜丸如梧子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩衍義肺與大腸合為表裡肺本通調水道下輸膀胱今不輸膀胱僅從其合積於腸間水積則金氣不宣膹郁成熱為腹滿津液遂不上行以成口燥舌乾用防己椒目葶藶皆能利水行積聚結氣而葶藶尤能利小腸然腸胃受水穀之氣若邪實腹滿者非輕劑所能治必加芒硝以瀉之卒嘔吐心下痞膈間有水眩悸者半夏加茯苓湯主之小半夏加茯苓湯方半夏一升生薑半斤茯苓三兩一法四兩上三味以水七升煮取一升五合分溫再服衍義心下痞膈間有水眩悸者陽氣必不宣散也經云以辛散之半夏生薑皆味辛本草半夏可治膈上痰心下堅嘔逆者眩亦上焦陽氣虛不能升發所以半夏生薑並治之悸則心受水凌非半夏可獨治必加茯苓去水下腎逆以安神神安則悸愈也假令瘦人臍下有悸吐涎沫而癲眩此水也五苓散主之五苓散方澤瀉一兩一分豬苓三分去皮茯苓五分白朮三分桂二分去皮上五味為末白飲服方寸匕日三服多飲暖水汗出愈衍義人瘦有稟形有因病瘦者金土水形之人肥火木形之人瘦今云瘦人者必非病瘦乃親形也朱丹溪云肥人多虛瘦人多熱蓋肥人由氣不充於形故虛多瘦人由氣實故熱多肥人不耐熱者為熱復傷氣瘦人不耐寒者為寒復傷形各損其不足故也巢氏病源為邪入於陰則癲瘦人火木之盛為水邪抑鬱在陰不得升發鼓於臍下作悸及至郁發轉入於陽與正氣相擊在頭為眩在筋脈為癲為神昏腎液上逆為涎沫吐出故用五苓治之茯苓味甘淡滲泄水飲內蓄故為君豬苓味甘平用為臣白朮味甘溫脾惡濕水飲內蓄則脾氣不治益脾勝濕故為佐澤瀉味鹹寒為陰泄瀉導溺必以咸為助故為使桂枝辛熱腎惡燥水蓄不利則腎氣燥以辛潤之故亦為使多飲暖水令汗出愈者以辛散水氣外泄得汗而解也附方外臺茯苓飲治心胸中有停痰宿水自吐出水後心胸間虛氣滿而不能食消痰氣令能食茯苓三兩人參三兩白朮三兩枳實二兩橘皮二兩半生薑三兩上六味以水六升煮取一升八合分溫三服如人行八九里進之衍義此由上中二焦氣弱水飲入胃脾不能轉歸於肺肺不能通調水道以致停積為痰為水吐之則下氣因而上逆積於心胸是謂虛氣滿不能食先當補益中氣以人參白朮下逆氣行停水以茯苓逐積消氣滿以枳實調諸氣開脾胃而宣揚推布發散凝滯賴陳皮生薑為使也咳家其脈弦為有水十棗湯主之方見上衍義脈經以弦為水氣為厥逆為寒為飲風脈亦弦若咳者如水氣如厥逆如寒如風皆能致咳欲於弦脈而分諸邪不亦難乎設或水邪之弦稍異果何象乎前條懸飲者沉弦別論支飲者急弦二者有沉急之不同而咳脈之弦豈一字可盡仲景嘗論水蓄之脈曰沉潛今謂為水其弦將彷彿有沉潛之象乎將有沉急之象乎凡遇是證是脈必察色聞聲問所苦灼然合脈之水象然後用是方下之獨據脈恐難憑也夫有支飲家咳煩胸中痛者不卒死至一百日或一歲宜十棗湯方見上衍義心肺在上主胸中陽也支飲乃水類屬陰今支飲上入於陽動肺則咳動心則煩搏擊膈氣則痛若陽虛不禁其陰之所逼者則榮衛絕而神亡為之卒死矣不卒死猶延歲月則其陽不甚虛乃水入於肺子乘於母所致也久咳數歲其脈弱者可治實大數者死其脈虛者必苦冒其人本有支飲在胸中故也治屬飲家衍義三脈固為支飲之咳然諸邪之病皆不越此內經曰久病脈弱者生實大者死又脈大則病進蓋弱脈邪氣衰實大邪氣盛久病者正氣已虛邪氣亦衰雖重可治若邪盛加之脈數火復刑金豈不死乎其脈虛苦冒者蓋胸中乃發越陽氣之地支飲停積阻其陽氣不得升於上又不得充於下與陰接惟從支飲浮泛眩亂頭清道故苦冒也治其飲則陽氣行而可愈矣咳逆倚息不得臥小青龍湯主之方見上青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時覆冒者與茯苓桂枝五味甘草湯治其氣衝桂苓五味甘草湯方茯苓四兩桂枝四兩去皮甘草三兩炙五味子半升上四味以水八升煮取三升去滓分溫三服沖氣即低而反更咳胸滿者用桂苓五味甘草湯去桂加乾薑細辛以治其咳滿苓甘五味姜辛湯方茯苓四兩甘草三兩細辛三兩乾薑三兩五味半升上五味以水八升煮取三升去滓溫服半升日三服咳滿即止而更復渴沖氣復發者以細辛乾薑為熱藥故也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復內半夏以去其水苓甘五味姜辛半夏湯方茯苓四兩甘草二兩細辛二兩乾薑二兩五味半升半夏半升上六味以水八升煮取三升去滓溫服半升日三服水去嘔止其人形腫者加杏仁主之其證應內麻黃以其人遂痹故不內之若逆而內之者必厥所以然者以其人血虛麻黃髮其陽故也苓甘五味加姜辛半夏杏仁湯方茯苓四兩甘草三兩五味半升乾薑三兩細辛三兩半夏半升杏仁半升去皮尖上七味以水七升煮取三升去滓溫服半升日三服若面熱如醉此為胃熱上衝熏其面加大黃以利之苓甘五味加姜辛半杏大黃湯方茯苓四兩甘草三兩五味半升乾薑三兩細辛三兩半夏半升杏仁半升大黃三兩上八味以水一斗煮取三升去滓溫服半升日三服衍義此首篇支飲之病也以飲水水性寒下應於腎腎氣上逆入肺肺為之不利肺主行榮衛肺不利則榮衛受病猶外感風寒心中有水證也故亦用小青龍湯治服後未已為水停未散故多唾津液未行故口燥水在膈上則陽氣衰寸口脈沉麻黃髮陽則陰血虛故尺脈微尺脈微則腎氣不得固守於下衝任二脈相挾從小腹沖逆而起矣夫衝任二脈與腎之大絡同起腎下出胞中主血海衝脈上行者至胸下行者至足少陰入陰股下抵足䟰上是動則厥逆任脈至咽喉上頤循面故氣衝咽胸榮衛之行澀經絡時疏不通手足不仁而痹其面翕然如醉狀因復下流陰股小便難水在膈間因火沖逆陽氣不得輸上故時覆冒也內經曰諸逆衝上皆屬於火又曰衝脈為病氣逆裡急故用桂苓五味甘草湯先治沖氣與腎燥桂味辛熱散水寒之逆開腠理致津液以潤之茯苓甘草行津液滲蓄水利小便伐腎邪為臣甘草味甘溫補中土制腎氣之逆五味酸平以收肺氣內經曰肺欲收急食酸以收之服此湯沖氣即止因水在膈不散故再變而更咳胸滿即用前方去桂加乾薑細辛散其未消之水寒通行津液服湯後咳滿即止三變而更復渴沖氣復發以細辛乾薑乃熱藥服之當遂渴反不渴支飲之水蓄積胸中故也支飲在上阻遏陽氣不布於頭目故冒且沖氣更逆必從火炎而嘔也仍用前湯加半夏去水止嘔服後水去嘔止四變水散行出表表氣不利其人形腫當用麻黃髮汗散水以其人遂痹且血虛麻黃髮其陽逆而內之必厥故不內但加杏仁杏仁微苦溫腎氣上逆者得之則降下在表衛氣得之則利於行故腫可消也服後五變因胃有熱循脈上衝於面熱如醉加大黃以泄胃熱蓋支飲證其變始終不離小青龍之加減足為萬世法也先渴後嘔為水停心下此屬飲家小半夏茯苓湯主之方見上補註云渴未有不飲水者渴飲水則渴為水解而水亦為渴消矣乃復作嘔者何哉為水不為渴消而且不得下歸於胃下趨膀胱致停於心下也雖然就下性也水又何以停因上脘本有痰飲阻抑上升之津故先為渴然後知先能為上阻者亦即後能下阻者也心下去上未遠為清華之位豈得容水少刻勢必嘔出故仍以小半夏茯苓湯主之也
