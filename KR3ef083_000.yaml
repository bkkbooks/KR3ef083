body:
  text: 補方苦參湯方治狐惑蝕於下部咽乾洗之要略目録云龐氏方二注同苦參半斤槐白皮四兩狼牙根四兩桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘上五味以水七升微火煮取三升去滓適寒溫服一升服已須臾啜稀粥一升余以助藥力小承氣湯方大黃四兩去皮厚朴二兩炙去皮枳實三枚炙上三味以水四升煮取一升二合去滓分溫三服附子湯方附子二枚生用去皮茯苓三兩白芍三兩人參二兩白朮四兩上五味以水八升煮取三升去滓溫服一升日三服以上四方二注有目缺方天雄散方要略眉詮喻先生曰治上焦陽虛天雄三兩炮白朮八兩桂枝六兩龍骨三兩上四味杵為散酒服半錢匕日三服不知稍增之千金翼炙甘草湯方治虛勞不足汗出而悶脈結悸行動如常不出百日危急者十一日死甘草四兩炙桂枝三兩生薑三兩麥冬半升麻仁半升人參二兩阿膠二兩大棗三十枚生地黃一斤上九味以酒七升水八升先煮八味取三升去滓內膠消盡溫服一升日三服肘後獺肝散方治冷勞又主鬼疰一同相染獺肝一具炙乾末之水服方寸匕日三服千金甘草湯方要略注曰治肺痿之熱由於虛不可直攻甘草上一味以水三升煮減半分溫三服千金生薑甘草湯方治肺痿咳唾涎沫不止咽燥而渴生薑五兩人參三兩甘草四兩大棗十五枚上四味以水七升煮取三升分溫三服千金桂枝去芍藥加皂莢湯方生薑二兩甘草二兩大棗十枚皂莢一枚去皮炙焦上五味以水七升微微火煮取三升分溫三服外臺桔梗白散方治咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗三分貝母三分巴豆一分去皮熬研如脂上三味為散強人飲服半錢匕羸者減之病在膈上者吐膿在膈下者瀉出若下多不止飲冷水一杯則定千金葦莖湯方治咳有微熱煩滿胸中甲錯是為肺癰葦莖二升薏苡仁半升桃仁五十粒瓜瓣半升上四味以水一斗先煮葦莖得五升去滓內諸藥煮取二升服一升再服當吐如膿外臺柴胡桂枝湯方治心腹卒中痛者柴胡四兩黃芩一兩半人參一兩半半夏六枚大棗六枚生薑一兩半桂枝一兩半芍藥一兩甘草一兩上九味以水六升煮取三升溫服一升日三服外臺走馬湯方治中惡心痛腹脹大便不通巴豆二枚去皮心熬杏仁二枚上二味以綿纏槌令碎熱湯二合捻取白汁飲之當下老小量之通治飛尸鬼擊病外臺黃芩湯方治乾嘔下利黃芩三兩人參三兩乾薑三兩桂枝一兩大棗十二枚半夏半升上六味以水七升煮取三升分溫三服排膿散方枳實十六枚芍藥六分桔梗二分上三味杵為散取雞子黃一枚以藥散與雞黃相等揉和令相得飲和服之日一服排膿湯方要略注曰以上兩方概治瘡癰不能散者不獨為腸癰腫癰設也甘草二兩桔梗三兩生薑一兩大棗十枚上四味以水三升煮取一升溫服五合日再服千金三物黃芩湯方治婦人在草蓐自發露得風四肢苦煩熱不痛者此湯主之黃芩一兩苦參二兩乾地黃四兩上三味以水六升煮取二升溫服一升多吐下蟲千金內補當歸建中湯方治婦人産後虛羸不足腹中刺痛不止吸吸少氣或苦少腹中急摩痛引腰背不能食飲産後一月日得服四五劑為善令人強壯宜當歸四兩桂枝三兩芍藥六兩生薑三兩甘草二兩大棗十二枚上六味以水一斗煮取三升分溫三服一日令盡若大虛加飴糖六兩湯成內之於火上暖令飴消若去血過多崩傷內衄不止加地黃六兩阿膠二兩合八味湯成內阿膠若無當歸以芎藭代之若無生薑以乾薑代之小兒疳蟲蝕齒方雄黃葶藶上二味末之取臘日豬脂熔以槐枝綿裹頭四五枚蘸藥烙之以上十六方從要略第六卷至第二十二卷補入附補苦參湯方此要略中所載與其目録龐氏方異不知何出今亦附補苦參一升以水一斗煎取七升去滓熏洗日三服
