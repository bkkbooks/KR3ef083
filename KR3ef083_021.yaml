body:
  text: 卷二十一婦人産後病脈證治第二十一論一首脈證六條方八首問曰新産婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新産血虛多汗出喜中風故令病痙亡血復汗寒多故令鬱冒亡津液胃燥故大便難補注陰與陽固相資者也故曰陽生陰長又曰陽根於陰夫血陰也汗為血液則亦為陰假如血去多則汗亦少矣乃偏易出者何哉血大虛則衛外之陽因而不固必多汗而腠理疏也疏則邪易入之血既不足以養脈乃風入又足以燥其血液故令病痙若汗多者亡陽陽亡必畏寒寒多遂令鬱冒至若陰氣既虛津液必少胃中燥結大便轉難容或有之然三者總因血虛所至乃若不明其理而復出汗下未有不至於危亡者故聖人先以新産血虛立言使後世之工即出於中才以下亦必從養陰起見也已産婦鬱冒其脈微弱不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之補注産婦脈證極虛種種者其理可得而晰言之也婦人主血重在衝脈沖者肝幕也血去既多邪中特易邪入則必逆冷畏寒由於遏抑是血氣虧於中陰邪冒於外卒難解也而其所以難解者正以血虛不能作汗而非汗復不解故欲解者必大汗出而後邪始退正始越也此言周身之汗者也亦有血虛下厥而陽氣孤而無偶遂上升而汗亦出則其汗又頭以下不得汗也總由血虛陰亡其陽獨盛汗出之後邪退正和矣然其津液一傷於血去復傷於汗多安得大便不堅乎假使大便堅而復有嘔不能食之證仍是表邪未去抑或血室受邪也小柴胡湯為正治之法矣病解能食七八日更發熱者此為胃實大承氣湯主之補注邪去則不歸於府自能食也七八日更發熱明系食滯於胃脾虛不能運之能不急下以救其津液乎然大虛者當小作湯要在臨證斟酌爾産後腹中㽲痛當歸生薑羊肉湯主之並治腹中寒疝虛勞不足補注産後本虛則寒易入今腹中為肝之幕為脾之統痛非正虛而邪實耶此湯原治寒疝取以治産後未常不可即以治虛勞又誰曰不宜産後腹痛煩滿不得臥枳實芍藥散主之枳實芍藥散方枳實燒令黑勿太過芍藥等分上二味為散服方寸匕日三服並主癰膿以麥粥下之衍義仲景凡治腹痛多用芍藥何也以其能治氣血積聚宣行腑臟通則痛止也陰氣之散亂成痛用此收之也以其能治血痹之痛也以其能緩中而止急痛也本草謂主邪氣腹痛故多用之蓋五氣之邪莫如厥逆肝木之性急暴一有不平則曲直作痛又肝為藏血之海瘀積則海不清而肝木之氣塞矣東方震木出於純陰則振起發生若出於散亂之陰則肝本之氣旺矣木強直更值邪氣則肝木與搏擊矣由此三者而言芍藥所治皆肝木也雖曰治之而亦補之木之味酸芍藥亦酸故云補也枳實炒黑入血破瘀麥粥補血脈也師曰産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍下宜下瘀血湯主之亦主經水不利下瘀血湯方大黃三兩桃仁二十枚䗪蟲二十熬去足上三味末之煉蜜為四丸以酒一升煎一丸取八合服之瘀血下如豚肝衍義血之乾燥凝著者非潤燥蕩滌不能去也芍藥枳實不能治須用大黃蕩逐之桃仁潤燥緩中破結䗪蟲下血用蜜補不足止痛和藥緩大黃之急尤為潤也與抵當同類但少緩爾産後七八日無太陽證少腹堅痛此惡露不盡不大便煩燥發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語至夜即愈宜大承氣湯主之熱在裡結在膀胱也衍義太陽為表膀胱為里七八日表證入里故曰無太陽證惡露已為病氣所郁不能盡去邪因入里與惡露相搏擊在膀胱而小腹堅痛下焦熱極故不大便煩躁發熱更切其脈微實再倍發熱日晡時煩躁此邪又攻於胃胃熱則不食食入則穀氣之熱更助兩熱相併故譫語至夜愈此産後血虛邪易入血室入血室則夜如見鬼狀言此以明其不在血室而在膀胱與胃故用大承氣湯産後風續續數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在爾可與陽旦湯即桂枝湯加黃芩衍義傷寒病太陽證頭痛發熱汗出惡風者桂枝湯主之又太陽病八九日不解者表證仍在當發其汗此治傷寒法凡産後感於風寒諸證皆不越其規矩舉此條與上文承氣為表裡之例耳東垣治勞役飲食所傷挾外感者亦名兩感必顧胃氣大全良方謂新産去血津液枯竭如有時氣之類當發其汗決不可用麻黃取汗無取過多活人書婦人諸病皆用四物與所見證如陽旦之類各隨所感而消息之産後中風發熱面正赤喘而頭痛竹葉湯主之竹葉湯方竹葉一把葛根三兩防風桔梗桂枝人參甘草各一兩附子一枚炮大棗十五枚生薑五兩上十味以水一斗煮取二升半分溫三服溫覆使汗出頸項強用大附子一枚破之如豆大該是入字前藥揚去沫嘔者加半夏半升洗衍義此證太陽上行至頭表陽脈過膈上循於面二經合病故如是竹葉湯亦桂枝湯變化者仲景凡治二經合病多加葛根為陽明解肌藥也防風佐桂主二經之風竹葉主氣上喘桔梗佐竹葉利之人參亦治喘甘草和中生薑大棗行穀氣發榮衛穀氣行榮衛和則上下交濟而汗出解矣附子恐是後所加治頭項強耳頸項強邪在太陽有禁固其筋脈不得屈伸故用附子溫經散寒濕以佐葛根若邪在胸中而嘔加半夏治之婦人乳中虛煩亂嘔逆安中益氣竹皮大丸主之竹皮大丸方生竹茹二分石膏二分桂枝一分甘草七分白薇一分上五味末之棗肉和丸如彈子大飲服一丸日三夜二服有熱者倍白薇煩喘者加柏實一分衍義婦人以陰血上為乳汁必藉穀氣精微以成之然乳房居胃上陽明經脈之所過乳汁去多則陰血乏而胃中益虛陰乏則火撓而神昏亂胃虛則嘔逆用甘草瀉心火安中益氣石膏療煩亂竹皮主嘔逆桂枝利榮氣通血脈又宣導諸藥使無捍格之患柏實本草主恍惚虛煩安五臟益氣煩喘者為心中虛火動肺故以柏實兩安之産後下利虛極白頭翁加甘草阿膠湯主之白頭翁加甘草阿膠湯方白頭翁二兩秦皮三兩黃連三兩黃柏三兩甘草二兩阿膠二兩上六味以水七升煮取二升半內膠令消盡分溫三服衍義傷寒厥陰證不利重者白頭翁湯四味盡苦寒以治熱苦以堅腸胃此産後氣血兩虛因加阿膠補氣血而止利甘草緩中通血脈然下利血滯也夫人之血行則利自止甘草尤為要藥此方豈獨治産後哉
