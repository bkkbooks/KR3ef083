body:
  text: 卷十九趺蹶手指臂腫轉筋陰狐疝蛔蟲病脈證第十九皆系筋病故匯為篇論一首脈證一條方五首師曰病趺蹶其人但能前不能卻刺腨入二寸此太陽經傷也補註腨名承筋在上股起肉處腳跟上七寸腨之中陷者是法不可刺或刺轉深遂傷其經以致能前而不能卻此仲景自注已詳病人常以手指臂腫動其人身體瞤瞤者藜蘆甘草湯主之補註凡動皆屬風而腫屬濕故肝木主風血虛則風生氣虛則濕襲手臂腫且動知其血不足之養筋陽亦不能以自固而身體之瞤勢不得已矣豈非有痰氣在筋節間乎夫見於外者未有不因於內者也窺仲景有吐之法惜乎方缺焉耳轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者雞屎白散主之雞屎白散雞屎白一味為散取方寸匕以水六合和溫服補註轉筋者脾胃土衰肝木自盛風火燥爍於筋則筋攣而痛故風氣甚急則肝血失養筋失其柔和之性乖其屈伸之節故臂腳直至脈直上下行者乃督沖之為病何者督脈循陰器陰器者宗筋所主也衝脈為肝之幕肝木多風則沖亦病矣若微弦則轉入於內為病較重因以雞屎白投之其肝邪外出耳陰狐疝氣者偏有小大時時上下蜘蛛散主之蜘蛛散方蜘蛛十四枚熬焦桂枝半兩二味為散取八分一匕飲和服日再服蜜丸亦可衍義厥陰之筋病也狐陰獸善變化而藏睪丸上下有若狐之出入無時也足厥陰之筋上循陰股結於陰器筋結故偏有大小氣病故時時上下也蜘蛛布網取物其絲右繞從外而內大風不壞得干金旋轉之義故主治風木之妖狐配桂枝以宣散厥陰之氣結問曰病腹痛有蟲其脈何以別之師曰腹中痛其脈當沉若弦反洪大故有蛔蟲衍義腹痛中焦濕土之為病也腹為陰痛為陰類故脈當沉若脈弦是見厥陰風木之象矣反洪大者風木盛而生火風木之邪賊傷中土濕熱不攘則生蟲故曰諸蟲皆生於風也東方生風在地為木在體為筋在臟為肝風傷筋此因風傷而生蟲故蟲乃厥陰肝筋之為病也是以傷寒蛔厥在厥陰篇內此章蛔痛列於筋病篇中蛔蟲之為病令人吐涎心痛發作有時毒藥不止甘草粉蜜湯主之甘草粉蜜湯方甘草二兩胡粉一兩白蜜四兩上三味以水三升先煮甘草取二升去滓內粉蜜攪令和煎如薄粥溫服一升瘥即止衍義夫飲食入胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故吐涎蛔上入膈故心痛蛔聞食臭出得飲則安故發作有時也毒藥不止者蛔惡之不食也蛔喜甘故用甘草蜜之甘隨所欲而攻之胡粉甘寒主殺三蟲蛔得甘則頭向上而喜食食之即死此反佐以取之也蛔厥者當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞臭出其人當自吐蛔衍義蛔厥者病蛔而手足厥冷也蛔厥者當吐蛔病者靜而復時煩此因肝臟寒而蛔上入膈故煩蓋言蛔生於肝因臟寒而上入於膈也須臾復止得食而嘔又煩者此蛔聞食臭而出於胃故其人常自吐蛔蓋言蛔因風而生於肝臟寒則上入膈聞食臭則出於胃也蛔厥者烏梅丸主之烏梅丸方烏梅三百個細辛六兩乾薑十兩黃連一斤附子六兩炮川椒四兩去汗當歸四兩桂枝去皮人參黃柏各六兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧子大先食飲服十丸日三服稍加至二十丸禁生冷滑臭等物衍義烏梅味酸入肝梅得先春之氣主助生陽而殺陰類細辛發少陽之初陽以助厥陰之化當歸啟少陰之血液以資肝臟所藏之榮黃連配蜀椒助心火以殺蛔益子氣也附子配黃柏資腎氣以回厥助母氣也乾薑佐人參補中焦而止嘔桂枝制風木疏肝鬱陰陽和而厥逆回風邪散而氣血足治蛔厥之法備已蛔之化生有若蜒蚰生長極速
