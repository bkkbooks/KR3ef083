body:
  text: 卷二十二婦人雜病脈證並治第二十二論一首脈證合十四條方十四首婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之衍義此下四條皆出傷寒論中成注七八日邪氣入里之時本無寒熱而續得寒熱經水適斷者為表邪乘虛入於血室相搏而血結不行經水所以斷也血氣與邪分爭致寒熱如瘧而發作有時與小柴胡以解傳經之邪婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室治之無犯胃氣及上二焦必自愈衍義成注傷寒發熱者寒已成熱也經水適來則血室空虛熱乘虛入血室若邪入胃邪客於腑而爭也暮則譫語如見鬼狀是邪不入腑入於血室而陰爭也陽盛譫語則宜下此熱入血室不可與下藥犯其胃氣熱入血室血結寒熱者與小柴胡湯散邪發汗熱入血室胸膈滿如結胸狀者可刺期門穴此雖入而無滿結故不可刺必自愈者以經行則熱隨血去血下已則邪熱悉除而愈矣發汗為犯上焦者發汗則動衛氣衛氣出上焦也刺期門為犯中焦者刺期門則動榮氣榮氣出中焦也婦人中風發熱惡寒經水適來得之七八日熱除脈遲身涼和胸脅滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之衍義中風發熱惡寒表病也若經水不來表邪傳裡則入腑而不入血室也經水適來血室空虛至七八日邪傳裡之時更不入腑乘虛而入於血室熱除脈遲身涼者邪氣內陷而表證罷也胸脅下滿如結胸狀譫語者熱入血室而裡實期門者肝之幕肝主血刺期門者瀉血室之熱審何經氣實更隨其實而瀉之陽明病下血譫語者此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出則愈衍義陽明病熱入血室迫血下行下血譫語陽明法當汗以奪血者無汗故但頭汗出也刺期門以散血室之熱隨其實而瀉之以除陽明之邪熱散邪除榮衛得通津液得復濈然汗出而解明理論沖是血室婦人則隨經而入男子由陽明而傳也婦人咽中痛如有炙臠半夏厚朴湯主之半夏厚朴湯方千金作胸滿心下堅咽中帖帖如有炙肉吐之不出吞之不下半夏一升厚朴三兩茯苓四兩生薑五兩蘇葉二兩上五味以水七升煮取四升分溫四服日三服夜一服衍義上焦陽也衛氣所治貴通利而惡閉郁鬱則津液不行而積為涎膽以咽為使膽主決斷氣屬相火遇七情至而不決則火亦鬱而不發不發則焰不達不達則氣如咽與痰涎結聚胸中故若炙臠千金之病證雖異然亦以此而致也用半夏等藥散郁化痰而已婦人臟燥一作躁喜悲傷欲哭象如神靈所作數欠伸甘麥大棗湯主之甘麥大棗湯方甘草三兩小麥一升大棗十枚上三味以水六升煮取三升分溫三服亦補脾氣衍義內經以肺之聲為哭又曰並於肺則悲靈樞曰悲哀動中則傷魂此證因肝虛肺並傷其魂而然也蓋肝陽臟也肺陰臟也陽舒而陰慘肝木發生之氣不勝肅殺之邪並之屈而不勝生化之火被抑擾亂於下故發為臟躁變為悲哭所藏之魂不得並神出入遂致妄亂象如神憑木氣被抑而不前筋骨拘束而不舒故數作欠伸然治相併之邪必安之和之用小麥養肝氣止躁甘草大棗之甘以緩氣之苦急躁止急緩則臟安而悲哭愈然又曰亦補脾氣者乃肝病先實脾不惟畏其傳且脾實而肺得母氣以安庶不離位過中而復下並矣婦人吐涎沫醫反下之心下痞滿當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯主之衍義傷寒論表不解心下有水氣者用小青龍湯解表散水也又曰表未解醫反下之陽邪內陷實則結胸虛則心下痞由此觀之吐涎沫者蓋由水氣之為病因反下之為痞吐涎沫仍在故先以小青龍治涎沫然後以瀉心湯除心下之熱痞也婦人之病因虛積冷結氣為諸經水斷絕至有歷年血寒積結胞門寒傷經絡凝堅在上嘔吐涎唾久成肺癰形體損分在中盤結繞臍寒疝或兩脅疼痛與臟相連或結熱中痛在關元脈數無瘡肌若魚鱗時著男子非只女身在下來多經候不勻令陰掣痛少腹惡寒或引腰脊下根氣街氣衝急痛膝脛疼煩奄忽眩冒狀如厥癲或有憂慘悲傷多嗔此皆帶下非有鬼神久則羸瘦脈虛多寒三十六病千變萬端審脈陰陽虛實緊弦行其針藥治危得安其雖同病脈各異源子當辨記勿謂不然衍義陰陽之運動有上下有中外有歸宿有倡順得其道則變化萬象各司其用若乖其宜則隨所適而為病然二者之病則以陽為主由陽主動用以施化者也而陰者惟虛其體以受之生育而已若夫邪氣在陰則凝結堅實實則陽不得入而施化致生諸病不可窮已仲景敘是數證冷積下焦以見變易無窮也所謂經水斷絕胞門寒傷令陰掣痛少腹惡寒或引腰脊下根氣街氣衝急痛膝脛疼煩皆由陰結下焦陽不得入隨所著衝任之脈而為病也嘔吐涎沫久成肺癰者必陰結在少陰經其經上連於肺水因溢上為涎沫久迫上焦之陽蓄以成肺癰也繞臍寒疝或兩脅疼痛與臟相連者臍在人身正中面四臟應之其四臟則應於上下左右蓋是生氣所出之原五臟皆於此受之今為冷邪凝結生髮之氣絕少正邪相擊而作寒疝臍間冷結連及兩脅少陽發生之分併為疼痛故曰與臟相連也或結熱中病在關元者乃小腸火之幕也足三陰任脈之所會足三陰任脈盡為積冷於小腸火氣不折為鬱熱在中冷熱相搏故痛在關元脈數無瘡肌若魚鱗者陰不化血無以輸化生肌滋潤於外徒是孤陽行脈燥消皮毛耳奄然眩冒狀如厥癲者衝任督陰蹺之脈衝突而逆陽亂於上所以如屍厥癲癇或憂慘悲傷倘多嗔者此在下腎肝臟陰結而陽不得入精泄不固下泄為帶魂不舒志不寧故耳非鬼神使之也陰由冷積榮血內結不與衛和內外成病求之於陰陽交變之道不可一言而盡仲景敘其證復敘為三十六病千變萬端同脈異證恐後人膠柱鼓瑟而不由於陰陽變易之道也問曰婦人年五十所病下利數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥何也師曰此病屬帶下何以故曾經半產瘀血在少腹不去何以知之其證唇口乾燥故知之當以溫經湯主之溫經湯方吳茱萸三兩當歸芎藭芍藥桂枝人參阿膠生薑丹皮甘草各二兩半夏半升麥冬一升去心上十二味以水一斗煮取三升分溫三服亦止婦人少腹寒久不受胎兼治崩中去血或月水來過多及至期不來衍義下利不止病屬帶下何也婦人二七天癸至任脈通太衝脈盛月事以時下七七太衝脈衰天癸竭地道不通經水遂止今年五十經絕胞門閉塞衝任脈不復輸泄之時所積於血自胞門化為帶下無所從出大便屬陰故就大便而下利矣考大全良方集是方出千金治女人曾經小產或帶下三十六病以或字分為二金匱以帶下屬半產瘀血豈帶下三十六病無濕熱之實邪而盡屬於瘀血虛寒哉蓋為帶脈居身形之半凡十二經絡並奇經八脈各挾寒熱之邪過而傷之動其衝任則氣血為之不化心腎為之不交變成赤白漏下治之必察始感何邪何經受害為虛為發何狀脈見何象令在寒暑隨宜以權變治之可也豈概云三十六病盡切是方乎終不若仲景之有原委而可為後世法也蓋小產是胞脈已虛不能生新推陳致血瘀積在下而生髮之氣起於下焦固藏之政亦司下焦下焦瘀積在下而既結於陰則上焦之陽不入矣遂成少腹裡急腹滿四藏失政則五液時下其陽至暮當行於陰而不得入獨浮於上為發熱為掌上熱為唇口乾燥故必開痹破陰結引陽行下皆吳茱萸主之益新推陳又芎歸為臣丹皮佐之然推陳藥固多獨用丹皮者易老謂其能治神志不足血積胞中心腎不交非直達其處者不能通其神志之氣用半夏以解寒熱之結阿膠人參補氣血之不足麥冬助丹皮引心氣入陰又治客熱唇口乾燥桂枝生薑發達生化之氣甘草益元氣和諸藥婦人小腹寒不受胎者崩中去血皆因虛寒結陰而陽不得入耳儘可治之設有脈沉數而陽乘陰者亦為帶下不成孕崩中去血等證又烏可用是治之必須脈辨也帶下經水不利少腹滿痛經一月再見者土瓜根散主之土瓜根散方陰㿗腫亦治之土瓜根芍藥桂枝䗪蟲各二兩上四味杵為散酒服方寸匕日三服衍義此亦因瘀血而病者經水即不利一月再見之不同皆衝任瘀血之病土瓜根者能通月水消瘀血生津液津生則化血也芍藥主邪氣腹痛除血痹開陰寒桂枝通血脈引陽氣䗪蟲破血積以消行之非獨血積衝任者有是證肝藏血主化生之氣與衝任同病而脈循陰器任督脈亦結陰下故皆用是湯治之㿗腫非惟男子之睪丸婦人之陰戶亦有之多在產時瘀血流入作痛下墜出戶也寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名曰革婦人則半產漏下旋覆花湯主之方見十一卷衍義本文之注見前方藥本草謂旋覆花主結氣脅下滿通血脈去臟家熱蔥管亦主寒熱安胎除肝邪且更能主血新絳疑是緋帛也凡系帛皆理血血色紅用絳尤切於活血肝為藏血主生化故衝任之脈成月事及胞胎者皆統屬之三味入肝理血除邪散結豈非以氣陽也血陰也氣少則無陽無陽則寒血虛則無陰無陰則熱兩虛相搏以害其肝之生化歟所以用是湯先解其結聚之邪也而溫補其虛寒者必另有法矣婦人陷經漏下黑不解膠薑湯注之方缺衍義氣倡而血從則百脈流動以候其天癸苛有邪以阻之則血不從其氣而自陷於血海血海者腎主之腎寒水也色黑是以漏下黑矣猶內經所云結陰下血也方雖不全見膠艾二物亦足治之艾火皮膚灸之尚能內入況服之而不自陽引入於陰乎姜以散其陰開通腠理致津液行氣也婦人少腹滿如敦狀小便微難而不渴生恐是經字後者此為水與血俱結在血室也大黃甘遂湯主之大黃甘遂湯方大黃四兩甘遂二兩阿膠二兩上三味以水三升煮取一升頓服之其血當下衍義內經謂水入經其血乃成則血由水化今乃言血與水並何哉嘗思水有清濁清則入經化血濁則為溺為唾苟因氣之濁亂者入之則不能化血而為血害其清者初雖為水而色白至於坎離之變從火化而變赤如月之稟日光為盈虧與陽隨動流轉上下行諸經脈與水性異矣水性惟能潤下苟下流不通必注於澤所以水失其道入於肌表者作身腫入於筋骨者作肢節腫此入於血室故作少腹如敦狀然血室雖與膀胱異道膀胱是行水之府水蓄血室氣有相感也故膀胱之氣亦不化而小便微難矣若小便自如而少腹如敦者則不謂之水並當是他邪血積可知矣用甘遂取其直達水停之處大黃蕩瘀血阿膠引為血室嚮導且補其不足也婦入經水不利下抵當湯主之抵當湯方亦治男子膀胱滿急有瘀血者水蛭三十個熬虻蟲三十枚熬去翅足桃仁二十個去皮尖大黃三兩酒浸上四味為末以水五升煮取三升去滓溫服一升衍義傷寒論陽明證其人喜忘者必有蓄血大便黑色抵當湯主之發熱下之不解六七日不大便者有瘀血亦宜是湯傷寒有熱少腹滿應小便不利今反利者為有血也宜抵當丸三者有病狀而後立方今只云經水不利下豈遂血蓄不通而非虛損耶此必有蓄血情狀而出是方也婦人經水閉不利臟堅癖不止中有乾血下白物礬石丸主之礬石丸方礬石三分燒杏仁一分上二味末之煉蜜和丸如棗核大內臟中劇者再內之衍義子宮血積不與氣和故新血不至遂成乾血堅癖外連於戶津液不行化為白物是用礬石消堅癖破乾血杏仁利氣開閉潤臟之燥蜜以佐之內子戶藥氣可直達於子宮矣設乾血在衝任之海者必服藥以下之內之不能去也婦人六十二種風及腹中血氣刺痛紅藍花酒主之紅藍花酒方紅藍花一兩上一味以酒一大升煎減半頓服一半未止再服衍義注疑非仲景方傷寒論一部以風寒二邪必復言其傳變然後出方乃云六十二種風盡以一藥治之寧無寒熱虛實上下表里之異其非仲景法明矣雖然原其立方之旨將謂婦人以血為主一月一瀉然後和平若風邪與血凝搏或不輸血海以阻其月事或不流轉經絡以閉其榮衛或內觸臟腑以違其和因隨取止遂有不一之病所以治之惟有破血通經用紅花酒則血開氣行而風亦散矣婦人腹中諸疾痛當歸芍藥散主之衍義此腹痛者由中氣脾土不能升陰陽二氣乖離肝木乘克而作痛故用是湯補中伐木通行陰陽也婦人腹中痛小建中湯主之問曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈宜腎氣丸主之衍義此方在虛勞中治腰痛小便不利小腹拘急此亦用之何也蓋因腎虛用之若飲而短氣者亦用此利小便則可見其轉胞之病為胞居膀胱之室因下焦氣衰惟內水濕在中不得氣化而出遂致鼓急其胞因轉筋不正了戾其溺之宗水既不出經氣遂逆上衝於肺肺所主之榮衛不得入於陰蓄積於上故煩熱不得臥而倚息也用此補腎則氣化氣化則水行水行則邪者降而愈矣然轉胞之病豈盡由下焦腎虛致耶或中焦氣虛土濕下干害其胞與上焦肺氣壅塞不化於下焦或胎重壓其胞或忍溺入房皆足成此病必求所因以治之也婦人陰寒溫中坐藥蛇床子散主之蛇床子散方蛇床子仁上一味末之以白粉少許和合相得如棗大綿裹內之自然溫白粉即米粉藉之以和合也衍義風寒入陰戶痹而或冷或用蛇床以起其陰分之陽陽強則痹開而溫矣少陰脈滑而數者陰中即生瘡陰中蝕瘡爛者狼牙湯洗之狼牙湯方狼牙三兩上一味以水四升煮取半升以綿纏箸如繭浸湯瀝陰中日四遍衍義少陰脈滑陰中血熱也濕熱積陰戶生瘡甚則蟲出蝕爛狼牙味苦酸鹹主邪熱氣殺蟲後人瘡藥多用之胃氣下泄陰吹而正喧此穀氣之實也膏發煎導之衍義陽明脈屬於宗筋會於氣街若陽明不能升發穀氣上行變為濁邪反泄下利子宮受抑氣不上通故從陰戶作聲而吹出豬脂補下焦生血潤腠理亂髮通關格腠理開關格通則中焦各得升降而氣歸故道已
