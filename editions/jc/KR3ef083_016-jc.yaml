body:
  text: 卷十六驚悸吐衄下血胸滿瘀血第十六脈證十二條方五首寸口脈動而弱動即為驚弱則為悸衍義心者君主之官神明出焉不役形不勞心則精氣全而神明安其宅苟有所傷則氣虛而脈動動則心悸神惕精虛則脈弱弱則怔忡恐悸蓋驚自外物觸入而動屬陽陽變則脈動悸自內恐而生屬陰陰耗則脈弱是病宜和平之劑補其精氣鎮其神靈尤當處之以靜也師曰尺脈浮目睛暈黃衄未止暈黃去目睛慧了知衄今止衍義尺以候腎屬水土克之則合相火逼其陰血從膀胱而升故脈浮也腎之精上榮瞳子膀胱之脈上額中而作衄故暈黃退而血亦降所以知衄止也明理論腎主陰血統屬之傷寒衄者責邪在表經絡熱盛壅出雜病衄者責邪在裡也心主血肝藏血肺主氣開竅於鼻血得熱則散隨氣上逆從鼻中出則為衄此云尺浮不云寸口浮知為腎虛血逆非外邪也又曰從春至夏衄者太陽從秋至冬衄者陽明衍義內經太陽為開陽明為合春夏氣主發生以開者應之故邪氣逼血從升發衝出秋冬主收藏以合者應之故邪郁內極而後發出衄為陽盛獨不言少陽以太陽陽明二經皆上交額中故也衄家不可發汗汗出必額上陷脈緊急直視不能眴不得眠衍義足太陽經主表上巔入額貫目睛衄在上絡脈之血已脫若更發汗是重竭津液津液竭則脈枯故額上陷脈緊急牽引其目視不能合也無血陰虛故不得眠然亦有當汗傷寒論云脈浮緊不發汗因致衄者宜麻黃湯又云太陽病脈浮緊發熱身無汗自衄者愈經中之邪散不待桂枝麻黃髮之也明理論衄者但頭汗出無汗及汗出不至足者死病人面無血色無寒熱脈沉弦者衄脈浮弱手按之絕者下血煩咳者必吐血衍義面色者血之華也血充則華鮮若有寒熱則損其血致面無色也今無寒熱則自上下去血而然矣夫脈浮以候陽沉以候陰只見沉弦浮之絕不見者是無陽也無陽知血之上脫脈止見浮弱按之絕無者是無陰也無陰知血之下脫煩咳吐血者心以血安其神若火擾亂則血湧神煩上動於膈則咳所湧之血因咳而上越也然則沉之無浮浮之無沉何便見脫血之證乎以其面無色而脈弦弱也衄血陽固脫矣然陰亦損所以浮之亦弱經曰弱者血虛脈者血之府宜其脫血之處則無脈血損之處則脈弦弱也夫吐血咳逆上氣其脈數而有熱不得臥者死衍義此金水之臟不足故也外不足則火浮焰浮焰則金傷夫陰血之安養於內者腎水主之水虛不能安靜被火逼逐而血溢出矣血出則陽光益熾有升無降炎爍肺金金受其害因咳逆而上氣金水子母也子衰不能救母母亦受害不能生子二者之陰有絕而無復脈動身熱陽獨勝也不能臥陰已絕也陰絕陽豈獨生乎故曰死也若得臥者如內經於司天與陽明厥逆諸條悉有喘咳身熱嘔吐血等證未常言死蓋陰未絕也夫酒客咳者必致吐血此因極飲過度所致也衍義酒性太熱客焉不散則肝氣不清胃氣不守亂於胸中中焦之血不布於經絡聚而洶洶因熱射肺為咳從其咳逆之氣溢出也此傷胃致吐血者寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相擊此名曰革婦人則半產漏下男子則亡血衍義成無己謂減為寒者謂陽氣少也芤為虛者謂陰血少也所謂革者既寒且虛則氣虛血乖不循常度男子得之為真陽衰而不能內固故主亡血女子得之為陰血虛而不能滋養故主半產漏下此條出第二卷婦人證有旋覆花湯亡血不可發其表汗出則寒慄而振衍義亡血則已傷榮不可發汗以傷衛若汗則榮衛兩傷榮行脈中衛行脈外榮虛則經脈空而為之振衛虛則不溫腠理而寒慄補註傷寒云亡血即亡陰也陰亡則陽氣孤而無偶才一發汗其陽必從汗盡越所以寒慄有加陰陽兩竭也大法宜小建中湯病人胸滿唇痿舌青口燥但欲漱水不欲咽無寒熱脈微大來遲腹不滿其人言胸滿為有瘀血衍義是證瘀血何邪致之耶內經有墮恐惡血留內腹中滿脹不得前後又謂大怒則血菀於上是知內外諸邪凡有所搏積而不行者即為瘀血也唇者脾之外候舌者心之苗脾脈散舌下胃脈環口旁心主血脾養血積則津液不布是以唇痿舌青也口燥但欲漱水不欲咽者熱不在內故但欲漱以潤其燥耳脈大為熱遲為寒今無寒熱之病而微大者乃氣並於上故胸滿也遲者血積膈下也積在陰經之隧道不似氣積於陽之盲膜然陽道顯陰道隱氣在盲膜者則壅脹顯於外血積隧道惟閉塞而已故腹不滿因閉塞自覺其滿所以知瘀血使然也病者如熱狀煩滿口乾燥而渴其脈反無熱此為陰伏是瘀血也當下之衍義血陰也配於陽神得之以安氣得之以和咽得之以潤經脈得之以行身形之中不須臾離也今因血積神無以養則煩氣無以和則滿口無以潤則燥腸胃無以澤則渴是皆陽失所配榮衛不行津液不化而為是病也非陽之自強而生熱者故曰如熱狀火邪者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之桂枝去芍藥加蜀漆牡蠣龍骨救逆湯方桂枝去皮三兩甘草二兩炙生薑三兩蜀漆三兩洗去腥龍骨四兩牡蠣五兩熬大棗十二枚衍義此但言火邪不言何證考之即傷寒證脈浮醫以火逼劫之亡陽必驚狂起臥不安者成無己注是方曰汗者心之液亡陽則心氣虛心惡熱邪內迫則心神浮越故驚狂臥起不安與桂枝湯解未盡表邪芍藥益陰非亡陽所宜故去之火邪錯逆加蜀漆之辛以散之陽氣亡脫加龍骨牡蠣之澀以固之心下悸者半夏麻黃丸主之半夏麻黃丸方半夏麻黃上二味末之煉蜜和丸如小豆大飲服三丸日三服衍義悸者心中惕惕然動怔仲而不安也悸有三種傷寒有正氣虛而悸者又有汗下後正氣內虛邪氣交擊而悸者病邪不同治法亦異正氣虛者小建中湯四逆散加桂治之飲水多而悸者心屬火而惡水不自安而悸也汗下後正氣內虛邪氣交擊而悸者與氣虛而悸又甚焉治宜鎮固或化散之皆須定其氣浮也原病式又謂是病皆屬水衰熱旺風火燥動於中故怔忡也若驚悸亦以火藥劫金不能平木風火相搏而然欲究心悸之邪則非一言可盡也或因形寒飲冷得之夫心主脈寒傷榮則脈不利飲冷則水停水停則中氣不宣脈不利由是心火鬱而致動用麻黃以散榮中寒半夏以散心下水耳首論以脈弱為悸而用此湯治者其脈必不弱非弦即緊豈脈弱心氣不足者猶得用此藥乎吐血不止者柏葉湯主之柏葉湯方柏葉乾薑各三兩艾三把上三味以水五升取馬通汁一升合煎取一升分溫再服衍義夫水者遇寒則沉潛於下遇風則波濤於上人身之血與水無異也得寒之和則居經脈內養五臟得寒之凜冽者則凝而不流積而不散得熱之和者則運行經脈外充九竅得熱之甚者風自火狂則波濤洶起由是觀之吐衄者風火也下血先便後血此遠血也黃土湯主之黃土湯方乾地黃黃芩附子一兩阿膠白朮甘草各三兩灶下黃土半斤上七味以水八升煮取三升分溫三服衍義腸胃者陽明二經也陽明主合氣本收斂血上者為逆下者為順以下血者言之胃居大腸之上若聚於胃必先便後血去肛門遠故曰遠血若聚大腸去肛門近故曰近血雖腸胃同為一經然胃屬土所主受納轉輸大腸屬金所主傳送而土則喜溫惡濕金則喜寒惡熱二者非惟遠近之殊其喜惡亦異治遠血者黃土湯主之然則血聚於胃者何也蓋血從中焦聽化上行於榮以配於衛榮衛之流連變化實胃土所資也胃與脾為表裡胃虛不能行氣於三陽脾虛不能行津於三陰氣日以衰脈道不利或痹而不通於血中積隨其逆而出或嘔或吐或衄或泄也若欲崇土以求類莫如黃土黃者土之正色更以火燒之火乃土之母其得毋燥而不濕血就溫化則所積者消所溢者止阿膠益血以牛是土畜亦是取物類地黃補血取其象類甘草白朮養血補胃和平取其味類甘草緩附子之熱使不僭上是方之藥不惟治遠血而已亦可治久吐血胃虛脈遲細者增減用之蓋胃之陽不化者非附子之善走不能通諸經脈散血積也脾之陰不理者非黃芩之苦不能堅其陰以固其血之走也黃芩又制黃土附子之熱不令其過故以二藥為使下血先血後便此近血也赤小豆當歸散主之衍義此出大腸故先血後便以濕熱之毒蘊結不入於經滲於腸中而下赤小豆能行水濕解熱毒梅師方皆用此一味治下血況有當歸破宿養新以名義觀之血當有所歸則不妄行矣心氣不足吐血衄血瀉心湯主之瀉心湯方黃連黃芩各一兩大黃二兩上三味以水三升煮取一升頓服之衍義心者屬火主血心氣不足者非心火之不足乃真陽之不足也真陽不足則火熱甚而心不能養血血從熱溢為吐衄大黃黃芩本草治血閉吐衄者用之而傷寒家以瀉心湯之苦寒瀉心下之痞熱是知此證以血由心熱而溢瀉其心之熱而血自安矣如麻黃桂枝治衄寒邪郁其經脈化熱迫成衄也故散寒邪寒邪散則熱解熱解則血不被迫而自安矣此用瀉心湯正其義也若濟眾方用大黃治衄血更有生地汁則是治熱涼血亦瀉心湯類耳
