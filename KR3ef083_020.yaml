body:
  text: 卷二十婦人妊娠病脈證治第二十證三條方九首師曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之於法六十日當有此證設有醫治逆者卻一月加吐下者則絶之衍義婦人平脈者言其無病脈也陰脈小弱其榮氣不足耳凡感邪而榮氣不足者則必惡寒發熱不妨於食今無寒熱妨於食是知妊娠矣妊娠者血聚氣搏經水不行至六十日始凝成胎斯時也氣血化於下榮氣不足衛不獨行壅突中焦而不能食津液少布其人渴用桂枝湯益榮和衛設有醫以他治則更一月當化若加吐下復損其榮土亦失其養育條芩白朮可也芎歸可也參耆可也但要益榮生津和中下二焦而已婦人宿有癥病經斷未及三月而得漏下不止胎動在臍上者為癥痼害衍義宿有癥痼內結及至血聚成胎而癥病發動氣淫於衝任由是養胚之血不得停留遂漏不止癥痼下迫其胎動於臍上故曰癥痼害也凡成胎妊者一月血始聚二月始胚三月始胎胎成始能動今六月動者前三月經水利時胎下血者未成也後斷三月始胚以成胎方能動若血下不止而癥乘故也必當去其癥內經曰有故無殞亦無殞也癥去則胎安也桂枝桃仁丹皮芍藥能去惡血茯苓亦利腰臍間血即是破血然有散有緩有收有滲結者散以桂枝之辛肝藏血血蓄者肝急緩以桃仁丹皮之甘陰氣之發動者收以芍藥之酸惡血既破佐以茯苓之淡滲利而行之妊娠六月動者前三月經水利時胎下血者後斷三月不血也所以血不止者其癥不去故也當下其癥桂枝茯苓丸主之桂枝茯苓丸方桂枝茯苓牡丹桃仁去皮尖熬芍藥各等分上五味末之煉蜜丸如兔屎大每日食前服一丸不知加至三丸衍義此復申明胎成三月而後動也上章以經斷三月而漏下不止然胎已成故雖漏下而胎動於上也此章以六月動者以前三月經水利時而成胎胎雖成而血時下至後三月始斷而不血是以妊娠六月而胎始動蓋前三月因下血而胎失養前三月與後三月之血下不止者以其癥不去故也當下其癥此丸主之婦人懷妊六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇其所以然者子臟開故也當以附子湯溫其臟衍義妊至六七月筋骨堅強之時若其脈弦弦為虛為寒內格其陽於外而發熱陰寒內逆而作脹腹痛惡寒者其內無陽故子臟開少腹如扇也用附子湯復返其陽以溫其臟師曰婦人有漏下者有半産後因續下血都不絶者有妊娠下血者假令妊娠腹中痛為胞阻膠艾湯主之膠艾湯方阿膠二兩艾葉三兩甘草二兩當歸三兩芎藭二兩芍藥四兩乾地黃六兩上七味以水五升清酒三升合煮取三升去滓內膠消盡溫服一升日三服不瘥更作衍義經水與結胎皆衝任也衝任乃腎用事者也腎屬坎坎者時與離會則血滿經水行猶月之稟日光為盈虧也精有所施心神內應血即是從故丁壬合而坎離交二氣凝結變化衃胎矣然持守其陰陽交合長養成胎者皆坤土資之也陰陽抱負則坤土堤防故不漏若宿有瘀濁客於衝任則陰自結而不得與陽交合故有半産漏下不絶也若妊娠胞阻者為陽精內成胎陰血外養胞負坤土失其堤防用此方皆治之芎歸辛溫宣通其陽血芍藥味酸寒宣通其陰血阿膠之甘溫內經曰肺合外皮毛皮毛生於腎水東垣謂其入於太陰足少陰厥陰嘗思在身氣化成形金石草木之藥終不如血肉之資養同類者以養之此方用阿膠安胎補血塞其漏泄宜矣甘草和陰陽通血脈緩中解急其氣內入開利陰血之結而通於陽地黃猶是補腎血之君藥也調經止崩安胎養血妙理無出此方然加減又必從宜若脈遲緩陰勝於陽則加乾薑官桂若數大則宜加黃芩婦人懷妊腹中㽱痛當歸芍藥散主之當歸芍藥散方當歸三兩芍藥一斤茯苓四兩白朮四兩澤瀉半斤芎藭三兩上六味杵為散取方寸匕酒和日三服衍義此與胞阻痛者不同因脾土為木邪所克穀氣不舉濁淫下流以塞搏陰血而痛也用芍藥多他藥數倍以瀉肝木利陰塞以與芎歸補血止痛又佐茯苓滲濕以降於小便也白朮益脾燥濕茯澤行其所積從小便出蓋內外六淫皆能傷胎成痛不但濕而已也妊娠嘔吐不止乾薑人參半夏丸主之乾薑人參半夏丸方乾薑人參各一兩半夏二兩上三味末之以生薑汁和丸如梧子大飲服十三丸日三服衍義此即後世所謂惡阻病也先因脾胃虛弱津液留滯蓄為痰飲至妊二月之後胚化成胎濁氣上衝中焦不勝其逆痰飲遂湧嘔吐而已中寒乃起故用乾薑止寒人參補虛半夏生薑治痰散逆也妊娠小便難飲食如故當歸貝母苦參丸主之當歸貝母苦參丸方當歸貝母苦參各四兩上三味末之煉蜜丸如小豆大飲服三丸加至十丸衍義小便難者膀胱熱鬱氣結成燥病在下焦不在中焦所以飲食如故用當歸和血潤燥本草貝母治熱淋以仲景陷胸湯觀之乃治肺金燥郁之劑肺是腎水之母水之燥郁由母氣不化也貝母非治熱郁解則熱散非淡滲利水也其結通則水行苦參長於治熱利竅逐水佐貝母入行膀胱以除熱結也妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散主之葵子茯苓散方葵子一斤茯苓三兩上二味杵為散飲服方寸匕日三服小便利則愈婦人妊娠宜常服當歸散主之當歸散方當歸黃芩芍藥芎藭各一斤白朮半斤上五味杵為散酒飲服方寸匕日再服妊娠常服即易産胎無苦疾産後百病悉主之衍義內經陰搏陽別謂之有子尺脈搏擊者由子宮之氣血相搏而形於脈也精留血裹陰陽紐合也動搏則變化而變化生於動若靜而不動則不生不化是以妊娠之血不可以靜靜則凝凝則泣泣則虧少而虛皆不得與化胎之火相合要其胎孕生化必脈動搏故調之者先和陰陽利其氣血常服養胎之藥非惟安胎易産且免産後諸病芎歸芍藥之安胎補血白朮之用有三一者益胃致安氣以養胎二者胎繫於腎腎惡燥能燥濕而生津三者皆致中焦所化之新血去腰臍間之陳瘀至若胎外之血因寒濕滯者皆解之黃芩減壯火而反於少火則可以生氣與脾土濕熱來傷及開血之瘀閉故為常服之劑然當以脈之遲數虛弱加減之有病可服否則不必也藥者但宜攻邪扶正不比米穀性味偏而不正不可久服內經曰味之所入各歸所喜攻氣增而久夭之由也妊娠養胎白朮散主之白朮散方白朮芎藭蜀椒三分出汗牡蠣四分上四味杵為散酒服一錢匕日三服夜一服但苦痛加芍藥心下痛倍加川芎心煩吐痛不能飲食加細辛一兩半夏大者二十枚服之後更以醋漿水服之若嘔以醋漿水服之復不解者小麥汁服之已後渴者大麥粥服之病雖愈服之勿置衍義四味本草皆謂能去血而養胎何也蓋血聚而後成胎少遇邪則所聚之血時宿而不運反類瘀惡必生新開陳然後胎可養也養胎不惟在血而胎繫於腎養之又在於胃所以補其腎調其胃補腎固其精也調胃和其中也用術調胃蜀椒開痹痹開則陽精至牡蠣治崩崩止則陰精固川芎下入血海運動胎氣破舊生新或陰血不利肝木為害在內抑屈而痛者瀉以芍藥之酸通其陰設沖逆而痛者則欲以芎藭之辛溫宣通其陽或挾瘀惡之氣上逆於胃而患吐煩不能食者用細辛溫中去痰下氣半夏治心下急痛和胃進食止吐逆若嘔而不止者由肝木不務德捨己而忘用小麥飲養其本氣以安之又且平胃下氣止煩一舉兩得大麥主消渴益氣調中故中氣不足而渴者用之婦人傷胎懷身腹滿不得小便從腰以下重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便微利則愈衍義內經諸腹脹大皆屬於熱諸濕腫滿皆屬於脾三焦病者腹滿不得便溢則為水心上焦也而不下行於腎腎下焦也不得上和於心脾中焦也心之熱獨炎於上腎不得和則太陰上下不交穀氣無所輸不得養其胎而成閉塞上閉不通則濕熱並而為腹滿下關不利則腰以下如水狀刺勞宮心氣行矣刺關元腎氣化矣手足少陰交則小便利矣便利則中焦之滿下焦之重皆愈矣
